# Docs: https://docs.starknet.io/
# Format: StarkNet RPC endpoints use API keys in URL path or Authorization header
# Verify: no public verification endpoint
# Prefix: none (requires context anchoring)

[detector]
id = "starknet-api-credentials"
name = "StarkNet API Credentials"
service = "starknet"
severity = "high"
keywords = ["starknet", "STARKNET", "stark-net", "STARK-NET", "starknet.io", "starkware"]

[[detector.patterns]]
regex = '(?:starknet|STARKNET|stark-net|STARK-NET)[._-]?(?:rpc|RPC)[._-]?(?:url|URL|endpoint)[=:"	\s]+(https?://[a-zA-Z0-9._-]+\.starknet\.[a-z]+/[a-zA-Z0-9_-]+)'
description = "StarkNet RPC URL with embedded access token"
group = 1

[[detector.patterns]]
regex = '(?:starknet|STARKNET|stark-net|STARK-NET)[._-]?(?:rpc|RPC)[._-]?(?:url|URL|endpoint)[=:"	\s]+(https?://[a-zA-Z0-9._-]+/starknet/[a-zA-Z0-9_-]+)'
description = "StarkNet RPC URL with path-based access token"
group = 1

[[detector.patterns]]
regex = '(?:starknet|STARKNET|stark-net|STARK-NET)[._-]?(?:rpc|RPC)[._-]?(?:url|URL|endpoint)[=:"	\s]+(https?://starknet-[a-z]+\.gateway\.tatum\.io/[a-zA-Z0-9_-]+)'
description = "StarkNet RPC URL with Tatum gateway and API key"
group = 1

[[detector.patterns]]
regex = '(?:starknet|STARKNET|stark-net|STARK-NET)[._-]?(?:api|API)[._-]?key[=:"	\s]+([a-f0-9]{32})'
description = "StarkNet API key (32 hex characters)"
group = 1
