# Docs: https://stytch.com/docs/api-reference/b2b/api/overview
# Format: secret- followed by 36 alphanumeric characters (UUID format)
# Verify: GET to api.stytch.com/v1/projects with Basic auth
# Prefix: secret-

[detector]
id = "stytch-secret"
name = "Stytch Secret"
service = "stytch"
severity = "critical"
keywords = ["secret-", "stytch"]

[[detector.patterns]]
regex = 'secret-[a-zA-Z0-9]{36}'
description = "Stytch secret (secret- prefix followed by UUID)"

[detector.verify]
method = "GET"
url = "https://api.stytch.com/v1/projects"

[detector.verify.auth]
type = "basic"
username = "match"
password = ""

[detector.verify.success]
status = 200
