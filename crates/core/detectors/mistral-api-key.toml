# Docs: https://docs.mistral.ai/api/
# Format: 32 alphanumeric characters
# Verify: GET /v1/models with Bearer token returns 200
# Prefix: none (32 alphanumeric, requires keyword context)

[detector]
id = "mistral-api-key"
name = "Mistral AI API Key"
service = "mistral"
severity = "critical"
keywords = ["MISTRAL_API_KEY", "mistral_api_key", "mistral", "MISTRAL"]

[[detector.patterns]]
regex = "(?:MISTRAL|mistral)[_\\s]*(?:API|api)?[_\\s]*(?:KEY|key)?[=:\\s\"']+([a-zA-Z0-9]{32})"
description = "Mistral AI API key with context anchor"
group = 1

[[detector.patterns]]
regex = "Authorization:\\s*[Bb]earer\\s+([a-zA-Z0-9]{32})"
description = "Mistral AI API key in Authorization header"
group = 1

[detector.verify]
method = "GET"
url = "https://api.mistral.ai/v1/models"

[detector.verify.auth]
type = "bearer"
field = "match"

[detector.verify.success]
status = 200
