# Docs: https://neon.com/docs/manage/api-keys
# Format: Randomly generated 64-character hexadecimal token
# Verify: GET /api/v2/projects with Authorization: Bearer token returns 200 if valid
# Prefix: none (requires context anchoring)

[detector]
id = "neon-api-key"
name = "Neon API Key"
service = "neon"
severity = "critical"
keywords = ["NEON_API_KEY", "neon.tech", "Authorization"]

[[detector.patterns]]
regex = "(?:NEON_API_KEY|neon.?api.?key)[=:\\s\"'']+([a-f0-9]{64})"
description = "Neon API key with context anchor"
group = 1

[detector.verify]
method = "GET"
url = "https://console.neon.tech/api/v2/projects"

[detector.verify.auth]
type = "bearer"
field = "match"

[detector.verify.success]
status = 200
