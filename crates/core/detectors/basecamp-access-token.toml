# Docs: https://github.com/basecamp/bc3-api
# Format: OAuth 2.0 bearer token, variable length alphanumeric
# Verify: GET /999999999/projects.json returns 200 if valid
# Prefix: none (requires context anchoring)

[detector]
id = "basecamp-access-token"
name = "Basecamp Access Token"
service = "basecamp"
severity = "high"
keywords = ["BASECAMP_ACCESS_TOKEN", "BASECAMP_TOKEN"]

[[detector.patterns]]
regex = "(?:BASECAMP_ACCESS_TOKEN|BASECAMP_TOKEN)[=:\\s\"'']+([A-Za-z0-9_-]{40,60})"
description = "Basecamp OAuth 2.0 access token with context anchor"
group = 1

[detector.verify]
method = "GET"
url = "https://3.basecampapi.com/identity.json"

[detector.verify.auth]
type = "bearer"
field = "match"

[detector.verify.success]
status = 200
