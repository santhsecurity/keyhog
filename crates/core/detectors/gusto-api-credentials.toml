# Docs: https://docs.gusto.com/app-integrations/docs/authentication
# Format: OAuth 2.0 client_id and client_secret (alphanumeric strings)
# Verify: POST /oauth/token with client credentials to obtain access token
# Prefix: none (requires context anchoring)

[detector]
id = "gusto-api-credentials"
name = "Gusto API Credentials"
service = "gusto"
severity = "critical"
keywords = ["GUSTO_CLIENT_ID", "GUSTO_CLIENT_SECRET", "gusto"]

[[detector.patterns]]
regex = "(?:GUSTO_CLIENT_ID|gusto_client_id)[=:\\s\"'']+([a-f0-9]{32,40})"
description = "Gusto API client ID with context anchor"
group = 1

[[detector.patterns]]
regex = "(?:GUSTO_CLIENT_SECRET|gusto_client_secret)[=:\\s\"'']+([a-f0-9]{32,64})"
description = "Gusto API client secret with context anchor"
group = 1

[[detector.patterns]]
regex = "(?:GUSTO_ACCESS_TOKEN|gusto_access_token)[=:\\s\"'']+([a-zA-Z0-9_-]{20,})"
description = "Gusto access token with context anchor"
group = 1
