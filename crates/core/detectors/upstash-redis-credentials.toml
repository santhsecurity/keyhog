# Docs: https://docs.upstash.com/redis
# Format: https://UPSTASH_REDIS_REST_URL + UPSTASH_REDIS_REST_TOKEN
# Verify: GET /get/key with Bearer token (using REST API)
# Prefix: none (URL-based with companion token)

[detector]
id = "upstash-redis-credentials"
name = "Upstash Redis Credentials"
service = "upstash"
severity = "critical"
keywords = ["UPSTASH_REDIS", "upstash.io", "UPSTASH_REDIS_REST_URL"]

[[detector.patterns]]
regex = "(https://[a-z0-9-]+\\.upstash\\.io)"
description = "Upstash Redis REST URL"
group = 1

[detector.companion]
regex = "UPSTASH_REDIS_REST_TOKEN[=:\\s\"'']+([A-Za-z0-9_-]+)"
within_lines = 5
name = "rest_token"
