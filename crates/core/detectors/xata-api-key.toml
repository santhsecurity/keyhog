# Docs: https://xata.io/docs/rest-api/authentication
# Format: xau_ prefix followed by 40+ alphanumeric characters
# Verify: GET /db with Authorization header returns 200 if valid
# Prefix: xau_

[detector]
id = "xata-api-key"
name = "Xata API Key"
service = "xata"
severity = "high"
keywords = ["xau_", "XATA_API_KEY", "xata.io"]

[[detector.patterns]]
regex = 'xau_[a-zA-Z0-9_-]{40,}'
description = "Xata API key (xau_ prefix)"

[detector.verify]
method = "GET"
url = "https://{workspace}.{region}.xata.sh/db"

[detector.verify.auth]
type = "bearer"
field = "match"

[detector.verify.success]
status = 200
