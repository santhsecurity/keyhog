# Docs: https://developers.facebook.com/docs/facebook-login/security
# Format: OAuth client secret (app secret) - 32 hexadecimal characters
# Verify: GET to graph.facebook.com/debug_token with app access token
# Prefix: none (requires context anchoring)

[detector]
id = "facebook-oauth-secret"
name = "Facebook OAuth Client Secret"
service = "facebook"
severity = "critical"
keywords = ["FACEBOOK_CLIENT_SECRET", "facebook_client_secret", "FB_APP_SECRET"]

[[detector.patterns]]
regex = "(?:FACEBOOK|facebook|FB)[_.]?(?:CLIENT|client|APP|app)[_.]?(?:SECRET|secret)[=:\\s\"'']+([a-f0-9]{32})"
description = "Facebook OAuth client secret (app secret) with context anchor"
group = 1
