# Docs: https://docs.mangopay.com/sdks/php
# Format: ClientId and API key (passphrase) for basic authentication
# Verify: no public verification endpoint
# Prefix: none (requires context anchoring)

[detector]
id = "mangopay-api-credentials"
name = "Mangopay API Credentials"
service = "mangopay"
severity = "critical"
keywords = ["MANGOPAY", "mangopay", "MangoPay", "MANGOPAY_CLIENT_ID", "MANGOPAY_API_KEY"]

[[detector.patterns]]
regex = "(?:MANGOPAY|mangopay|MangoPay)[_.]?(?:CLIENT_ID|client_id|CLIENTID|clientid)[=:\\s\"']+([a-zA-Z0-9_-]{12,})"
description = "Mangopay Client ID with context anchor"
group = 1

[[detector.patterns]]
regex = "(?:MANGOPAY|mangopay|MangoPay)[_.]?(?:API_KEY|api_key|APIKEY|apikey|PASSPHRASE|passphrase|PASSWORD|password)[=:\\s\"']+([a-zA-Z0-9_-]{24,})"
description = "Mangopay API key/passphrase with context anchor"
group = 1

[detector.companion]
regex = "(?:MANGOPAY|mangopay)[_.]?(?:CLIENT_ID|client_id)[=:\\s\"']+[a-zA-Z0-9_-]{12,}"
within_lines = 5
name = "Mangopay client ID"
