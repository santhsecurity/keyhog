# Docs: https://docs.pirsch.io/api-sdks/api-guide
# Format: Access keys start with "pa_" prefix followed by alphanumeric characters, or JWT tokens for OAuth
# Verify: GET /api/v1/domain with Bearer token returns 200 if valid
# Prefix: pa_

[detector]
id = "pirsch-api-token"
name = "Pirsch Analytics API Token"
service = "pirsch"
severity = "medium"
keywords = ["pa_", "PIRSCH_CLIENT_ID", "pirsch.io"]

[[detector.patterns]]
regex = "pa_[a-zA-Z0-9]{32,}"
description = "Pirsch access key starting with pa_ prefix"

[[detector.patterns]]
regex = "(?:PIRSCH[_\\-\\s]?CLIENT[_\\-\\s]?ID|pirsch[_\\-\\s]?client[_\\-\\s]?id)[=:\\s\"'']+([a-zA-Z0-9_-]{20,})"
description = "Pirsch OAuth client ID with context anchor"
group = 1
