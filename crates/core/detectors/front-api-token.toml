# Docs: https://dev.frontapp.com/docs/authentication
# Format: Bearer token (starts with fpt_ for OAuth, or long alphanumeric string)
# Verify: GET /conversations with Bearer token
# Prefix: fpt_

[detector]
id = "front-api-token"
name = "Front API Token"
service = "front"
severity = "critical"
keywords = ["fpt_", "FRONT", "front_api", "front_token"]

[[detector.patterns]]
regex = "fpt_[a-zA-Z0-9_-]{40,100}"
description = "Front OAuth access token (fpt_ prefix)"

[[detector.patterns]]
regex = "(?i)(?:FRONT|front)[_\\s]?(?:API[_\\s]?TOKEN|TOKEN|KEY)[=:\\s\"'']+([a-f0-9]{32,64})"
description = "Front API token with context anchor"
group = 1

[detector.verify]
method = "GET"
url = "https://api2.frontapp.com/me"

[detector.verify.auth]
type = "bearer"
field = "match"

[detector.verify.success]
status = 200
