# Docs: https://modal.com/docs/guide/secrets
# Format: Modal API token or modal-key/modal-secret header combination
# Verify: no public verification endpoint
# Prefix: none (requires context anchoring)

[detector]
id = "modal-api-token"
name = "Modal API Token"
service = "modal"
severity = "high"
keywords = ["MODAL_API_KEY", "MODAL_TOKEN", "modal-key", "modal-secret", "modal.run"]

[[detector.patterns]]
regex = "(?:MODAL_API_KEY|MODAL_TOKEN)[=:\\s\"\\']+([a-zA-Z0-9_-]{20,})"
description = "Modal API token from environment variable"
group = 1

[[detector.patterns]]
regex = "(?:modal-key|modal_key)[=:\\s\"\\']+([a-zA-Z0-9_-]{10,})"
description = "Modal key header"
group = 1

[[detector.patterns]]
regex = "(?:modal-secret|modal_secret)[=:\\s\"\\']+([a-zA-Z0-9_-]{20,})"
description = "Modal secret paired with modal key"
group = 1
