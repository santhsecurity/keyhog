# Docs: https://www.contentful.com/developers/docs/references/authentication/
# Format: CFPAT- prefix followed by 43 alphanumeric, underscore, or hyphen chars
# Verify: GET request to Contentful users/me endpoint with Bearer token
# Prefix: CFPAT-

[detector]
id = "contentful-management-token"
name = "Contentful Management Token"
service = "contentful"
severity = "critical"
keywords = ["CFPAT-", "contentful"]

[[detector.patterns]]
regex = 'CFPAT-[a-zA-Z0-9_-]{43}'
description = "Contentful Personal Access Token (Management API)"

[detector.verify]
method = "GET"
url = "https://api.contentful.com/users/me"

[detector.verify.auth]
type = "bearer"
field = "match"

[detector.verify.success]
status = 200
