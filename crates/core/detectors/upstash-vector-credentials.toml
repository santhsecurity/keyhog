# Docs: https://upstash.com/docs/vector/sdks/ts/getting-started
# Format: UPSTASH_VECTOR_REST_URL (https://*.upstash.io) and UPSTASH_VECTOR_REST_TOKEN (alphanumeric)
# Verify: POST /query with Bearer token returns 200 if valid
# Prefix: none (requires context anchoring)

[detector]
id = "upstash-vector-credentials"
name = "Upstash Vector Credentials"
service = "upstash"
severity = "high"
keywords = ["UPSTASH_VECTOR", "VECTOR_REST_URL", "VECTOR_REST_TOKEN"]

[[detector.patterns]]
regex = "(?:UPSTASH_VECTOR_REST_URL|UPSTASH[_-]VECTOR[_-]URL)[=:\\s\"'']+(https://[a-zA-Z0-9_-]+\\.upstash\\.io)"
description = "Upstash Vector REST URL with context anchor"
group = 1

[[detector.patterns]]
regex = "(?:UPSTASH_VECTOR_REST_TOKEN|UPSTASH[_-]VECTOR[_-]TOKEN)[=:\\s\"'']+([a-zA-Z0-9_-]{20,})"
description = "Upstash Vector REST token with context anchor"
group = 1

[detector.verify]
method = "GET"
url = "https://{{match}}/stats"

[detector.verify.auth]
type = "bearer"
field = "companion"

[detector.verify.success]
status = 200
