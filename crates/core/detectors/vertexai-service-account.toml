# Docs: https://cloud.google.com/vertex-ai/docs/authentication
# Format: Service account JSON with type, project_id, private_key, client_email fields
# Verify: no public verification endpoint
# Prefix: none (requires context anchoring)

[detector]
id = "vertexai-service-account"
name = "Google Vertex AI Service Account"
service = "vertexai"
severity = "critical"
keywords = ["service_account", "vertex-ai", "GOOGLE_APPLICATION_CREDENTIALS", "project_id", "private_key_id"]

[[detector.patterns]]
regex = "(?i)(?:type[\"\\']?\\s*[:=]\\s*[\"\\']?service_account[\"\\']?.*project_id[\"\\']?\\s*[:=]\\s*[\"\\']?[a-z0-9-]+[\"\\']?.*private_key[\"\\']?\\s*[:=]\\s*[\"\\']?-----BEGIN PRIVATE KEY-----)"
description = "Google Vertex AI service account JSON with private key"

[[detector.patterns]]
regex = "(?i)(?:GOOGLE_APPLICATION_CREDENTIALS|GOOGLE_CLOUD_PROJECT|VERTEXAI_PROJECT|VERTEXAI_LOCATION)"
description = "Google Vertex AI environment variable context"
