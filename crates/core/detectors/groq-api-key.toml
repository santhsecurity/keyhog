# Docs: https://console.groq.com/docs/overview
# Format: gsk_ prefix followed by 52 alphanumeric characters
# Verify: GET request to Groq API /models endpoint with Bearer token
# Prefix: gsk_

[detector]
id = "groq-api-key"
name = "Groq API Key"
service = "groq"
severity = "critical"
keywords = ["gsk_"]

[[detector.patterns]]
regex = 'gsk_[a-zA-Z0-9]{52}'
description = "Groq API key (gsk_)"

[detector.verify]
method = "GET"
url = "https://api.groq.com/openai/v1/models"

[detector.verify.auth]
type = "bearer"
field = "match"

[detector.verify.success]
status = 200
