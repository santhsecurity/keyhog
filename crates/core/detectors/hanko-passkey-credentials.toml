# Docs: https://docs.hanko.io/passkey-api/setup-passkey-project
# Format: API Secret with hanko_ or corbado1_ prefix followed by alphanumeric string
# Verify: no public verification endpoint (requires project context)
# Prefix: hanko_ or corbado1_

[detector]
id = "hanko-passkey-credentials"
name = "Hanko Passkey API Credentials"
service = "hanko"
severity = "critical"
keywords = ["HANKO_API_SECRET", "PASSKEYS_API_KEY", "hanko_", "corbado1_"]

[[detector.patterns]]
regex = "(?:hanko_|corbado1_)[a-zA-Z0-9_-]{20,}"
description = "Hanko Passkey API secret (hanko_ or corbado1_ prefix)"

[detector.companion]
regex = "(?:HANKO_TENANT_ID|PASSKEYS_TENANT_ID|tenant[_-]?id)[\"\\']?\\s*[:=]\\s*[\"\\']([a-zA-Z0-9_-]+)[\"\\']"
within_lines = 5
name = "tenant_id"
