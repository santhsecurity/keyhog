# Docs: https://developers.dwolla.com/
# Format: client_id and client_secret for OAuth2 authentication
# Verify: POST /token with Basic Auth to obtain access token
# Prefix: none (requires context anchoring)

[detector]
id = "dwolla-client-credentials"
name = "Dwolla Client Credentials"
service = "dwolla"
severity = "critical"
keywords = ["DWOLLA_CLIENT_ID", "DWOLLA_CLIENT_SECRET", "dwolla_key", "dwolla_secret"]

[[detector.patterns]]
regex = "(?:DWOLLA|dwolla)[._-]?(?:CLIENT|client)?[._-]?(?:ID|id)[=:\\s\"'']+([a-zA-Z0-9-]{20,50})"
description = "Dwolla Client ID for OAuth2 authentication"
group = 1

[[detector.patterns]]
regex = "(?:DWOLLA|dwolla)[._-]?(?:CLIENT|client)?[._-]?(?:SECRET|secret)[=:\\s\"'']+([a-zA-Z0-9_-]{30,60})"
description = "Dwolla Client Secret for OAuth2 authentication"
group = 1
