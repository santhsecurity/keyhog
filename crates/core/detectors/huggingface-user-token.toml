# Docs: https://huggingface.co/docs/hub/en/security-tokens
# Format: hf_ prefix followed by 34+ alphanumeric characters (user access tokens)
# Verify: GET /api/whoami-v2 with Bearer token returns 200 if valid
# Prefix: hf_

[detector]
id = "huggingface-user-token"
name = "HuggingFace User Access Token"
service = "huggingface"
severity = "high"
keywords = ["hf_"]

[[detector.patterns]]
regex = 'hf_[a-zA-Z0-9]{34,}'
description = "HuggingFace user access token (hf_ prefix)"

[detector.verify]
method = "GET"
url = "https://huggingface.co/api/whoami-v2"

[detector.verify.auth]
type = "bearer"
field = "match"

[detector.verify.success]
status = 200

[[detector.verify.metadata]]
name = "username"
json_path = "$.name"

[[detector.verify.metadata]]
name = "email"
json_path = "$.email"
