# Docs: https://api-docs.incident.io/
# Format: Bearer token with no distinct prefix, typically 40+ alphanumeric characters
# Verify: GET /v1/audit_logs with Authorization header
# Prefix: none (requires context anchoring)

[detector]
id = "incident-io-api-key"
name = "incident.io API Key"
service = "incidentio"
severity = "critical"
keywords = ["INCIDENT_IO_API_KEY", "incident.io", "INCIDENT_API_KEY"]

[[detector.patterns]]
regex = "(?:INCIDENT_IO|INCIDENTIO|incident\\.io)[_\\s]*API[_\\s]*KEY[=:\\s\"\\']+([a-zA-Z0-9]{40,})"
description = "incident.io API key with context anchor"
group = 1

[detector.verify]
method = "GET"
url = "https://api.incident.io/v1/audit_logs"

[detector.verify.auth]
type = "bearer"
field = "match"

[detector.verify.success]
status = 200
