# Docs: https://github.com/seaweedfs/seaweedfs/wiki/Amazon-S3-API
# Format: configurable access key (5-20+ chars) and secret key (8-100+ chars)
# Verify: none (self-hosted, no standard verification endpoint)
# Prefix: none (requires context anchoring)

[detector]
id = "seaweedfs-credentials"
name = "SeaweedFS S3 Credentials"
service = "seaweedfs"
severity = "high"
keywords = ["SEAWEEDFS", "seaweedfs", "SEAWEED", "seaweed", "WEED", "weed"]

[[detector.patterns]]
regex = "(?:SEAWEED|seaweed|WEED|weed)[._-]?(?:FS|fs)?[._-]?(?:ACCESS[._-]?)?(?:KEY|key)[=:\\s\"'']+([a-zA-Z0-9_-]{5,40})"
description = "SeaweedFS access key with context anchor"
group = 1

[detector.companion]
regex = "[a-zA-Z0-9+/=]{8,100}"
within_lines = 5
name = "secret_key"
