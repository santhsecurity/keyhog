# Docs: https://developer.kaltura.com/api-docs/VPaaS-API-Getting-Started/Getting-Started.html
# Format: Partner ID is numeric; Admin Secret and User Secret are 32+ alphanumeric
# Verify: POST to /api_v3/service/session/action/start with credentials
# Prefix: none (requires context anchoring)

[detector]
id = "kaltura-api-credentials"
name = "Kaltura API Credentials"
service = "kaltura"
severity = "high"
keywords = ["kaltura", "KALTURA", "kaltura.com", "PARTNER_ID", "ADMIN_SECRET", "USER_SECRET"]

[[detector.patterns]]
regex = "(?:kaltura|KALTURA)[_\\s]?(?:partner_id|PARTNER_ID|pid)[=:\\s\"'']+(\\d{5,10})"
description = "Kaltura Partner ID with context anchor"
group = 1

[[detector.patterns]]
regex = "(?:kaltura|KALTURA)[_\\s]?(?:admin_secret|ADMIN_SECRET)[=:\\s\"'']+([a-f0-9]{32,64})"
description = "Kaltura Admin Secret with context anchor"
group = 1

[[detector.patterns]]
regex = "(?:kaltura|KALTURA)[_\\s]?(?:user_secret|USER_SECRET)[=:\\s\"'']+([a-f0-9]{32,64})"
description = "Kaltura User Secret with context anchor"
group = 1

[[detector.patterns]]
regex = "KALTURA_PARTNER_ID[=:\\s\"'']+(\\d{5,10})"
description = "Kaltura Partner ID from environment variable"
group = 1

[[detector.patterns]]
regex = "KALTURA_ADMIN_SECRET[=:\\s\"'']+([a-f0-9]{32,64})"
description = "Kaltura Admin Secret from environment variable"
group = 1
