# Docs: https://docs.apify.com/api/v2/getting-started
# Format: apify_api_ prefix followed by alphanumeric characters
# Verify: GET /v2/users/me with Bearer token returns 200 if valid
# Prefix: apify_api_

[detector]
id = "apify-api-token"
name = "Apify API Token"
service = "apify"
severity = "critical"
keywords = ["apify_api_", "APIFY_TOKEN", "apify"]

[[detector.patterns]]
regex = 'apify_api_[a-zA-Z0-9_-]{20,}'
description = "Apify API token with apify_api_ prefix"

[detector.verify]
method = "GET"
url = "https://api.apify.com/v2/users/me"

[detector.verify.auth]
type = "bearer"
field = "match"

[detector.verify.success]
status = 200
