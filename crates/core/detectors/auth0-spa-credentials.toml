# Docs: https://auth0.com/docs/quickstart/spa
# Format: Auth0 SPA client_id and client_secret pair, or domain with client_id
# Verify: no public verification endpoint (requires Auth0 domain)
# Prefix: none (requires context anchoring)

[detector]
id = "auth0-spa-credentials"
name = "Auth0 SPA Application Credentials"
service = "auth0"
severity = "high"
keywords = ["auth0", "client_id", "client_secret", "domain", "AUTH0_CLIENT"]

[[detector.patterns]]
regex = "(?:auth0|AUTH0)[\\s\\S]{0,100}?client_id[\"\\']?\\s*[:=]\\s*[\"\\']([a-zA-Z0-9_-]{20,})[\"\\']"
description = "Auth0 SPA client ID with context"
group = 1

[detector.companion]
regex = "(?:domain|AUTH0_DOMAIN)[\"\\']?\\s*[:=]\\s*[\"\\']([a-zA-Z0-9_-]+\\.auth0\\.com)[\"\\']"
within_lines = 5
name = "auth0_domain"
