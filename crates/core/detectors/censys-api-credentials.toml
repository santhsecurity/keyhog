# Docs: https://docs.censys.io/reference/getaccount
# Format: API ID (UUID format) and API Secret (32 hex chars)
# Verify: GET /v1/account with basic auth returns 200 if valid
# Prefix: none (requires context anchoring)

[detector]
id = "censys-api-credentials"
name = "Censys API Credentials"
service = "censys"
severity = "high"
keywords = ["CENSYS_API_ID", "CENSYS_API_SECRET", "censys"]

[[detector.patterns]]
regex = "(?:CENSYS|censys)[_\\s]?(?:API)?[_\\s]?ID[=:\\s\"'']+([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})"
description = "Censys API ID (UUID format) with context anchor"
group = 1

[[detector.patterns]]
regex = "(?:CENSYS|censys)[_\\s]?(?:API)?[_\\s]?SECRET[=:\\s\"'']+([a-f0-9]{32})"
description = "Censys API Secret with context anchor"
group = 1

[detector.companion]
regex = "(?:CENSYS|censys)[_\\s]?(?:API)?[_\\s]?(?:ID|SECRET)[=:\\s\"'']+([a-zA-Z0-9-]+)"
within_lines = 5
name = "censys_pair"
