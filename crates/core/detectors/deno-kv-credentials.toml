# Docs: https://docs.deno.com/deploy/kv/manual/
# Format: Deno KV access token with ddn or ddc prefix followed by 64+ hex chars
# Verify: no public verification endpoint
# Prefix: ddn_ or ddc_

[detector]
id = "deno-kv-credentials"
name = "Deno KV Access Token"
service = "deno"
severity = "critical"
keywords = ["ddn_", "ddc_", "DENO_KV", "denokv"]

[[detector.patterns]]
regex = 'dd[npc]_[a-f0-9]{64}'
description = "Deno KV access token (ddn_, ddp_, or ddc_ prefix)"
