# Docs: https://learn.microsoft.com/en-us/azure/key-vault/general/authentication
# Format: Key Vault URLs follow https://{vault-name}.vault.azure.net/ pattern
# Verify: GET /secrets with Azure AD token returns 200 if valid
# Prefix: https://*.vault.azure.net

[detector]
id = "azure-key-vault-credentials"
name = "Azure Key Vault Credential"
service = "azure-key-vault"
severity = "critical"
keywords = [".vault.azure.net", "azure_keyvault", "keyvault"]

[[detector.patterns]]
regex = 'https://[a-zA-Z0-9-]+\.vault\.azure\.net/?'
description = "Azure Key Vault URL endpoint"

# Companion: Azure AD token or client credentials
[detector.companion]
regex = '(?:AZURE_|azure_)(?:CLIENT_ID|client_id|TENANT_ID|tenant_id|CLIENT_SECRET|client_secret)'
within_lines = 10
name = "Azure AD credentials"
