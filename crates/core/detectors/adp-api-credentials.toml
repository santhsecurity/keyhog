# Docs: https://developers.adp.com/articles/get-started
# Format: OAuth 2.0 Client ID and Client Secret with SSL certificate authentication
# Verify: POST /auth/oauth/v2/token with client credentials and mTLS
# Prefix: none (requires context anchoring)

[detector]
id = "adp-api-credentials"
name = "ADP API Credentials"
service = "adp"
severity = "critical"
keywords = ["ADP_CLIENT_ID", "ADP_CLIENT_SECRET", "adp"]

[[detector.patterns]]
regex = "(?:ADP_CLIENT_ID|adp_client_id)[=:\\s\"'']+([a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12})"
description = "ADP API client ID (UUID format) with context anchor"
group = 1

[[detector.patterns]]
regex = "(?:ADP_CLIENT_SECRET|adp_client_secret)[=:\\s\"'']+([a-f0-9]{32,})"
description = "ADP API client secret with context anchor"
group = 1

[[detector.patterns]]
regex = "(?:ADP_ACCESS_TOKEN|adp_access_token)[=:\\s\"'']+([a-zA-Z0-9_-]{20,})"
description = "ADP access token with context anchor"
group = 1
