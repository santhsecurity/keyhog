# Docs: https://github.com/LambdaTest/Appium-Cloud
# Format: 32 character hexadecimal access key used with username for HTTP Basic Auth
# Verify: GET /automate/api/v1/platforms with Basic auth returns 200 if valid
# Prefix: none (hexadecimal, requires context keyword or companion detection)

[detector]
id = "appium-cloud-credentials"
name = "Appium Cloud Credentials"
service = "appium-cloud"
severity = "high"
keywords = ["LT_ACCESS_KEY", "lt_access_key", "LAMBDATEST_ACCESS_KEY", "lambdatest_access_key"]

[[detector.patterns]]
regex = "(?:LT_ACCESS_KEY|lt_access_key|LAMBDATEST_ACCESS_KEY|lambdatest_access_key)[=:\\s\"'']+([a-f0-9]{32})"
description = "LambdaTest Appium Cloud access key (32 hex chars) with context anchor"
group = 1

[detector.companion]
regex = "(?:LT_USERNAME|lt_username|LAMBDATEST_USERNAME|lambdatest_username)[=:\\s\"'']+([a-zA-Z0-9_-]+)"
within_lines = 5
name = "lambdatest-username"
