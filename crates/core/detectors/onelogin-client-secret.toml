# Docs: https://developers.onelogin.com/api-docs/1/getting-started/working-with-api-credentials
# Format: 64-character hexadecimal string (OAuth2 client secret)
# Verify: POST /auth/oauth2/v2/token with Basic auth (client_id:client_secret)
# Prefix: none (generic hex, requires keyword context)

[detector]
id = "onelogin-client-secret"
name = "OneLogin Client Secret"
service = "onelogin"
severity = "critical"
keywords = ["ONELOGIN", "onelogin", "client_secret", "CLIENT_SECRET"]

[[detector.patterns]]
regex = "(?:ONELOGIN|onelogin)[._]?(?:CLIENT|client)?[._]?SECRET[=:\\s\"']+([a-f0-9]{64})"
description = "OneLogin OAuth2 client secret with context anchor"
group = 1

[detector.verify]
method = "POST"
url = "https://api.us.onelogin.com/auth/oauth2/v2/token"

[detector.verify.auth]
type = "basic"
username = "match"
password = ""

[detector.verify.success]
status = 200
