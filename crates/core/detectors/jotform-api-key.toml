# Docs: https://api.jotform.com/docs/
# Format: 32 character hex string
# Verify: GET /user with API key returns 200 if valid
# Prefix: none (requires context anchoring)

[detector]
id = "jotform-api-key"
name = "JotForm API Key"
service = "jotform"
severity = "high"
keywords = ["jotform", "JOTFORM_API_KEY", "jotform_key"]

[[detector.patterns]]
regex = "(?:jotform|JOTFORM)[_.\\s]*(?:api[_\\s]*key|API[_\\s]*KEY)[\\s\"''']+([a-f0-9]{32})"
description = "JotForm API key with context anchor"
group = 1

[detector.verify]
method = "GET"
url = "https://api.jotform.com/user"

[detector.verify.auth]
type = "query"
param = "apiKey"
field = "match"

[detector.verify.success]
status = 200
