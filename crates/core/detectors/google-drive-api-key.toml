# Docs: https://developers.google.com/drive/api/guides/api-key
# Format: AIza + 35 alphanumeric characters (same format as other Google API keys)
# Verify: GET request to Google Drive API with key parameter
# Prefix: AIza

[detector]
id = "google-drive-api-key"
name = "Google Drive API Key"
service = "google-drive"
severity = "critical"
keywords = ["AIza", "DRIVE_API_KEY", "GOOGLE_DRIVE"]

[[detector.patterns]]
regex = 'AIza[0-9A-Za-z_-]{35}'
description = "Google Drive API Key (AIza prefix)"

[[detector.patterns]]
regex = '''(?:DRIVE|GOOGLE_DRIVE)[._-]?API[._-]?KEY[=:\s"']+([a-zA-Z0-9_-]{30,})'''
description = "Google Drive API key with context anchor"
group = 1

[detector.verify]
method = "GET"
url = "https://www.googleapis.com/drive/v3/about?fields=user&key={{match}}"

[detector.verify.auth]
type = "query"
param = "key"
field = "match"

[detector.verify.success]
status = 200
