# Docs: https://openapi-v2.exoscale.com/topic/topic-api-request-signature
# Format: API key starts with EXO followed by 20 hex chars, API secret is 44 base64-like chars
# Verify: GET /v2/api-key with Authorization: Bearer token returns 200 if valid
# Prefix: EXO (for API key)

[detector]
id = "exoscale-api-credentials"
name = "Exoscale API Credentials"
service = "exoscale"
severity = "critical"
keywords = ["EXO", "EXOSCALE_API_KEY", "EXOSCALE_API_SECRET", "exoscale"]

[[detector.patterns]]
regex = "(?:EXOSCALE_API_KEY|exoscale_api_key)[=:\\s\"'']+(EXO[0-9a-f]{20})"
description = "Exoscale API key (EXO prefix)"
group = 1

[[detector.patterns]]
regex = "(?:EXOSCALE_API_SECRET|exoscale_api_secret)[=:\\s\"'']+([A-Za-z0-9+/]{40,}={0,2})"
description = "Exoscale API secret with context anchor"
group = 1

[detector.companion]
regex = "(?:EXOSCALE_API_SECRET|exoscale_api_secret)[=:\\s\"'']+([A-Za-z0-9+/]{40,}={0,2})"
within_lines = 5
name = "api_secret"

[detector.verify]
method = "GET"
url = "https://api.exoscale.com/v2/api-key"

[detector.verify.auth]
type = "header"
name = "Authorization"
template = "Bearer {{match}}"

[detector.verify.success]
status = 200
