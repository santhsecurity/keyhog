# Docs: https://platform.text.com/docs/authorization/agent-authorization
# Format: Personal Access Token (PAT) - 60+ alphanumeric characters
# Verify: GET /v3.3/configuration/action/get_agent with Basic auth
# Prefix: dal: (deprecated) or none (requires context anchoring)

[detector]
id = "livechat-api-token"
name = "LiveChat Personal Access Token"
service = "livechat"
severity = "high"
keywords = ["LIVECHAT", "livechat_pat", "livechat_token", "dal:"]

[[detector.patterns]]
regex = "dal:[a-zA-Z0-9_-]{20,60}"
description = "LiveChat deprecated access token (dal: prefix)"

[[detector.patterns]]
regex = "(?i)(?:LIVECHAT|livechat)[_\\s]?(?:PAT|TOKEN|API[_\\s]?KEY|ACCESS[_\\s]?TOKEN)[=:\\s\"'']+([A-Za-z0-9_-]{60,})"
description = "LiveChat Personal Access Token with context anchor"
group = 1
