# Docs: https://developer.atlassian.com/cloud/trello/guides/rest-api/api-introduction/
# Format: Variable-length alphanumeric string (often looks like base64)
# Verify: GET /1/tokens/{token} returns token info if valid
# Prefix: none (requires context anchoring)

[detector]
id = "trello-api-token"
name = "Trello API Token"
service = "trello"
severity = "critical"
keywords = ["TRELLO_TOKEN", "TRELLO_API_TOKEN"]

[[detector.patterns]]
regex = "(?:TRELLO_TOKEN|TRELLO_API_TOKEN)[=:\\s\"'']+([A-Za-z0-9_-]{50,100})"
description = "Trello API token with context anchor"
group = 1

[detector.verify]
method = "GET"
url = "https://api.trello.com/1/tokens/{{match}}"

[detector.verify.auth]
type = "none"

[detector.verify.success]
status = 200
