# Docs: https://docs.daily.co/reference/rest-api
# Format: 64-character alphanumeric string (no unique prefix)
# Verify: GET /v1/rooms with Bearer token returns 200 if valid
# Prefix: none (requires context anchoring)

[detector]
id = "daily-co-api-key"
name = "Daily.co API Key"
service = "daily"
severity = "critical"
keywords = ["DAILY_API_KEY", "daily", "api_key", "DAILY"]

[[detector.patterns]]
regex = "(?:DAILY_API_KEY|daily_api_key)[\"\\'\\s]*[=:]\\s*[\"\\']?([a-f0-9]{64})[\"\\']?"
description = "Daily.co API key with context anchor (64 hex characters)"
group = 1

[[detector.patterns]]
regex = "(?:daily\\.co|DAILY_CO)[\"\\'\\s]*[=:]\\s*[\"\\']?([a-f0-9]{64})[\"\\']?"
description = "Daily.co API key with service context"
group = 1

[detector.verify]
method = "GET"
url = "https://api.daily.co/v1/rooms"

[detector.verify.auth]
type = "bearer"
field = "match"

[detector.verify.success]
status = 200
