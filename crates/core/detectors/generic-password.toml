# Generic password detector for config files, docker-compose, and env vars.
# No lookaheads — Rust regex doesn't support them.
# Verify: no verification endpoint (generic detector, service unknown)

[detector]
id = "generic-password"
name = "Generic Password"
service = "generic"
severity = "high"
keywords = ["password", "passwd", "pwd", "PASSWORD", "REDIS_PASSWORD", "DB_PASSWORD", "MYSQL_PASSWORD"]

[[detector.patterns]]
# PASSWORD=value (12+ chars, alphanumeric + special)
regex = "(?i)(?:_?password|_?passwd|_?pwd)\\s*[:=]\\s*[\"']?([a-zA-Z0-9!@#$%^&*+=/_-]{12,80})[\"']?"
description = "Password assignment with complex value"
group = 1

[[detector.patterns]]
# Inline connection string password: ://user:PASSWORD@host
regex = "://[^:\"'\\s]+:([a-zA-Z0-9!@#$%^&*+=_-]{8,64})@[a-zA-Z0-9._-]"
description = "Password in connection string URL"
group = 1

[[detector.patterns]]
# YAML multiline: password: |\n  VALUE or password: >\n  VALUE
regex = "(?i)(?:password|passwd|secret):\\s*[|>]\\s*\\n\\s+([a-zA-Z0-9/+=_-]{12,80})"
description = "Password in YAML multiline block (| or >)"
group = 1

[[detector.patterns]]
# XML attribute: password="VALUE"
regex = "(?i)(?:password|passwd|secret|token)\\s*=\\s*\"([a-zA-Z0-9/+=_-]{12,80})\""
description = "Password in XML/HTML attribute"
group = 1

# No verify block - generic detector matches many services, no single verification endpoint
