# Docs: https://developer.doordash.com/en-US/docs/marketplace/overview/getting_started/jwts_getting_started/
# Format: JWT-based auth - Developer ID, Key ID, and Signing Secret
# Verify: POST /drive/v2/deliveries with JWT Bearer token
# Prefix: none (requires context anchoring)

[detector]
id = "doordash-api-credentials"
name = "DoorDash API Credentials"
service = "doordash"
severity = "critical"
keywords = ["DOORDASH_DEVELOPER_ID", "DOORDASH_KEY_ID", "DOORDASH_SIGNING_SECRET", "doordash", "developer_id"]

[[detector.patterns]]
regex = "(?:DOORDASH|doordash)[_=:\\s\"'']+(?:developer_id|developerId)[=:\\s\"'']+([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})"
description = "DoorDash Developer ID (UUID format) with context anchor"
group = 1

[[detector.patterns]]
regex = "(?:DOORDASH|doordash)[_=:\\s\"'']+(?:key_id|keyId)[=:\\s\"'']+([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})"
description = "DoorDash Key ID (UUID format) with context anchor"
group = 1

[[detector.patterns]]
regex = "(?:DOORDASH|doordash)[_=:\\s\"'']+(?:signing_secret|signingSecret)[=:\\s\"'']+([a-zA-Z0-9_-]{20,})"
description = "DoorDash Signing Secret with context anchor"
group = 1

[[detector.patterns]]
regex = "(?:DOORDASH|doordash)[_=:\\s\"'']+(?:access_key|accessKey|api_key|apiKey)[=:\\s\"'']+([a-zA-Z0-9_-]{20,})"
description = "DoorDash Access Key with context anchor"
group = 1
