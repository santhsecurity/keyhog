# Docs: https://developers.expediagroup.com/xap-apis/api/integration-guide/authentication-and-authorization
# Format: XAP API Key and Authorization string (Base64 encoded)
# Verify: GET /xap/pricing/v1/hotels with Authorization header
# Prefix: none (requires context anchoring)

[detector]
id = "expedia-api-credentials"
name = "Expedia API Credentials"
service = "expedia"
severity = "high"
keywords = ["EXPEDIA_API_KEY", "EXPEDIA", "x-api-key", "expedia"]

[[detector.patterns]]
regex = "(?:EXPEDIA|expedia)[_\\s]?(?:API_KEY|api_key|KEY|key)[=:\\s\"'']+([a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12})"
description = "Expedia XAP API key UUID format"
group = 1

[[detector.patterns]]
regex = "(?:EXPEDIA|expedia)[_\\s]?(?:API_KEY|api_key|KEY|key)[=:\\s\"'']+([A-Za-z0-9_-]{20,50})"
description = "Expedia API key generic format"
group = 1

[detector.verify]
method = "GET"
url = "https://api.expediagroup.com/xap/pricing/v1/hotels"

[detector.verify.auth]
type = "header"
name = "Authorization"
template = "Basic {{match}}"

[detector.verify.success]
status = 200
