# Docs: https://developer.trulioo.com/
# Format: OAuth2 Client ID and Client Secret, or Basic Auth credentials
# Verify: no public verification endpoint
# Prefix: none (requires context anchoring)

[detector]
id = "trulioo-api-credentials"
name = "Trulioo API Credentials"
service = "trulioo"
severity = "high"
keywords = ["trulioo", "TRULIOO", "client_id", "client_secret"]

[[detector.patterns]]
regex = "(?:trulioo|TRULIOO)[_\\s]*(client[_\\s]*id)[=:;\\s\"'']+([a-zA-Z0-9_-]{10,})"
description = "Trulioo Client ID with context anchor"
group = 2

[[detector.patterns]]
regex = "(?:trulioo|TRULIOO)[_\\s]*(client[_\\s]*secret)[=:;\\s\"'']+([a-zA-Z0-9_-]{10,})"
description = "Trulioo Client Secret with context anchor"
group = 2

[detector.companion]
regex = "(?:trulioo|TRULIOO)[_\\s]*(client[_\\s]*secret)[=:;\\s\"'']+([a-zA-Z0-9_-]{10,})"
within_lines = 5
name = "trulioo_client_secret"
