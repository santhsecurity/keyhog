# Docs: https://supabase.com/docs/guides/auth/signing-keys
# Format: Alphanumeric string, minimum 32 characters (legacy) or asymmetric keys
# Verify: no public verification endpoint (self-hosted only)
# Prefix: none (requires context anchoring)

[detector]
id = "supabase-jwt-secret"
name = "Supabase JWT Secret"
service = "supabase"
severity = "critical"
keywords = ["JWT_SECRET", "SUPABASE_JWT_SECRET", "jwt_secret"]

[[detector.patterns]]
regex = "SUPABASE[_-]?JWT[_-]?SECRET[=:\\s\"'']+([a-zA-Z0-9_-]{32,})"
description = "Supabase JWT signing secret with context anchor"
group = 1

[[detector.patterns]]
regex = "SUPABASE[_-]?JWT[_-]?SECRET[=:\\s\"'']+([a-zA-Z0-9+/]{40,}=*)"
description = "Supabase JWT signing secret (base64 encoded) with context anchor"
group = 1
