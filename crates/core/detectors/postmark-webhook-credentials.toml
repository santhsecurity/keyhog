# Docs: https://postmarkapp.com/developer/webhooks/webhooks-overview
# Format: String starting with 'wh_' followed by alphanumeric characters
# Verify: no public verification endpoint (webhook signature verification only)
# Prefix: wh_

[detector]
id = "postmark-webhook-credentials"
name = "Postmark Webhook Secret"
service = "postmark"
severity = "medium"
keywords = ["wh_", "POSTMARK_WEBHOOK", "postmark_webhook"]

[[detector.patterns]]
regex = "wh_[a-zA-Z0-9_-]{30,}"
description = "Postmark webhook secret token (wh_ prefix)"

[[detector.patterns]]
regex = "(?:POSTMARK|postmark)[._-]?(?:WEBHOOK|webhook)[._-]?(?:SECRET|secret|TOKEN|token|KEY|key)[=:\\s\"'']+(wh_[a-zA-Z0-9_-]{30,})"
description = "Postmark webhook secret with context anchor"
group = 1
