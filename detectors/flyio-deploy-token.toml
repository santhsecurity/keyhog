# Docs: https://fly.io/docs/security/tokens/
# Format: fo1_ prefix followed by alphanumeric characters (Fly.io deploy token)
# Verify: GET /v1/apps with Bearer token returns 200 if valid
# Prefix: fo1_

[detector]
id = "flyio-deploy-token"
name = "Fly.io Deploy Token"
service = "flyio"
severity = "critical"
keywords = ["fo1_", "fly", "deploy"]

[[detector.patterns]]
regex = "fo1_[a-zA-Z0-9_-]{40,}"
description = "Fly.io deploy token (fo1_ prefix)"

[[detector.patterns]]
regex = "(?:FLY|fly)[_\\-\\s]*(?:DEPLOY|deploy)[_\\-\\s]*(?:TOKEN|token)[=:\\s\"'\\']+(fo1_[a-zA-Z0-9_-]{40,})"
description = "Fly.io deploy token with context anchor"
group = 1

[detector.verify]
method = "GET"
url = "https://api.machines.dev/v1/apps"

[detector.verify.auth]
type = "bearer"
field = "match"

[detector.verify.success]
status = 200
