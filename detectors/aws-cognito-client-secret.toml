# Docs: https://docs.aws.amazon.com/cognito/latest/developerguide/user-pool-settings-client-apps.html
# Format: 40-128 character string (variable length client secret)
# Verify: POST to /oauth2/token endpoint with client credentials
# Prefix: none (requires context anchoring)

[detector]
id = "aws-cognito-client-secret"
name = "AWS Cognito Client Secret"
service = "aws"
severity = "high"
keywords = ["COGNITO_CLIENT_SECRET", "client_secret", "cognito"]

[[detector.patterns]]
regex = "(?:COGNITO[_-]?CLIENT[_-]?SECRET|COGNITO[_-]?SECRET|AWS[_-]?COGNITO[_-]?SECRET)[=:\\s\"'']+([a-zA-Z0-9]{40,128})"
description = "AWS Cognito client secret with context anchor"
group = 1

[detector.verify]
method = "GET"
url = "https://api.aws.amazon.com/v1/me"

[detector.verify.auth]
type = "header"
name = "Authorization"
template = "Bearer {{match}}"

[detector.verify.success]
status = 200
