# Docs: https://github.com/okta/okta-signin-widget/blob/master/docs/classic.md
# Format: Okta Sign-In Widget configuration with clientId and redirectUri
# Verify: no public verification endpoint (requires Okta domain context)
# Prefix: none (requires context anchoring)

[detector]
id = "okta-widget-api-credentials"
name = "Okta Sign-In Widget API Credentials"
service = "okta"
severity = "high"
keywords = ["OktaSignIn", "clientId", "redirectUri", "baseUrl"]

[[detector.patterns]]
regex = "(?:OktaSignIn|okta-sign-in-widget)[\\s\\S]{0,200}?clientId[\"\\']?\\s*[:=]\\s*[\"\\']([a-zA-Z0-9_-]+)[\"\\']"
description = "Okta Sign-In Widget client ID in configuration"
group = 1

[[detector.companions]]
name = "redirectUri"
regex = "redirectUri[\"\\']?\\s*[:=]\\s*[\"\\'](https?://[^\"\\']+)[\"\\']"
within_lines = 5
