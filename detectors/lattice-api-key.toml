# Docs: https://help.lattice.com/hc/en-us/articles/360059449534-Lattice-s-Public-API
# Format: API key (alphanumeric string) generated in Lattice Admin > Platform > API Keys
# Verify: GET /v1/users with Authorization header returns 200 if valid
# Prefix: none (requires context anchoring)

[detector]
id = "lattice-api-key"
name = "Lattice API Key"
service = "lattice"
severity = "critical"
keywords = ["LATTICE_API_KEY", "latticehq", "lattice"]

[[detector.patterns]]
regex = "(?:LATTICE_API_KEY|lattice_api_key)[=:\\s\"'']+([a-zA-Z0-9_-]{20,})"
description = "Lattice API key with context anchor"
group = 1

[[detector.patterns]]
regex = "(?:api\\.latticehq\\.com)[^\"'']*Authorization[^\"'']*([a-zA-Z0-9_-]{20,})"
description = "Lattice API key in URL or config with latticehq domain"
group = 1

[detector.verify]
method = "GET"
url = "https://api.latticehq.com/v1/users"

[detector.verify.auth]
type = "header"
name = "Authorization"
template = "{{match}}"

[detector.verify.success]
status = 200
