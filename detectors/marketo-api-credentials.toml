# Docs: https://developer.adobe.com/marketo-apis/api/authentication/
# Format: OAuth 2.0 client ID and client secret pair, plus Munchkin account ID
# Verify: POST /identity/oauth/token with client credentials
# Prefix: none (requires context anchoring)

[detector]
id = "marketo-api-credentials"
name = "Marketo API Credentials"
service = "marketo"
severity = "critical"
keywords = ["marketo", "munchkin", "client_id", "client_secret"]

[[detector.patterns]]
regex = '(?:MARKETO|marketo)[_-]*(?:CLIENT[_-]*ID|client[_-]*id)[=: ]+([a-zA-Z0-9]{20,})'
description = "Marketo Client ID with context anchor"
group = 1

[[detector.patterns]]
regex = '(?:MARKETO|marketo)[_-]*(?:CLIENT[_-]*SECRET|client[_-]*secret)[=: ]+([a-zA-Z0-9_-]{20,})'
description = "Marketo Client Secret with context anchor"
group = 1

[[detector.patterns]]
regex = '(?:MUNCHKIN|munchkin)[_-]*(?:ACCOUNT|account)?[_-]*(?:ID|id)?[=: ]+([a-zA-Z0-9]+)'
description = "Marketo Munchkin Account ID"
group = 1

[detector.verify]
method = "GET"
url = "https://developer.adobe.com/v1/me"

[detector.verify.auth]
type = "header"
name = "Authorization"
template = "Bearer {{match}}"

[detector.verify.success]
status = 200
