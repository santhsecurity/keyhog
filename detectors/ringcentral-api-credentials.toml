# Docs: https://developers.ringcentral.com/guide/authentication/quick-start
# Format: Client ID and Client Secret pair (OAuth2 client credentials)
# Verify: POST /restapi/oauth/token with client credentials
# Prefix: none (requires context anchoring)

[detector]
id = "ringcentral-api-credentials"
name = "RingCentral API Credentials"
service = "ringcentral"
severity = "critical"
keywords = ["ringcentral", "RINGCENTRAL", "RC_APP_CLIENT_ID", "RC_APP_CLIENT_SECRET"]

[[detector.patterns]]
regex = "(?i)(?:ringcentral|rc)[_\\-\\s]?(?:app[_\\-\\s]?)?(?:client[_\\-\\s]?id|clientid)[=:\\s\"'']+([a-zA-Z0-9_-]{20,40})"
description = "RingCentral Client ID with context anchor"
group = 1

[[detector.patterns]]
regex = "(?i)(?:ringcentral|rc)[_\\-\\s]?(?:app[_\\-\\s]?)?(?:client[_\\-\\s]?secret|clientsecret)[=:\\s\"'']+([a-zA-Z0-9_-]{20,40})"
description = "RingCentral Client Secret with context anchor"
group = 1

[[detector.companions]]
name = "ringcentral_client_pair"
regex = "(?i)(?:ringcentral|rc)[_\\-\\s]?(?:app[_\\-\\s]?)?(?:client[_\\-\\s]?(?:id|secret))[=:\\s\"'']+[a-zA-Z0-9_-]{20,40}"
within_lines = 5
