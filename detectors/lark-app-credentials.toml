# Docs: https://open.larksuite.com/document/home/develop-a-gadget-in-5-minutes/create-an-app
# Format: App ID starts with "cli_" followed by 16 alphanumeric characters
# Verify: none (requires app secret to verify)
# Prefix: cli_

[detector]
id = "lark-app-id"
name = "Lark/Feishu App ID"
service = "lark"
severity = "high"
keywords = ["cli_", "LARK_APP_ID", "lark_app_id", "FEISHU_APP_ID"]

[[detector.patterns]]
regex = "cli_[a-zA-Z0-9]{16}"
description = "Lark/Feishu App ID (cli_ prefix)"

[[detector.companions]]
name = "lark_app_secret"
regex = "[a-zA-Z0-9]{32}"
within_lines = 5
