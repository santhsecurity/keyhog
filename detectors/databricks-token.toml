# Docs: https://docs.databricks.com/en/dev-tools/auth/pat.html
# Format: dapi followed by 32+ hex characters, typically 40+ chars total
# Verify: GET /api/2.0/token/get with Bearer token returns 200 if valid
# Prefix: dapi

[detector]
id = "databricks-token"
name = "Databricks Personal Access Token"
service = "databricks"
severity = "critical"
keywords = ["dapi", "DATABRICKS", "databricks"]

[[detector.patterns]]
regex = "(dapi[a-f0-9]{32,})"
description = "Databricks personal access token (dapi prefix)"
group = 1

[[detector.patterns]]
regex = "(?:DATABRICKS|databricks)[._-]?(?:host|workspace)[=:\\s\"'']+(https?://[a-z0-9-]+\\.cloud\\.databricks\\.com)"
description = "Databricks workspace URL"
group = 1

[[detector.patterns]]
regex = "(?:DATABRICKS|databricks)[._-]?(?:token)[=:\\s\"'']+(dapi[a-f0-9]{32,})"
description = "Databricks token with context anchor"
group = 1

[detector.companion]
regex = "(?:DATABRICKS|databricks)[._-]?(?:host|workspace)[=:\\s\"'']+(https?://[a-z0-9-]+\\.cloud\\.databricks\\.com)"
within_lines = 5
name = "workspace_url"

[detector.verify]
method = "GET"
url = "{{companion.workspace_url}}/api/2.0/token/get"

[detector.verify.auth]
type = "header"
name = "Authorization"
template = "Bearer {{match}}"

[detector.verify.success]
status = 200
