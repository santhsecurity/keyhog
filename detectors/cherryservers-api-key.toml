# Docs: https://api.cherryservers.com/doc/
# Format: Bearer token - alphanumeric string (no fixed prefix)
# Verify: GET /v1/user with Authorization: Bearer token returns 200 if valid
# Prefix: none (requires context anchoring)

[detector]
id = "cherryservers-api-key"
name = "Cherry Servers API Key"
service = "cherryservers"
severity = "critical"
keywords = ["CHERRY_AUTH_TOKEN", "CHERRY_API_TOKEN", "cherryservers", "cherryctl"]

[[detector.patterns]]
regex = "(?:CHERRY_AUTH_TOKEN|CHERRY_API_TOKEN|cherry_auth_token|cherry_api_token)[=:\\s\"'']+([a-zA-Z0-9_-]{32,128})"
description = "Cherry Servers API token with context anchor"
group = 1

[detector.verify]
method = "GET"
url = "https://api.cherryservers.com/v1/user"

[detector.verify.auth]
type = "bearer"
field = "match"

[detector.verify.success]
status = 200
