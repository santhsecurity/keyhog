# Docs: https://developer.ups.com/api/reference
# Format: OAuth 2.0 Client ID and Client Secret (48-64 alphanumeric characters each)
# Verify: POST /security/v1/oauth/token to get bearer token
# Prefix: none (requires context anchoring)

[detector]
id = "ups-api-credentials"
name = "UPS API Credentials"
service = "ups"
severity = "high"
keywords = ["UPS_CLIENT_ID", "UPS_CLIENT_SECRET", "ups.com", "developer.ups.com"]

[[detector.patterns]]
regex = "(?:UPS|ups)[._](?:CLIENT|client)[._](?:ID|id)[=:\\s\"'']+([A-Za-z0-9_-]{48,64})"
description = "UPS API Client ID"
group = 1

[[detector.patterns]]
regex = "(?:UPS|ups)[._](?:CLIENT|client)[._](?:SECRET|secret)[=:\\s\"'']+([A-Za-z0-9_-]{48,64})"
description = "UPS API Client Secret"
group = 1

[detector.companion]
regex = "(?:UPS|ups)[._](?:CLIENT|client)[._](?:ID|id|SECRET|secret)[=:\\s\"'']+[A-Za-z0-9_-]{48,64}"
within_lines = 5
name = "UPS Client ID/Secret pair"

[detector.verify]
method = "GET"
url = "https://developer.ups.com/v1/me"

[detector.verify.auth]
type = "bearer"
field = "match"

[detector.verify.success]
status = 200
