# Docs: https://ninjaforms.com/docs/
# Format: WordPress REST API key with public and secret components
# Verify: no public verification endpoint (requires WordPress instance)
# Prefix: none (requires context anchoring)

[detector]
id = "ninja-forms-api-credentials"
name = "Ninja Forms API Credentials"
service = "ninjaforms"
severity = "medium"
keywords = ["ninjaforms", "NINJA_FORMS", "ninja_forms"]

[[detector.patterns]]
regex = "(?:ninja[_\\s]*forms?|NINJA[_\\s]*FORMS)[_.\\s]*(?:api[_\\s]*key|api[_\\s]*token)[\\s\"'']+([a-zA-Z0-9_-]{20,})"
description = "Ninja Forms API key with context anchor"
group = 1

[[detector.patterns]]
regex = "(?:ninja[_\\s]*forms?|NINJA[_\\s]*FORMS)[_.\\s]*(?:secret|SECRET)[\\s\"'']+([a-zA-Z0-9_-]{20,})"
description = "Ninja Forms API secret with context anchor"
group = 1

[detector.companion]
regex = "(?:ninja[_\\s]*forms?|NINJA[_\\s]*FORMS)[_.\\s]*(?:api[_\\s]*key|secret)[\\s\"'']+[a-zA-Z0-9_-]{20,}"
within_lines = 3
name = "ninja_forms_credentials"

[detector.verify]
method = "GET"
url = "https://ninjaforms.com/v1/me"

[detector.verify.auth]
type = "header"
name = "Authorization"
template = "Bearer {{match}}"

[detector.verify.success]
status = 200
