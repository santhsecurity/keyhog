# Docs: https://duckdb.org/docs/connect/overview.html
# Format: Motherduck token or local database path (no auth typically)
# Verify: no public verification endpoint
# Prefix: none (requires context anchoring)

[detector]
id = "duckdb-credentials"
name = "DuckDB Credentials"
service = "duckdb"
severity = "medium"
keywords = ["DUCKDB", "duckdb", "motherduck", "MOTHERDUCK"]

[[detector.patterns]]
regex = "(?:MOTHERDUCK)[_\\s]*(?:TOKEN)[=:\\s\"'']+([a-zA-Z0-9_-]{20,})"
description = "MotherDuck token with context anchor"
group = 1

[[detector.patterns]]
regex = "(?:DUCKDB)[_\\s]*(?:PASSWORD|PASS)[=:\\s\"'']+([a-zA-Z0-9_-]{16,})"
description = "DuckDB password with context anchor"
group = 1

[detector.verify]
method = "GET"
url = "https://duckdb.org/v1/me"

[detector.verify.auth]
type = "header"
name = "Authorization"
template = "Bearer {{match}}"

[detector.verify.success]
status = 200
