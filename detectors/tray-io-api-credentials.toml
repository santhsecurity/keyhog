# Docs: https://docs.tray.ai/api/getting-started
# Format: Bearer token for Tray.io API authentication
# Verify: no public verification endpoint
# Prefix: none (requires context anchoring)

[detector]
id = "tray-io-api-credentials"
name = "Tray.io API Credentials"
service = "tray.io"
severity = "critical"
keywords = ["TRAY_IO", "tray.io", "TRAY_API_KEY", "Tray.io"]

[[detector.patterns]]
regex = "(?:TRAY[_\\.]?API[_\\.]?KEY|tray[_\\.]?api[_\\.]?key)[=:\\s\"'']+([a-zA-Z0-9_-]{40,})"
description = "Tray.io API key with context anchor"
group = 1

[[detector.patterns]]
regex = "(?:TRAY[_\\.]?TOKEN|tray[_\\.]?token)[=:\\s\"'']+([a-zA-Z0-9_-]{40,})"
description = "Tray.io access token with context anchor"
group = 1
