# Docs: https://developer.playstation.com/ps5-devkit/docs/
# Format: 64 character hex string, no unique prefix
# Verify: no public verification endpoint
# Prefix: none (requires context anchoring)

[detector]
id = "playstation-api-key"
name = "PlayStation Network API Key"
service = "playstation"
severity = "high"
keywords = ["PSN_API_KEY", "PLAYSTATION_API", "psn_client_secret", "NPSSO"]

[[detector.patterns]]
regex = '''(?:PSN_API_KEY|PLAYSTATION_API|psn_client_secret|NPSSO)[=:\s"']+([a-f0-9]{64})'''
description = "PlayStation Network API key (64 hex chars with context anchor)"
group = 1

[detector.verify]
method = "GET"
url = "https://developer.playstation.com/v1/me"

[detector.verify.auth]
type = "header"
name = "Authorization"
template = "Bearer {{match}}"

[detector.verify.success]
status = 200
