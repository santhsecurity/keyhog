# Docs: https://www.olark.com/help/zapier-pro
# Format: API Key and Token pair for Zapier Pro integration
# Verify: no public verification endpoint
# Prefix: none (requires context anchoring)

[detector]
id = "olark-api-credentials"
name = "Olark API Credentials"
service = "olark"
severity = "medium"
keywords = ["OLARK", "olark_api", "olark_token", "olark_key"]

[[detector.patterns]]
regex = "(?i)(?:OLARK|olark)[_\\s]?(?:API[_\\s]?KEY|KEY)[=:\\s\"'']+([a-f0-9]{32,40})"
description = "Olark API key with context anchor"
group = 1

[[detector.patterns]]
regex = "(?i)(?:OLARK|olark)[_\\s]?(?:API[_\\s]?TOKEN|TOKEN)[=:\\s\"'']+([a-f0-9]{32,40})"
description = "Olark API token with context anchor"
group = 1

[detector.companion]
regex = "(?i)(?:OLARK|olark)[_\\s]?(?:api_key|api_token|key|token)[=:\\s\"'']+[a-f0-9]{20,}"
within_lines = 5
name = "olark_credentials_pair"

[detector.verify]
method = "GET"
url = "https://api.olark.com/v1/me"

[detector.verify.auth]
type = "header"
name = "Authorization"
template = "Bearer {{match}}"

[detector.verify.success]
status = 200
