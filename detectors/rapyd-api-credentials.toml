# Docs: https://docs.rapyd.net/en/index.html
# Format: Access Key and Secret Key pair for request signing with HMAC-SHA256
# Verify: no public verification endpoint
# Prefix: none (requires context anchoring)

[detector]
id = "rapyd-api-credentials"
name = "Rapyd API Credentials"
service = "rapyd"
severity = "critical"
keywords = ["RAPYD", "rapyd", "RAPYD_ACCESS_KEY", "RAPYD_SECRET_KEY"]

[[detector.patterns]]
regex = "(?:RAPYD|rapyd)[_.]?(?:ACCESS_KEY|access_key|ACCESSKEY|accesskey|API_KEY|api_key)[=:\\s\"']+([a-f0-9]{24,})"
description = "Rapyd Access Key with context anchor"
group = 1

[[detector.patterns]]
regex = "(?:RAPYD|rapyd)[_.]?(?:SECRET_KEY|secret_key|SECRETKEY|secretkey)[=:\\s\"']+([a-f0-9]{48,})"
description = "Rapyd Secret Key with context anchor"
group = 1

[detector.companion]
regex = "(?:RAPYD|rapyd)[_.]?(?:ACCESS_KEY|access_key)[=:\\s\"']+[a-f0-9]{24,}"
within_lines = 5
name = "Rapyd access key"
