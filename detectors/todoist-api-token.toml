# Docs: https://developer.todoist.com/rest/v2/
# Format: API token is a 40-character hexadecimal string
# Verify: GET /sync/v9/sync with Bearer token returns 200
# Prefix: none (requires context anchoring)

[detector]
id = "todoist-api-token"
name = "Todoist API Token"
service = "todoist"
severity = "high"
keywords = ["TODOIST_API_TOKEN", "TODOIST_TOKEN"]

[[detector.patterns]]
regex = "(?:TODOIST_API_TOKEN|TODOIST_TOKEN)[=:\\s\"'']+([a-f0-9]{40})"
description = "Todoist API token with context anchor"
group = 1

[detector.verify]
method = "GET"
url = 'https://api.todoist.com/sync/v9/sync?sync_token=*&resource_types=["all"]'

[detector.verify.auth]
type = "bearer"
field = "match"

[detector.verify.success]
status = 200
