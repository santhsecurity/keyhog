# Docs: https://verifone.com/docs/developer/api-reference
# Format: Merchant Code (numeric) and Secret Key (alphanumeric)
# Verify: POST to 2Checkout API with signature-based authentication
# Prefix: none (requires context anchoring)

[detector]
id = "twocheckout-api-credentials"
name = "2Checkout/Verifone API Credentials"
service = "twocheckout"
severity = "critical"
keywords = ["2CHECKOUT", "TWOCHECKOUT", "verifone", "VERIFONE", "MERCHANT_CODE", "SECRET_KEY", "2CO"]

[[detector.patterns]]
regex = "(?:2CHECKOUT|TWOCHECKOUT|2checkout|twocheckout)[._-]?(?:MERCHANT|merchant)?[._-]?(?:CODE|code)?[=:\\s\"'']+(\\d{8,12})"
description = "2Checkout Merchant Code with context anchor"
group = 1

[[detector.patterns]]
regex = "(?:2CHECKOUT|TWOCHECKOUT|2checkout|twocheckout)[._-]?(?:SECRET|secret)?[._-]?(?:KEY|key|WORD|word)?[=:\\s\"'']+([a-zA-Z0-9]{32,64})"
description = "2Checkout Secret Key with context anchor"
group = 1

[[detector.patterns]]
regex = "(?:VERIFONE|verifone)[._-]?(?:MERCHANT|merchant)?[._-]?(?:CODE|code|ID|id)?[=:\\s\"'']+(\\d{8,12})"
description = "Verifone Merchant Code with context anchor"
group = 1

[[detector.patterns]]
regex = "(?:VERIFONE|verifone)[._-]?(?:SECRET|secret)?[._-]?(?:KEY|key)?[=:\\s\"'']+([a-zA-Z0-9]{32,64})"
description = "Verifone Secret Key with context anchor"
group = 1

[detector.companion]
regex = "(?:2CHECKOUT|TWOCHECKOUT|VERIFONE|verifone|2checkout|twocheckout)[._-]?(?:MERCHANT|merchant|SECRET|secret|API|api)"
within_lines = 5
name = "twocheckout_companion"

[detector.verify]
method = "GET"
url = "https://verifone.com/v1/me"

[detector.verify.auth]
type = "header"
name = "Authorization"
template = "Bearer {{match}}"

[detector.verify.success]
status = 200
