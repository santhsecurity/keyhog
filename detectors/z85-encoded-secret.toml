# Docs: https://rfc.zeromq.org/spec/32/
# Format: 5 characters represent 4 bytes; total length must be a multiple of 5
# Verify: none (Z85 is an encoding, not a specific service credential)
# Prefix: none (Z85 character set is broad)

[detector]
id = "z85-encoded-secret"
name = "Z85 Encoded Secret"
service = "z85"
severity = "info"
keywords = ["z85", "base85"]

[[detector.patterns]]
# Match strings that look like Z85 and are part of an assignment
regex = "(?:z85|base85|encoded)[=:\\s\"'']+([0-9a-zA-Z.\\-:+=^!/*?&<>()\\[\\]{}@%$#]{20,})"
description = "Z85 encoded string with keyword anchor"
group = 1
