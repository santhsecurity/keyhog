# Docs: https://docs.upstash.com/kafka
# Format: UPSTASH_KAFKA_REST_URL + UPSTASH_KAFKA_REST_USERNAME + UPSTASH_KAFKA_REST_PASSWORD
# Verify: no public verification endpoint
# Prefix: none (URL-based with username/password companion)

[detector]
id = "upstash-kafka-credentials"
name = "Upstash Kafka Credentials"
service = "upstash"
severity = "critical"
keywords = ["UPSTASH_KAFKA", "UPSTASH_KAFKA_REST_URL", "upstash-kafka"]

[[detector.patterns]]
regex = "(https://[a-z0-9-]+-kafka\\.upstash\\.io)"
description = "Upstash Kafka REST URL"
group = 1

[detector.companion]
regex = "UPSTASH_KAFKA_REST_PASSWORD[=:\\s\"'']+([A-Za-z0-9_-]+)"
within_lines = 5
name = "rest_password"
