# Docs: https://vercel.com/docs/rest-api
# Format: 24 character alphanumeric string (no unique prefix)
# Verify: GET /v9/user with Bearer token returns 200 if valid
# Prefix: none (24 char alphanumeric, requires keyword context)

[detector]
id = "vercel-token"
name = "Vercel Token"
service = "vercel"
severity = "critical"
keywords = ["vercel", "VERCEL", "VERCEL_TOKEN", "vercel_token", "VERCEL_API_TOKEN"]

[[detector.patterns]]
regex = "(?:vercel|VERCEL)[_\\-\\s]*(?:token|TOKEN|api[_\\-\\s]*token|API[_\\-\\s]*TOKEN)[=:\\s\\\"']+([a-zA-Z0-9]{24})"
description = "Vercel API token with context anchor"
group = 1

[detector.verify]
method = "GET"
url = "https://api.vercel.com/v9/user"

[detector.verify.auth]
type = "bearer"
field = "match"

[detector.verify.success]
status = 200
