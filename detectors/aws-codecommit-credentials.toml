# Docs: https://docs.aws.amazon.com/codecommit/latest/userguide/setting-up-gc.html
# Format: Username and password pair for HTTPS Git credentials
# Verify: none (safe verification requires a repository-specific Git credential flow; a generic AWS HTTP endpoint would be fake)
# Prefix: none (requires context anchoring)

[detector]
id = "aws-codecommit-credentials"
name = "AWS CodeCommit Credentials"
service = "aws"
severity = "critical"
keywords = ["codecommit", "CODECOMMIT", "git-codecommit"]

[[detector.patterns]]
regex = "(?:codecommit|CODECOMMIT)[_-]?(?:user|USER|username|USERNAME)[=:\\s\"'']+([a-zA-Z0-9_-]{20,})"
description = "AWS CodeCommit HTTPS Git username"
group = 1

[[detector.patterns]]
regex = "git-codecommit\\.[a-z0-9-]+\\.amazonaws\\.com/v1/repos/[a-zA-Z0-9_-]+"
description = "AWS CodeCommit repository URL"

[[detector.companions]]
name = "password"
regex = "(?:codecommit|CODECOMMIT|git[-_]?codecommit|GIT[-_]?CODECOMMIT)[_-]?(?:password|PASSWORD|token|TOKEN)[=:\\s\"'']+([a-zA-Z0-9/+=]{40})"
within_lines = 5
