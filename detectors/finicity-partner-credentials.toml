# Docs: https://developer.mastercard.com/open-finance-us/documentation/
# Format: Partner ID is numeric, Partner Secret is alphanumeric (typically 32+ chars), App Key is alphanumeric
# Verify: POST /aggregation/v2/partners/authentication with Partner ID/Secret
# Prefix: none (requires context anchoring)

[detector]
id = "finicity-partner-credentials"
name = "Finicity Partner Credentials"
service = "finicity"
severity = "critical"
keywords = ["FINICITY_PARTNER_ID", "FINICITY_PARTNER_SECRET", "FINICITY_APP_KEY", "partnerId", "partnerSecret"]

[[detector.patterns]]
regex = "(?:FINICITY|finicity)[._-]?(?:PARTNER|partner)?[._-]?(?:ID|id)[=:\\s\"'']+(\\d{6,10})"
description = "Finicity Partner ID (numeric identifier)"
group = 1

[[detector.patterns]]
regex = "(?:FINICITY|finicity)[._-]?(?:PARTNER|partner)?[._-]?(?:SECRET|secret)[=:\\s\"'']+([a-zA-Z0-9]{32,40})"
description = "Finicity Partner Secret (alphanumeric string)"
group = 1

[[detector.patterns]]
regex = "(?:FINICITY|finicity)[._-]?(?:APP|app)?[._-]?(?:KEY|key)[=:\\s\"'']+([a-zA-Z0-9]{20,40})"
description = "Finicity App Key (alphanumeric string)"
group = 1

[detector.verify]
method = "GET"
url = "https://developer.mastercard.com/v1/me"

[detector.verify.auth]
type = "header"
name = "Authorization"
template = "Bearer {{match}}"

[detector.verify.success]
status = 200
