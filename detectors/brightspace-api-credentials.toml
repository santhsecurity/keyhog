# Docs: https://docs.valence.desire2learn.com/basic/auth.html
# Format: App ID and App Key pair for OAuth 2.0 authentication
# Verify: GET /d2l/api/lp/1.0/users/whoami with Bearer token returns 200 if valid
# Prefix: none (requires context anchoring)

[detector]
id = "brightspace-api-credentials"
name = "Brightspace/D2L API Credentials"
service = "brightspace"
severity = "high"
keywords = ["brightspace", "BRIGHTSPACE", "d2l", "D2L", "desire2learn"]

[[detector.patterns]]
regex = "(?:brightspace|d2l|desire2learn)[_\\s.-]*(?:app[_\\s.-]*id|client[_\\s.-]*id)[=:\\s\"'']+([a-zA-Z0-9_-]{20,40})"
description = "Brightspace/D2L app/client ID with context anchor"
group = 1

[[detector.patterns]]
regex = "(?:brightspace|d2l|desire2learn)[_\\s.-]*(?:app[_\\s.-]*key|client[_\\s.-]*secret)[=:\\s\"'']+([a-zA-Z0-9_-]{40,64})"
description = "Brightspace/D2L app key/client secret with context anchor"
group = 1

[[detector.patterns]]
regex = "(?:brightspace|d2l)[_\\s.-]*(?:api[_\\s.-]*key|token)[=:\\s\"'']+([a-zA-Z0-9_-]{40,80})"
description = "Brightspace/D2L API key/token with context anchor"
group = 1
