# Docs: https://docs.superblocks.com/on-premise-agent/overview
# Format: SUPERBLOCKS_ prefixed environment variables with agent keys and secrets
# Verify: no public verification endpoint (self-hosted agent)
# Prefix: SUPERBLOCKS_

[detector]
id = "superblocks-credentials"
name = "Superblocks Credentials"
service = "superblocks"
severity = "critical"
keywords = ["SUPERBLOCKS", "superblocks", "SUPERBLOCKS_API_KEY"]

[[detector.patterns]]
regex = "SUPERBLOCKS[_\\.\\s]*(?:API_KEY|api_key|TOKEN|token)[=:\\s\"'']+([a-zA-Z0-9_\\-]{32,})"
description = "Superblocks API key"
group = 1

[[detector.patterns]]
regex = "SUPERBLOCKS_AGENT[_\\.\\s]*(?:KEY|key|SECRET|secret|TOKEN|token)[=:\\s\"'']+([a-zA-Z0-9_\\-]{32,})"
description = "Superblocks agent key"
group = 1

[[detector.patterns]]
regex = "SUPERBLOCKS[_\\.\\s]*(?:SIGNING[_\\.\\s]*KEY|ENCRYPTION[_\\.\\s]*KEY)[=:\\s\"'']+([a-zA-Z0-9_\\-\\/\\+]{20,}={0,2})"
description = "Superblocks signing or encryption key"
group = 1

[detector.verify]
method = "GET"
url = "https://api.superblocks.com/v1/me"

[detector.verify.auth]
type = "header"
name = "Authorization"
template = "Bearer {{match}}"

[detector.verify.success]
status = 200
