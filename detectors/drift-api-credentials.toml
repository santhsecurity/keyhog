# Docs: https://devdocs.drift.com/docs/quick-start
# Format: OAuth access token (starts with drft_)
# Verify: GET /conversations with Bearer token
# Prefix: drft_

[detector]
id = "drift-api-credentials"
name = "Drift API Access Token"
service = "drift"
severity = "high"
keywords = ["drft_", "DRIFT", "drift_token"]

[[detector.patterns]]
regex = 'drft_[a-zA-Z0-9_-]{40,80}'
description = "Drift OAuth access token (drft_ prefix)"

[detector.verify]
method = "GET"
url = "https://driftapi.com/contacts"

[detector.verify.auth]
type = "bearer"
field = "match"

[detector.verify.success]
status = 200
