# Docs: https://developer.teamwork.com/guides/authentication/
# Format: Base64 encoded string or alphanumeric token
# Verify: GET /authenticate.json with Bearer token returns 200
# Prefix: none (requires context anchoring)

[detector]
id = "teamwork-api-token"
name = "Teamwork API Token"
service = "teamwork"
severity = "high"
keywords = ["TEAMWORK_API_TOKEN", "TEAMWORK_TOKEN"]

[[detector.patterns]]
regex = "(?:TEAMWORK_API_TOKEN|TEAMWORK_TOKEN)[=:\\s\"'']+([A-Za-z0-9+/=]{20,60})"
description = "Teamwork API token with context anchor"
group = 1

[detector.verify]
method = "GET"
url = "https://api.teamwork.com/authenticate.json"

[detector.verify.auth]
type = "bearer"
field = "match"

[detector.verify.success]
status = 200
