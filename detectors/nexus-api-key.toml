# Docs: https://help.sonatype.com/repomanager3/security/security-concepts
# Format: 64-character hexadecimal string or username:password format
# Verify: GET /service/rest/v1/status with Basic auth returns 200 if valid
# Prefix: none (requires context anchoring)

[detector]
id = "nexus-api-key"
name = "Nexus Repository API Key"
service = "nexus"
severity = "high"
keywords = ["NEXUS", "nexus", "NEXUS_API_KEY", "NXRM"]

[[detector.patterns]]
regex = "(?:NEXUS|nexus|NEXUS_API_KEY|nexus_api_key)[=:\\s\"'']+([a-f0-9]{64})"
description = "Nexus Repository Manager API key (64 hex chars)"
group = 1

[[detector.patterns]]
regex = "(?:NEXUS|nexus)[_\\s]*(?:USERNAME|username)[=:\\s\"'']+\\S+\\s*(?:NEXUS|nexus)[_\\s]*(?:PASSWORD|password|API_KEY|api_key)[=:\\s\"'']+([a-fA-F0-9]{32,64})"
description = "Nexus credentials with API key/password"
group = 1

[detector.verify]
method = "GET"
url = "https://help.sonatype.com/v1/me"

[detector.verify.auth]
type = "header"
name = "Authorization"
template = "Bearer {{match}}"

[detector.verify.success]
status = 200
