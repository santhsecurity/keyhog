# Docs: https://docs.hetzner.com/cloud/api/faq/
# Format: 64 character alphanumeric string (32 byte prefix + 32 byte secret)
# Verify: GET /v1/servers with Authorization: Bearer token returns 200 if valid
# Prefix: none (64 character hex-like string, requires context anchoring)

[detector]
id = "hetzner-api-token"
name = "Hetzner Cloud API Token"
service = "hetzner"
severity = "critical"
keywords = ["HCLOUD_TOKEN", "hetzner", "hcloud"]

[[detector.patterns]]
regex = "(?:HCLOUD_TOKEN|hetzner|hcloud)[=:\\s\"'']+([a-f0-9]{64})"
description = "Hetzner Cloud API token with context anchor"
group = 1

[detector.verify]
method = "GET"
url = "https://api.hetzner.cloud/v1/servers"

[detector.verify.auth]
type = "bearer"
field = "match"

[detector.verify.success]
status = 200
