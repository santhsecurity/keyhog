# Docs: https://docs.travis-ci.com/user/triggering-builds/
# Format: 22 character alphanumeric string (no unique prefix)
# Verify: GET /repo with Authorization: token header returns 200 if valid
# Prefix: none (22 char alphanumeric, requires keyword context)

[detector]
id = "travisci-token"
name = "Travis CI Token"
service = "travisci"
severity = "critical"
keywords = ["travis", "TRAVIS", "TRAVIS_TOKEN", "travis_token"]

[[detector.patterns]]
regex = "(?:travis|TRAVIS)[_\\-\\s]*(?:token|TOKEN)[=:\\s\\\"']+([a-zA-Z0-9]{22})"
description = "Travis CI API token with context anchor"
group = 1

[detector.verify]
method = "GET"
url = "https://api.travis-ci.org/repo"

[detector.verify.auth]
type = "header"
name = "Authorization"
template = "token {{match}}"

[detector.verify.success]
status = 200
