# Docs: https://www.chargebee.com/docs/billing/2.0/integrations/anrok
# Format: Alphanumeric API key (no documented unique prefix)
# Verify: API calls to Anrok endpoints with API key
# Prefix: none (requires context anchoring)

[detector]
id = "anrok-api-key"
name = "Anrok API Key"
service = "anrok"
severity = "critical"
keywords = ["ANROK", "anrok", "ANROK_API_KEY", "anrok_api_key"]

[[detector.patterns]]
regex = "(?:ANROK|anrok)[._]?(?:API|api)?[._]?(?:KEY|key)[=:\\s\"'']+([a-zA-Z0-9_-]{20,})"
description = "Anrok API key with context anchor"
group = 1

[detector.verify]
method = "GET"
url = "https://api.chargebee.com/v1/me"

[detector.verify.auth]
type = "header"
name = "Authorization"
template = "Bearer {{match}}"

[detector.verify.success]
status = 200
