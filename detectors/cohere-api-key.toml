# Docs: https://docs.cohere.com/docs/authentication
# Format: 40+ character alphanumeric string
# Verify: POST /v1/tokenize with Authorization header
# Prefix: none (generic alphanumeric, requires context anchoring)

[detector]
id = "cohere-api-key"
name = "Cohere API Key"
service = "cohere"
severity = "critical"
keywords = ["COHERE_API_KEY", "cohere_api_key", "cohere"]

[[detector.patterns]]
regex = "(?:COHERE_API_KEY|cohere_api_key)[=:\\s\"']+([a-zA-Z0-9]{40,})"
description = "Cohere API key with context anchor"
group = 1

[detector.verify]
method = "POST"
url = "https://api.cohere.com/v1/tokenize"

[detector.verify.auth]
type = "bearer"
field = "match"

[detector.verify.success]
status = 200
