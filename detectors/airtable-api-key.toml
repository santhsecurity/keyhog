# Docs: https://airtable.com/developers/web/api/authentication
# Format: pat prefix, 14 alphanumeric chars, dot, 64 hex chars
# Verify: GET request to Airtable /meta/bases endpoint with Bearer token
# Prefix: pat

[detector]
id = "airtable-api-key"
name = "Airtable API Key"
service = "airtable"
severity = "high"
keywords = ["pat", "airtable", "AIRTABLE_API_KEY"]

[[detector.patterns]]
regex = 'pat[A-Za-z0-9]{14}\.[a-f0-9]{64}'
description = "Airtable personal access token (pat...)"

[detector.verify]
method = "GET"
url = "https://api.airtable.com/v0/meta/bases"

[detector.verify.auth]
type = "bearer"
field = "match"

[detector.verify.success]
status = 200
