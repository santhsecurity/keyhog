# Docs: https://docs.fauna.com/fauna/current/security/
# Format: fnAE or fnAC prefix followed by alphanumeric chars, underscore/hyphen, and 16+ chars
# Verify: HTTP GET to db.fauna.com with Bearer token authentication
# Prefix: fnAE, fnAC

[detector]
id = "fauna-secret-key"
name = "Fauna Secret Key"
service = "fauna"
severity = "critical"
keywords = ["fnAE", "fnAC", "fauna"]

[[detector.patterns]]
regex = 'fnAE[a-zA-Z0-9]{32,}[_-][a-zA-Z0-9]{16,}'
description = "Fauna Server secret key (fnAE prefix)"

[[detector.patterns]]
regex = 'fnAC[a-zA-Z0-9]{32,}[_-][a-zA-Z0-9]{16,}'
description = "Fauna Admin secret key (fnAC prefix)"

[detector.verify]
method = "GET"
url = "https://db.fauna.com/"

[detector.verify.auth]
type = "bearer"
field = "match"

[detector.verify.success]
status = 200
