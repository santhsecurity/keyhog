# Docs: https://docs.appsmith.com/getting-started/setup/environment-variables
# Format: APPSMITH_ prefixed environment variables with API keys/secrets
# Verify: no public verification endpoint (self-hosted)
# Prefix: APPSMITH_

[detector]
id = "appsmith-api-credentials"
name = "Appsmith API Credentials"
service = "appsmith"
severity = "critical"
keywords = ["APPSMITH", "appsmith"]

[[detector.patterns]]
regex = "APPSMITH_[A-Z_]*(?:API_KEY|SECRET|PASSWORD|TOKEN)[=:\\s\"'']+([a-zA-Z0-9_\\-]{20,})"
description = "Appsmith API key or secret environment variable"
group = 1

[[detector.patterns]]
regex = "APPSMITH_[A-Z_]*(?:MONGODB|POSTGRES|DB)[_\\.\\s]*(?:URI|URL|CONN)[=:\\s\"'']+([^\\s\"'']{30,})"
description = "Appsmith database connection string"
group = 1

[[detector.patterns]]
regex = "APPSMITH_OAUTH2_[A-Z_]+_(?:CLIENT_ID|CLIENT_SECRET)[=:\\s\"'']+([a-zA-Z0-9_\\-\\.]{20,})"
description = "Appsmith OAuth2 client credentials"
group = 1
