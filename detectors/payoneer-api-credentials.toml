# Docs: https://developer.payoneer.com/psd2/get-started
# Format: Client ID and Client Secret for OAuth2 authentication
# Verify: no public verification endpoint
# Prefix: none (requires context anchoring)

[detector]
id = "payoneer-api-credentials"
name = "Payoneer API Credentials"
service = "payoneer"
severity = "critical"
keywords = ["PAYONEER", "payoneer", "PayoneerClientId", "PayoneerSecret"]

[[detector.patterns]]
regex = "(?:PAYONEER|payoneer)[_.]?(?:CLIENT_ID|client_id|CLIENTID|clientid)[=:\\s\"']+([a-zA-Z0-9_-]{20,})"
description = "Payoneer Client ID with context anchor"
group = 1

[[detector.patterns]]
regex = "(?:PAYONEER|payoneer)[_.]?(?:CLIENT_SECRET|client_secret|CLIENTSECRET|clientsecret|API_SECRET|api_secret)[=:\\s\"']+([a-zA-Z0-9_-]{20,})"
description = "Payoneer Client Secret with context anchor"
group = 1

[[detector.companions]]
name = "Payoneer client ID"
regex = "(?:PAYONEER|payoneer)[_.]?(?:CLIENT_ID|client_id)[=:\\s\"']+[a-zA-Z0-9_-]{20,}"
within_lines = 5
