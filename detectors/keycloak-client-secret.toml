# Docs: https://www.keycloak.org/docs/latest/server_admin/index.html
# Format: UUID-like string (e.g., 40cc097b-2a57-4c17-b36a-8fdf3fc2d578)
# Verify: POST to /realms/{realm}/protocol/openid-connect/token
# Prefix: none (requires context anchoring)

[detector]
id = "keycloak-client-secret"
name = "Keycloak Client Secret"
service = "keycloak"
severity = "high"
keywords = ["KEYCLOAK_CLIENT_SECRET", "KEYCLOAK_SECRET", "keycloak"]

[[detector.patterns]]
regex = "(?:KEYCLOAK[_-]?CLIENT[_-]?SECRET|KEYCLOAK[_-]?SECRET)[=:\\s\"'']+([a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12})"
description = "Keycloak client secret UUID with context anchor"
group = 1

[[detector.patterns]]
regex = "\"secret\"\\s*:\\s*\"([a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12})\""
description = "Keycloak client secret in JSON response"
group = 1

[detector.verify]
method = "GET"
url = "https://api.keycloak.org/v1/me"

[detector.verify.auth]
type = "header"
name = "Authorization"
template = "Bearer {{match}}"

[detector.verify.success]
status = 200
