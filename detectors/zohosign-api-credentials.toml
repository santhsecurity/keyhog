# Docs: https://www.zoho.com/sign/api/
# Format: OAuth 2.0 client credentials - Client ID and Client Secret are alphanumeric
# Verify: POST to https://accounts.zoho.com/oauth/v2/token
# Prefix: none (requires context anchoring)

[detector]
id = "zohosign-api-credentials"
name = "Zoho Sign API Credentials"
service = "zohosign"
severity = "critical"
keywords = ["ZOHO_SIGN_CLIENT_ID", "ZOHO_SIGN_CLIENT_SECRET", "zoho_sign_client_id", "ZohoSign"]

[[detector.patterns]]
regex = "(?:ZOHO[_\\s]?SIGN|zoho[_\\s]?sign)[_\\s]?(?:CLIENT[_\\s]?ID)[=:\\s\"'']+([a-zA-Z0-9.\\-]{20,})"
description = "Zoho Sign OAuth Client ID"
group = 1

[[detector.patterns]]
regex = "(?:ZOHO[_\\s]?SIGN|zoho[_\\s]?sign)[_\\s]?(?:CLIENT[_\\s]?SECRET)[=:\\s\"'']+([a-zA-Z0-9]{20,})"
description = "Zoho Sign OAuth Client Secret"
group = 1

[[detector.patterns]]
regex = "(?:ZOHO[_\\s]?SIGN|zoho[_\\s]?sign)[_\\s]?(?:ACCESS[_\\s]?TOKEN)[=:\\s\"'']+([a-zA-Z0-9.\\-_]{100,})"
description = "Zoho Sign Access Token (JWT format)"
group = 1

[[detector.patterns]]
regex = "(?:ZOHO[_\\s]?SIGN|zoho[_\\s]?sign)[_\\s]?(?:REFRESH[_\\s]?TOKEN)[=:\\s\"'']+([a-zA-Z0-9]{20,})"
description = "Zoho Sign Refresh Token"
group = 1
