# Docs: https://developer.spreedly.com/
# Format: Environment key starts with 'C' followed by alphanumeric, access secret is alphanumeric
# Verify: GET /v1/gateways.xml with environment key and secret
# Prefix: C (for environment keys)

[detector]
id = "spreedly-credentials"
name = "Spreedly Credentials"
service = "spreedly"
severity = "critical"
keywords = ["SPREEDLY_ENVIRONMENT_KEY", "SPREEDLY_ACCESS_SECRET", "environment_key"]

[[detector.patterns]]
regex = "(?:SPREEDLY|spreedly)[._-]?(?:ENVIRONMENT|environment)?[._-]?(?:KEY|key)[=:\\s\"'']+(C[a-zA-Z0-9]{10,30})"
description = "Spreedly Environment Key (starts with C)"
group = 1

[[detector.patterns]]
regex = "(?:SPREEDLY|spreedly)[._-]?(?:ACCESS|access)?[._-]?(?:SECRET|secret)[=:\\s\"'']+([a-zA-Z0-9]{20,40})"
description = "Spreedly Access Secret"
group = 1
