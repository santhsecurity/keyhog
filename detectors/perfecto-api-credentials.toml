# Docs: https://help.perfecto.io/perfecto-help/content/perfecto/rest-api/rest-api-authentication.htm
# Format: Security token used in Perfecto-Authorization header (base64-encoded or JWT)
# Verify: GET /services/handsets with Perfecto-Authorization header returns 200
# Prefix: none (requires context anchoring)

[detector]
id = "perfecto-api-credentials"
name = "Perfecto API Credentials"
service = "perfecto"
severity = "high"
keywords = ["PERFECTO_TOKEN", "PERFECTO_SECURITY_TOKEN", "perfecto_token", "Perfecto-Authorization"]

[[detector.patterns]]
regex = "(?:PERFECTO_TOKEN|PERFECTO_SECURITY_TOKEN|perfecto_token|perfecto-security-token)[=:\\s\"'']+([a-zA-Z0-9_-]{20,}|[a-zA-Z0-9+/]{40,}=*)"
description = "Perfecto security token with context anchor"
group = 1

[[detector.patterns]]
regex = "Perfecto-Authorization[=:\\s\"'']+(?:Bearer\\s+)?([a-zA-Z0-9_-]{20,}|[a-zA-Z0-9+/]{40,}=*)"
description = "Perfecto Authorization header token"
group = 1

[detector.verify]
method = "GET"
url = "https://help.perfecto.io/v1/me"

[detector.verify.auth]
type = "bearer"
field = "match"

[detector.verify.success]
status = 200
