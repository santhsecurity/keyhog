[detector]
id = "lastpass-dev-creds"
name = "LastPass 2022 Developer Credentials"
service = "lastpass"
severity = "critical"
keywords = ["lastpass", "id", "key"]

[[detector.patterns]]
regex = '(?i)id[=:]\s*([0-9]{7,})'
group = 1

[detector.verify]
method = "GET"
url = "https://api.lastpass.com/v1/me"

[detector.verify.auth]
type = "header"
name = "Authorization"
template = "Bearer {{match}}"

[detector.verify.success]
status = 200
