# Docs: https://docs.appdynamics.com/appd/22.x/latest/en/application-monitoring/using-the-appdynamics-apis
# Format: Account name paired with API key (hex format)
# Verify: no public verification endpoint
# Prefix: none (requires context anchoring)

[detector]
id = "appdynamics-api-credentials"
name = "AppDynamics API Credentials"
service = "appdynamics"
severity = "critical"
keywords = ["APPDYNAMICS", "appdynamics", "X-AppD-API-Key", "account_name", "api_key"]

[[detector.patterns]]
regex = "(?:APPDYNAMICS|appdynamics)[_.]?(?:account|account_name)[=:\\s\"'']+([a-zA-Z0-9_-]+)"
description = "AppDynamics account name"
group = 1

[[detector.patterns]]
regex = "(?:X-AppD-API-Key|appdynamics[_.]?api[_.]?key)[=:\\s\"'']+([a-f0-9]{32,})"
description = "AppDynamics API key with context anchor"
group = 1

[detector.companion]
regex = "(?:APPDYNAMICS|appdynamics)[_.]?(?:account|account_name)[=:\\s\"'']+([a-zA-Z0-9_-]+)"
within_lines = 5
name = "appdynamics_account"

[detector.verify]
method = "GET"
url = "https://api.appdynamics.com/v1/me"

[detector.verify.auth]
type = "header"
name = "Authorization"
template = "Bearer {{match}}"

[detector.verify.success]
status = 200
