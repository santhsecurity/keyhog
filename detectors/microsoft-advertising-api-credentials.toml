# Docs: https://learn.microsoft.com/en-us/advertising/guides/authentication-oauth
# Format: Microsoft OAuth 2.0 client credentials with GUID client ID
# Verify: POST to https://login.microsoftonline.com/common/oauth2/v2.0/token
# Prefix: none (requires context anchoring for client ID)

[detector]
id = "microsoft-advertising-api-credentials"
name = "Microsoft Advertising API Credentials"
service = "microsoft-advertising"
severity = "critical"
keywords = ["microsoft_advertising", "bing_ads", "MS_ADS", "BINGADS"]

[[detector.patterns]]
regex = "(?:microsoft_advertising|bing_ads|MS_ADS|BINGADS).{0,30}(?:client_id|CLIENT_ID)[=:\\s\"'']+([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})"
description = "Microsoft Advertising API client ID with context anchor"
group = 1

[detector.companion]
regex = "(?:client_secret|CLIENT_SECRET)[=:\\s\"'']+([a-zA-Z0-9_.-]{20,})"
within_lines = 5
name = "client_secret"

[detector.verify]
method = "GET"
url = "https://learn.microsoft.com/v1/me"

[detector.verify.auth]
type = "header"
name = "Authorization"
template = "Bearer {{match}}"

[detector.verify.success]
status = 200
