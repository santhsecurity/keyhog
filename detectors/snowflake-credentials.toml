# Docs: https://docs.snowflake.com/en/user-guide/security-access-control-overview
# Format: Account identifier with username/password or key pair authentication
# Verify: no public verification endpoint
# Prefix: none (requires context anchoring)

[detector]
id = "snowflake-credentials"
name = "Snowflake Credentials"
service = "snowflake"
severity = "critical"
keywords = ["SNOWFLAKE", "snowflakecomputing", "SNOWSQL"]

[[detector.patterns]]
regex = "(?:SNOWFLAKE|snowflake)[._-]?(?:account|acct|accountname)[=:\\s\"'']+([a-z0-9]+(?:\\.[a-z0-9-]+)?)"
description = "Snowflake account identifier"
group = 1

[[detector.patterns]]
regex = "(?:SNOWFLAKE|snowflake)[._-]?(?:user|username|usr)[=:\\s\"'']+([a-zA-Z0-9_-]+)"
description = "Snowflake username"
group = 1

[[detector.patterns]]
regex = "(?:SNOWFLAKE|snowflake)[._-]?(?:password|pwd|pass)[=:\\s\"'']+([a-zA-Z0-9!@#$%^&*._-]{8,})"
description = "Snowflake password"
group = 1

[[detector.patterns]]
regex = "(?:SNOWFLAKE|snowflake)[._-]?(?:warehouse|wh)[=:\\s\"'']+([a-zA-Z0-9_-]+)"
description = "Snowflake warehouse"
group = 1

[[detector.patterns]]
regex = "(?:SNOWFLAKE|snowflake)[._-]?(?:database|db)[=:\\s\"'']+([a-zA-Z0-9_-]+)"
description = "Snowflake database"
group = 1

[[detector.patterns]]
regex = "(?:SNOWFLAKE|snowflake)[._-]?(?:private[_-]?key|key[_-]?path)[=:\\s\"'']+([a-zA-Z0-9_/.-]+)"
description = "Snowflake private key path"
group = 1

[[detector.patterns]]
regex = "(?:SNOWFLAKE|snowflake)[._-]?(?:role)[=:\\s\"'']+([a-zA-Z0-9_-]+)"
description = "Snowflake role"
group = 1
