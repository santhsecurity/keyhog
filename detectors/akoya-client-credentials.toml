# Docs: https://docs.akoya.com/docs/getting-started
# Format: client_id and client_secret for OAuth2 authentication
# Verify: POST /token with Basic Auth to obtain access token
# Prefix: none (requires context anchoring)

[detector]
id = "akoya-client-credentials"
name = "Akoya Client Credentials"
service = "akoya"
severity = "critical"
keywords = ["AKOYA_CLIENT_ID", "AKOYA_CLIENT_SECRET", "client_id", "client_secret", "akoya"]

[[detector.patterns]]
regex = "(?:AKOYA|akoya)[._-]?(?:CLIENT|client)?[._-]?(?:ID|id)[=:\\s\"'']+([a-zA-Z0-9_-]{10,40})"
description = "Akoya Client ID for OAuth2 authentication"
group = 1

[[detector.patterns]]
regex = "(?:AKOYA|akoya)[._-]?(?:CLIENT|client)?[._-]?(?:SECRET|secret)[=:\\s\"'']+([a-zA-Z0-9_-]{20,60})"
description = "Akoya Client Secret for OAuth2 authentication"
group = 1

[detector.verify]
method = "POST"
url = "https://sandbox-idp.ddp.akoya.com/token"
body = "grant_type=client_credentials&scope=openid"

[detector.verify.auth]
type = "basic"
username = "match"
password = "companion.akoya_client_secret"

[detector.verify.success]
status = 200
