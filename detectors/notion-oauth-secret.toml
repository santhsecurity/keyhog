# Docs: https://developers.notion.com/guides/get-started/authorization
# Format: OAuth client secret with 'secret_' prefix followed by 43-50 alphanumeric characters
# Verify: POST to api.notion.com/v1/oauth/token with Basic auth (client_id:client_secret)
# Prefix: secret_

[detector]
id = "notion-oauth-secret"
name = "Notion OAuth Client Secret"
service = "notion"
severity = "high"
keywords = ["NOTION_CLIENT_SECRET", "notion_client_secret", "secret_"]

[[detector.patterns]]
regex = "(?:NOTION|notion)[_.]?(?:CLIENT|client)[_.]?(?:SECRET|secret)[=:\\s\"'']+(secret_[a-zA-Z0-9]{43,50})"
description = "Notion OAuth client secret with context anchor"
group = 1

[detector.companion]
regex = "(?:NOTION|notion)[_.]?(?:CLIENT|client)[_.]?(?:ID|id)[=:\\s\"'']+([A-Za-z0-9_\\-]{8,64})"
within_lines = 5
name = "client_id"

[detector.verify]
method = "POST"
url = "https://api.notion.com/v1/oauth/token"
body = "{\"grant_type\":\"authorization_code\",\"code\":\"keyhog-invalid-code\",\"redirect_uri\":\"https://example.com\"}"

[detector.verify.auth]
type = "basic"
username = "companion.client_id"
password = "match"

[[detector.verify.headers]]
name = "Content-Type"
value = "application/json"

[detector.verify.success]
status = 400
body_contains = "invalid_grant"
