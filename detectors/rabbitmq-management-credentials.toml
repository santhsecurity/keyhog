# Docs: https://www.rabbitmq.com/docs/management
# Format: Username and password for RabbitMQ Management UI or API
# Verify: no public verification endpoint
# Prefix: none (requires context anchoring)

[detector]
id = "rabbitmq-management-credentials"
name = "RabbitMQ Management API Credentials"
service = "rabbitmq"
severity = "high"
keywords = ["RABBITMQ_USER", "RABBITMQ_PASSWORD", "managementUsername", "rabbitmq"]

[[detector.patterns]]
regex = "RABBITMQ_USER\\s*=\\s*[\"'']?([^\"'\"\\s]{2,})[\"'']?"
description = "RabbitMQ username in environment variable"
group = 1

[[detector.patterns]]
regex = "RABBITMQ_PASSWORD\\s*=\\s*[\"'']?([^\"'\"\\s]{8,})[\"'']?"
description = "RabbitMQ password in environment variable"
group = 1

[[detector.patterns]]
regex = "managementUsername:\\s*[\"'']?([^\"'\"\\s]{2,})[\"'']?"
description = "RabbitMQ management username in Helm values"
group = 1

[[detector.patterns]]
regex = "managementPassword:\\s*[\"'']?([^\"'\"\\s]{8,})[\"'']?"
description = "RabbitMQ management password in Helm values"
group = 1

[[detector.patterns]]
regex = "\"name\":\\s*\"([^\"]{2,})\"[^}]*\"password\":\\s*\"([^\"]{8,})\""
description = "RabbitMQ user definition in JSON with password"
group = 2

[[detector.patterns]]
regex = "rabbitmqErlangCookie:\\s*[\"'']?([a-zA-Z0-9_-]{20,})[\"'']?"
description = "RabbitMQ Erlang cluster cookie"
group = 1

[detector.companion]
regex = "RABBITMQ_USER|managementUsername|\"name\":"
within_lines = 3
name = "rabbitmq_username"

[detector.verify]
method = "GET"
url = "https://api.rabbitmq.com/v1/me"

[detector.verify.auth]
type = "header"
name = "Authorization"
template = "Bearer {{match}}"

[detector.verify.success]
status = 200
