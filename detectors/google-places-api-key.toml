# Docs: https://developers.google.com/maps/documentation/places/web-service/get-api-key
# Format: AIzaSy prefix followed by 33 alphanumeric characters and symbols
# Verify: GET /maps/api/place/nearbysearch/json with key param returns 200 (may return REQUEST_DENIED for invalid but structured response)
# Prefix: AIzaSy

[detector]
id = "google-places-api-key"
name = "Google Places API Key"
service = "google-places"
severity = "high"
keywords = ["AIzaSy", "google", "places", "PLACES_API_KEY"]

[[detector.patterns]]
regex = 'AIzaSy[A-Za-z0-9_-]{33}'
description = "Google Places API key (AIzaSy prefix)"

[detector.verify]
method = "GET"
url = "https://api.google.com/v1/me"

[detector.verify.auth]
type = "header"
name = "Authorization"
template = "Bearer {{match}}"

[detector.verify.success]
status = 200
