# Docs: https://lawpay.com/developer-api-documentation
# Format: API Key and Secret pair - alphanumeric strings
# Verify: no public verification endpoint
# Prefix: none (requires context anchoring)

[detector]
id = "lawpay-api-credentials"
name = "LawPay API Credentials"
service = "lawpay"
severity = "critical"
keywords = ["LAWPAY_API_KEY", "LAWPAY_SECRET", "lawpay_api_key", "lawpay_secret", "X-LawPay-Key"]

[[detector.patterns]]
regex = "(?:LAWPAY|lawpay)[_\\s]?(?:API[_\\s]?KEY)[=:\\s\"'']+([a-zA-Z0-9_\\-]{32,})"
description = "LawPay API key with context anchor"
group = 1

[[detector.patterns]]
regex = "(?:LAWPAY|lawpay)[_\\s]?(?:API[_\\s]?SECRET|SECRET)[=:\\s\"'']+([a-zA-Z0-9_\\-]{32,64})"
description = "LawPay API secret with context anchor"
group = 1
