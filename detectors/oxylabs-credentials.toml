# Docs: https://developers.oxylabs.io/
# Format: Username:password OR customer-USERNAME format for proxy auth
# Verify: Basic auth request to proxy endpoint
# Prefix: customer- or user-

[detector]
id = "oxylabs-credentials"
name = "Oxylabs Credentials"
service = "oxylabs"
severity = "critical"
keywords = ["oxylabs", "OXylabs", "customer-", "pr.oxylabs.io", "dc.oxylabs.io"]

[[detector.patterns]]
regex = "customer-[a-zA-Z0-9_-]+:[a-zA-Z0-9_-]+"
description = "Oxylabs customer username:password format"

[[detector.patterns]]
regex = "user-[a-zA-Z0-9_-]+:[a-zA-Z0-9_-]+"
description = "Oxylabs user- username:password format"

[[detector.patterns]]
regex = "(?:oxylabs|OXYLABS)[=:\\s\"'']+([a-zA-Z0-9_-]+:[a-zA-Z0-9_-]+)"
description = "Oxylabs credentials with context anchor"
group = 1
