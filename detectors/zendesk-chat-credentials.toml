# Docs: https://developer.zendesk.com/api-reference/live-chat/introduction/
# Format: OAuth access token (Bearer token)
# Verify: GET /api/v2/chat/agents/me with Bearer token
# Prefix: none (requires context anchoring)

[detector]
id = "zendesk-chat-credentials"
name = "Zendesk Chat Access Token"
service = "zendesk"
severity = "high"
keywords = ["ZENDESK_CHAT", "zendesk_chat", "zopim", "chat_api"]

[[detector.patterns]]
regex = "(?i)(?:ZENDESK[_\\s]?CHAT|ZOPIM|CHAT[_\\s]?API)[_\\s]?(?:TOKEN|KEY|SECRET|ACCESS[_\\s]?TOKEN)[=:\\s\"'']+([a-f0-9]{32,64})"
description = "Zendesk Chat OAuth access token with context anchor"
group = 1

[[detector.patterns]]
regex = "(?i)(?:zendesk\\.com/api/v2/chat|zopim\\.com/api/v2)[^\\n\"'']*[=:\\s\"'']+([a-f0-9]{32,})"
description = "Zendesk Chat API endpoint with embedded token"
group = 1

[detector.verify]
method = "GET"
url = "https://www.zopim.com/api/v2/agents/me"

[detector.verify.auth]
type = "bearer"
field = "match"

[detector.verify.success]
status = 200
