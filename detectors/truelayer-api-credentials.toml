# Docs: https://docs.truelayer.com/
# Format: client_id and client_secret for OAuth2, plus signing keys for payments
# Verify: POST /connect/token with client credentials
# Prefix: sandbox-, live- (for some client IDs)

[detector]
id = "truelayer-api-credentials"
name = "TrueLayer API Credentials"
service = "truelayer"
severity = "critical"
keywords = ["TRUELAYER_CLIENT_ID", "TRUELAYER_CLIENT_SECRET", "client_id", "client_secret"]

[[detector.patterns]]
regex = "(?:TRUELAYER|truelayer)[._-]?(?:CLIENT|client)?[._-]?(?:ID|id)[=:\\s\"'']+((?:sandbox-|live-)?[a-z0-9-]{20,50})"
description = "TrueLayer Client ID with optional sandbox/live prefix"
group = 1

[[detector.patterns]]
regex = "(?:TRUELAYER|truelayer)[._-]?(?:CLIENT|client)?[._-]?(?:SECRET|secret)[=:\\s\"'']+([a-z0-9]{20,60})"
description = "TrueLayer Client Secret"
group = 1

[detector.verify]
method = "GET"
url = "https://api.truelayer.com/v1/me"

[detector.verify.auth]
type = "header"
name = "Authorization"
template = "Bearer {{match}}"

[detector.verify.success]
status = 200
