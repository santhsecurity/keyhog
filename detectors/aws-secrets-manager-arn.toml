# Docs: https://docs.aws.amazon.com/secretsmanager/latest/userguide/whats-in-a-secret.html
# Format: Secrets Manager secret identifiers use ARN syntax; the ARN is not the secret value
# Verify: none (an ARN is an identifier, not a credential, and must never be sent to a fake verifier)
# Prefix: arn:aws:secretsmanager:

[detector]
id = "aws-secrets-manager-arn"
name = "AWS Secrets Manager Secret ARN"
service = "aws-secrets-manager"
severity = "info"
keywords = ["arn:aws:secretsmanager", "secretsmanager"]

[[detector.patterns]]
regex = 'arn:aws:secretsmanager:[a-z0-9-]+:\d+:secret:[a-zA-Z0-9/_+=,.@:-]+'
description = "AWS Secrets Manager secret ARN identifier"
