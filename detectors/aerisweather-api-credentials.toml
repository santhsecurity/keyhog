# Docs: https://www.aerisweather.com/support/docs/api/
# Format: Access ID and Secret Key pair (OAuth 2.0 style client credentials)
# Verify: GET with access_id and secret_key parameters returns 200 if valid
# Prefix: none (requires context anchoring)

[detector]
id = "aerisweather-api-credentials"
name = "AerisWeather API Credentials"
service = "aerisweather"
severity = "medium"
keywords = ["AERIS", "aeris", "AERISWEATHER", "aerisweather", "XWEATHER", "xweather"]

[[detector.patterns]]
regex = "(?:AERIS|aeris|AERISWEATHER|aerisweather)[_\\s]*(?:CLIENT[_\\s]*)?ID[=:\\s\"'']+([a-zA-Z0-9]{8,20})"
description = "AerisWeather access/client ID"
group = 1

[[detector.patterns]]
regex = "(?:AERIS|aeris|AERISWEATHER|aerisweather)[_\\s]*(?:SECRET[_\\s]*)?KEY[=:\\s\"'']+([a-zA-Z0-9]{20,40})"
description = "AerisWeather secret key"
group = 1

[[detector.patterns]]
regex = "(?:access_id|ACCESS_ID)[=:\\s\"'']+([a-zA-Z0-9]{8,20})"
description = "AerisWeather access_id parameter"
group = 1

[[detector.companions]]
name = "aerisweather_secret_key"
regex = "(?:secret_key|SECRET_KEY)[=:\\s\"'']+([a-zA-Z0-9]{20,40})"
within_lines = 5
[detector.verify]
method = "GET"
url = "https://api.aerisapi.com/forecasts/London,UK?client_id={{match}}&client_secret={{companion.aerisweather_secret_key}}"

[detector.verify.auth]
type = "none"

[detector.verify.success]
status = 200
