# Docs: https://supabase.com/docs/guides/storage
# Format: JWT token with storage API endpoint URL
# Verify: GET /storage/v1/bucket with Bearer token returns 200
# Prefix: eyJ (JWT header, requires context anchoring for Storage)

[detector]
id = "supabase-storage-credentials"
name = "Supabase Storage Credentials"
service = "supabase"
severity = "high"
keywords = ["SUPABASE_STORAGE_URL", "SUPABASE_STORAGE_KEY", "storage.supabase.co"]

[[detector.patterns]]
regex = "SUPABASE_STORAGE_URL[=:\\s\"'']+(https?://[a-z0-9-]+\\.supabase\\.co[:/]storage[/v0-9]*)"
description = "Supabase Storage API URL with context anchor"
group = 1

[[detector.patterns]]
regex = "SUPABASE_STORAGE_KEY[=:\\s\"'']+(eyJ[a-zA-Z0-9_-]*\\.[a-zA-Z0-9_-]*\\.[a-zA-Z0-9_-]*)"
description = "Supabase Storage JWT key with context anchor"
group = 1

[[detector.patterns]]
regex = "storage\\.supabase\\.co[/:]v1"
description = "Supabase Storage v1 API endpoint direct match"

[detector.verify]
method = "GET"
url = "https://supabase.com/v1/me"

[detector.verify.auth]
type = "bearer"
field = "match"

[detector.verify.success]
status = 200
