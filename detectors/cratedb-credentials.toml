# Docs: https://crate.io/docs/crate/reference/en/latest/interfaces/http.html
# Format: Basic auth username/password or admin UI token
# Verify: no public verification endpoint
# Prefix: none (requires context anchoring)

[detector]
id = "cratedb-credentials"
name = "CrateDB Credentials"
service = "cratedb"
severity = "critical"
keywords = ["CRATE", "cratedb", "CRATEDB"]

[[detector.patterns]]
regex = "(?:CRATE|CRATEDB)[_\\s]*(?:URL|HOST)[=:\\s\"'']+(?:https?://|crate://)?(?:[^:@]+):([^@]+)@"
description = "CrateDB connection string with password"
group = 1

[[detector.companions]]
name = "cratedb_username"
regex = "(?:CRATE|CRATEDB)[_\\s]*(?:USER|USERNAME)[=:\\s\"'']+([^\"'']+)"
within_lines = 5
[[detector.patterns]]
regex = "(?:CRATE|CRATEDB)[_\\s]*(?:PASSWORD|PASS)[=:\\s\"'']+([a-zA-Z0-9_!@#$%^&*+=-]{16,})"
description = "CrateDB password with context anchor"
group = 1
