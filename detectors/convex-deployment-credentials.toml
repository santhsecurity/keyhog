# Docs: https://docs.convex.dev/management-api
# Format: Deploy key with format like "prod:project-name|eyJ2..." or "dev:project|token"
# Verify: no public verification endpoint (requires Convex CLI or deployment API)
# Prefix: prod:, dev:, preview: (requires context)

[detector]
id = "convex-deployment-credentials"
name = "Convex Deployment Credentials"
service = "convex"
severity = "critical"
keywords = ["CONVEX_DEPLOY_KEY", "convex.cloud", "convex.dev", "prod:", "dev:"]

[[detector.patterns]]
regex = "(?:prod|dev|preview):[a-z0-9-]+\\|[a-zA-Z0-9_-]+\\.eyJ[a-zA-Z0-9_-]*\\.[a-zA-Z0-9_-]+"
description = "Convex deployment key with JWT component"

[[detector.patterns]]
regex = "(?:CONVEX_DEPLOY_KEY|convex.?deploy)[=:\\s\"'']+((?:prod|dev|preview):[a-z0-9-]+\\|[A-Za-z0-9_-]{50,})"
description = "Convex deployment key with context anchor"
group = 1

[detector.verify]
method = "GET"
url = "https://api.convex.dev/v1/me"

[detector.verify.auth]
type = "header"
name = "Authorization"
template = "Bearer {{match}}"

[detector.verify.success]
status = 200
