# Docs: https://kafka.apache.org/documentation/#security_sasl
# Format: JAAS config with SASL mechanism (PLAIN, SCRAM-SHA-256, SCRAM-SHA-512)
# Verify: none (requires Kafka broker connection, no standard HTTP API)
# Prefix: none (context-anchored via JAAS/SASL keywords)

[detector]
id = "kafka-sasl-credentials"
name = "Kafka SASL Credentials"
service = "kafka"
severity = "high"
keywords = ["sasl.jaas.config", "SASL_PLAINTEXT", "SASL_SSL", "org.apache.kafka.common.security", "username", "password"]

[[detector.patterns]]
regex = "sasl\\.jaas\\.config\\s*=\\s*[\"']?org\\.apache\\.kafka\\.common\\.security\\.plain\\.PlainLoginModule\\s+required\\s+username\\s*=\\s*[\"']([^\"']+)[\"']\\s+password\\s*=\\s*[\"']([^\"']+)[\"'];?"
description = "Kafka SASL/PLAIN JAAS configuration with username and password"
group = 2

[[detector.patterns]]
regex = "sasl\\.jaas\\.config\\s*=\\s*[\"']?org\\.apache\\.kafka\\.common\\.security\\.scram\\.ScramLoginModule\\s+required\\s+username\\s*=\\s*[\"']([^\"']+)[\"']\\s+password\\s*=\\s*[\"']([^\"']+)[\"'];?"
description = "Kafka SASL/SCRAM JAAS configuration with username and password"
group = 2

[[detector.patterns]]
regex = "sasl\\.mechanism\\s*=\\s*[\"']?(PLAIN|SCRAM-SHA-256|SCRAM-SHA-512)[\"']?"
description = "Kafka SASL mechanism configuration (companion pattern)"

[[detector.patterns]]
regex = "(?:kafka|KAFKA)_(?:SASL_)?(?:PASSWORD|PASS|SECRET)[=:\\s\"']+([^\"'\\s]{8,})"
description = "Kafka password from environment variable"
group = 1

[[detector.patterns]]
regex = "(?:kafka|KAFKA)_(?:SASL_)?USERNAME[=:\\s\"']+([^\"'\\s]+)"
description = "Kafka username from environment variable"
group = 1
