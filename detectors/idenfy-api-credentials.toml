# Docs: https://documentation.idenfy.com/
# Format: Basic Auth with API Key (username) and API Secret (password)
# Verify: no public verification endpoint
# Prefix: none (requires context anchoring)

[detector]
id = "idenfy-api-credentials"
name = "iDenfy API Credentials"
service = "idenfy"
severity = "high"
keywords = ["idenfy", "IDENFY", "api_key", "api_secret"]

[[detector.patterns]]
regex = "(?:idenfy|IDENFY)[_\\s]*(api[_\\s]*key)[=:;\\s\"'']+([a-zA-Z0-9_-]{10,})"
description = "iDenfy API key with context anchor"
group = 2

[[detector.patterns]]
regex = "(?:idenfy|IDENFY)[_\\s]*(api[_\\s]*secret)[=:;\\s\"'']+([a-zA-Z0-9_-]{20,})"
description = "iDenfy API secret with context anchor"
group = 2

[detector.companion]
regex = "(?:idenfy|IDENFY)[_\\s]*(api[_\\s]*secret)[=:;\\s\"'']+([a-zA-Z0-9_-]{20,})"
within_lines = 5
name = "idenfy_api_secret"
