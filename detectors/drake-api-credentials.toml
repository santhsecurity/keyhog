# Docs: https://kb.drakesoftware.com/kb/Drake-User-Manager/17849.htm
# Format: SSO-based authentication; Account number and serial number for installation
# Verify: Login to Drake User Manager (user.drakesoftware.com)
# Prefix: none (requires context anchoring)

[detector]
id = "drake-api-credentials"
name = "Drake API Credentials"
service = "drake"
severity = "high"
keywords = ["DRAKE", "drake", "account_number", "serial_number"]

[[detector.patterns]]
regex = "(?:DRAKE|drake)[._]?(?:ACCOUNT|account)[._]?(?:NUM(?:BER)?|num(?:ber)?)?[=:\\s\"'']+(\\d{6,})"
description = "Drake account number with context anchor"
group = 1

[[detector.patterns]]
regex = "(?:DRAKE|drake)[._]?(?:SERIAL|serial)[._]?(?:NUM(?:BER)?|num(?:ber)?)?[=:\\s\"'']+([A-Z0-9]{8,})"
description = "Drake serial number with context anchor"
group = 1

[detector.verify]
method = "GET"
url = "https://kb.drakesoftware.com/v1/me"

[detector.verify.auth]
type = "header"
name = "Authorization"
template = "Bearer {{match}}"

[detector.verify.success]
status = 200
