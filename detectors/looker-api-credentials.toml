# Docs: https://cloud.google.com/looker/docs/admin-panel-users#authentication
# Format: Client ID and Client Secret pair, or API3 credentials
# Verify: POST /login with client_id and client_secret
# Prefix: none (requires context anchoring)

[detector]
id = "looker-api-credentials"
name = "Looker API Credentials"
service = "looker"
severity = "high"
keywords = ["LOOKER", "looker", "LOOKERSDK", "LOOKER_CLIENT"]

[[detector.patterns]]
regex = "(?:LOOKER|looker|LOOKERSDK)[._-]?(?:base[_-]?url|host|url)[=:\\s\"'']+(https?://[a-z0-9.-]+\\.looker\\.com(?::[0-9]+)?)"
description = "Looker instance URL"
group = 1

[[detector.patterns]]
regex = "(?:LOOKER|looker|LOOKERSDK)[._-]?(?:client[_-]?id)[=:\\s\"'']+([a-zA-Z0-9_-]+)"
description = "Looker API client ID"
group = 1

[[detector.patterns]]
regex = "(?:LOOKER|looker|LOOKERSDK)[._-]?(?:client[_-]?secret)[=:\\s\"'']+([a-zA-Z0-9_-]{20,})"
description = "Looker API client secret"
group = 1

[[detector.patterns]]
regex = "(?:LOOKER|looker)[._-]?(?:api[_-]?key|token)[=:\\s\"'']+([a-zA-Z0-9_-]{20,})"
description = "Looker API key/token"
group = 1

[[detector.patterns]]
regex = "(?:LOOKER|looker)[._-]?(?:username|user)[=:\\s\"'']+([a-zA-Z0-9_-]+)"
description = "Looker username"
group = 1

[[detector.patterns]]
regex = "(?:LOOKER|looker)[._-]?(?:password|pass|pwd)[=:\\s\"'']+([a-zA-Z0-9!@#$%^&*._-]{8,})"
description = "Looker password"
group = 1

[[detector.patterns]]
regex = "(?:LOOKER|looker|LOOKERSDK)[._-]?(?:verify[_-]?ssl)[=:\\s\"'']+(false|true)"
description = "Looker SSL verification setting"
group = 1

[detector.verify]
method = "GET"
url = "https://cloud.google.com/v1/me"

[detector.verify.auth]
type = "header"
name = "Authorization"
template = "Bearer {{match}}"

[detector.verify.success]
status = 200
