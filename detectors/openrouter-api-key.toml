# Docs: https://openrouter.ai/docs/api-reference/authentication
# Format: sk-or-v1- prefix followed by 48+ alphanumeric characters
# Verify: GET /api/v1/models with Bearer token returns 200 if valid
# Prefix: sk-or-v1-

[detector]
id = "openrouter-api-key"
name = "OpenRouter API Key"
service = "openrouter"
severity = "critical"
keywords = ["sk-or-v1-"]

[[detector.patterns]]
regex = 'sk-or-v1-[a-f0-9]{48,}'
description = "OpenRouter API key (sk-or-v1- prefix)"

[detector.verify]
method = "GET"
url = "https://openrouter.ai/api/v1/models"

[detector.verify.auth]
type = "bearer"
field = "match"

[detector.verify.success]
status = 200
