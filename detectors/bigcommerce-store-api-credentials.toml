# Docs: https://developer.bigcommerce.com/docs/start/authentication/api-accounts
# Format: Store hash (8-10 chars) + Access token (bbc_ prefix with 48+ chars) or Client ID/Secret pair
# Verify: GET /stores/{store_hash}/v3/store with X-Auth-Token header
# Prefix: bbc_

[detector]
id = "bigcommerce-store-api-credentials"
name = "BigCommerce Store API Credentials"
service = "bigcommerce"
severity = "critical"
keywords = ["bbc_", "bigcommerce", "store_hash", "X-Auth-Token", "client_id", "client_secret"]

[[detector.patterns]]
regex = "bbc_[a-zA-Z0-9]{48,}"
description = "BigCommerce V2/V3 API access token (bbc_ prefix)"

[[detector.patterns]]
regex = "(?:bigcommerce|BIGCOMMERCE)[_=:\\s\"'']+(?:store[_-]?hash)[=:\\s\"'']+([a-z0-9]{8,10})"
description = "BigCommerce store hash for API endpoint"
group = 1

[[detector.companions]]
name = "store_hash"
regex = "[a-z0-9]{8,10}"
within_lines = 5
[detector.verify]
method = "GET"
url = "https://api.bigcommerce.com/stores/{{companion.store_hash}}/v3/store"

[detector.verify.auth]
type = "header"
name = "X-Auth-Token"
template = "{{match}}"

[detector.verify.success]
status = 200
