# Docs: https://developers.piwik.pro/reference/authentication
# Format: Client ID and Client Secret (UUID format), exchanged for JWT access token
# Verify: POST /auth/token with client_credentials returns access token if valid
# Prefix: none (requires context anchoring)

[detector]
id = "piwikpro-api-credentials"
name = "Piwik PRO API Credentials"
service = "piwikpro"
severity = "high"
keywords = ["PIWIK_PRO_CLIENT_ID", "PIWIKPRO_CLIENT_ID", "piwik.pro"]

[[detector.patterns]]
regex = "(?:PIWIK[_\\-\\s]?PRO[_\\-\\s]?CLIENT[_\\-\\s]?ID|PIWIKPRO[_\\-\\s]?CLIENT[_\\-\\s]?ID|piwikpro[_\\-\\s]?client[_\\-\\s]?id)[=:\\s\"'']+([a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12})"
description = "Piwik PRO Client ID in UUID format with context anchor"
group = 1

[[detector.patterns]]
regex = "(?:PIWIK[_\\-\\s]?PRO[_\\-\\s]?CLIENT[_\\-\\s]?SECRET|PIWIKPRO[_\\-\\s]?CLIENT[_\\-\\s]?SECRET|piwikpro[_\\-\\s]?client[_\\-\\s]?secret)[=:\\s\"'']+([a-zA-Z0-9_-]{40,})"
description = "Piwik PRO Client Secret with context anchor"
group = 1

[detector.verify]
method = "GET"
url = "https://api.piwik.pro/v1/me"

[detector.verify.auth]
type = "header"
name = "Authorization"
template = "Bearer {{match}}"

[detector.verify.success]
status = 200
