# Docs: https://developer.vimeo.com/api/authentication
# Format: Access tokens start with numbers and are 32+ hex characters; Client IDs are shorter
# Verify: GET /me with Bearer auth returns 200 if valid
# Prefix: none (requires context anchoring)

[detector]
id = "vimeo-api-credentials"
name = "Vimeo API Credentials"
service = "vimeo"
severity = "high"
keywords = ["vimeo", "VIMEO", "VIMEO_ACCESS_TOKEN", "vimeo_access_token", "vimeo.com"]

[[detector.patterns]]
regex = "(?:vimeo|VIMEO)[_\\s]?(?:access_token|ACCESS_TOKEN|api_token)[=:\\s\"'']+([a-f0-9]{32,64})"
description = "Vimeo access token with context anchor"
group = 1

[[detector.patterns]]
regex = "VIMEO_ACCESS_TOKEN[=:\\s\"'']+([a-f0-9]{32,64})"
description = "Vimeo access token from environment variable"
group = 1

[[detector.patterns]]
regex = "(?:vimeo|VIMEO)[_\\s]?(?:client_id|CLIENT_ID)[=:\\s\"'']+([a-f0-9]{20,40})"
description = "Vimeo client ID with context anchor"
group = 1

[[detector.patterns]]
regex = "(?:vimeo|VIMEO)[_\\s]?(?:client_secret|CLIENT_SECRET)[=:\\s\"'']+([a-f0-9]{32,64})"
description = "Vimeo client secret with context anchor"
group = 1

[detector.verify]
method = "GET"
url = "https://api.vimeo.com/me"
success_codes = [200]

[[detector.verify.headers]]
name = "Authorization"
value = "Bearer {credential}"
