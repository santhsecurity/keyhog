# Docs: https://help.xmatters.com/ondemand/xmodwelcome/communicationplanbuilder/appendixrestapi.htm
# Format: API key with xm-api-key- prefix followed by alphanumeric characters
# Verify: GET /api/xm/1/people with Authorization header
# Prefix: xm-api-key-

[detector]
id = "xmatters-api-credentials"
name = "xMatters API Credentials"
service = "xmatters"
severity = "critical"
keywords = ["xm-api-key-", "XMATTERS_API_KEY", "xmatters"]

[[detector.patterns]]
regex = 'xm-api-key-[a-zA-Z0-9]{40,}'
description = "xMatters API key with xm-api-key- prefix"

[detector.verify]
method = "GET"
url = "https://company.xmatters.com/api/xm/1/people"

[detector.verify.auth]
type = "header"
name = "Authorization"
template = "Bearer {{match}}"

[detector.verify.success]
status = 200
