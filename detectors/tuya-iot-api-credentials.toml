# Docs: https://developer.tuya.com/en/docs/iot/open-api/overview
# Format: Access ID (20-char) and Access Secret (32-char) pair
# Verify: Sign API requests using Access ID, timestamp, and string-to-sign
# Prefix: none (requires context anchoring)

[detector]
id = "tuya-iot-api-credentials"
name = "Tuya IoT API Credentials"
service = "tuya"
severity = "high"
keywords = ["tuya", "access_id", "access_secret", "client_id", "client_secret"]

[[detector.patterns]]
regex = "(?:tuya|TUYA)[._-]?(?:ACCESS[_-]?ID|access[_-]?id|CLIENT[_-]?ID|client[_-]?id)[=:\\s\"'']+([a-z0-9]{20})"
description = "Tuya IoT platform access ID"
group = 1

[[detector.patterns]]
regex = "(?:tuya|TUYA)[._-]?(?:ACCESS[_-]?SECRET|access[_-]?secret|CLIENT[_-]?SECRET|client[_-]?secret)[=:\\s\"'']+([a-f0-9]{32})"
description = "Tuya IoT platform access secret"
group = 1
