# Docs: https://docs.gitlab.com/ee/user/project/integrations/webhooks.html#validate-payloads-by-secret-token
# Format: User-defined string (typically 16-64 characters) used for HMAC-SHA256 signature verification
# Verify: no public verification endpoint (local signature verification using X-Gitlab-Token header)
# Prefix: none (requires context anchoring)

[detector]
id = "gitlab-webhook-secret"
name = "GitLab Webhook Secret"
service = "gitlab"
severity = "high"
keywords = ["GITLAB_WEBHOOK_SECRET", "gitlab_webhook_secret", "webhook_secret", "X-Gitlab-Token", "secret_token"]

[[detector.patterns]]
regex = "(?:GITLAB|gitlab)[._-]?(?:WEBHOOK|webhook|HOOK|hook)[._-]?(?:SECRET|secret|TOKEN|token)[=:\\s\"'']+([a-zA-Z0-9_-]{16,64})"
description = "GitLab webhook secret with context anchor"
group = 1

[[detector.patterns]]
regex = "(?:gitlab|GITLAB)[._-]?secret[_-]?token[=:\\s\"'']+([a-zA-Z0-9_-]{16,64})"
description = "GitLab secret token for webhook validation"
group = 1

[detector.verify]
method = "GET"
url = "https://api.gitlab.com/v1/me"

[detector.verify.auth]
type = "header"
name = "Authorization"
template = "Bearer {{match}}"

[detector.verify.success]
status = 200
