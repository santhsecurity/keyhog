# Docs: https://api.contabo.com/
# Format: ClientId and ClientSecret are alphanumeric, API User is email, API Password is user-defined
# Verify: OAuth2 flow to auth.contabo.com - no simple verification endpoint
# Prefix: none (requires context anchoring)

[detector]
id = "contabo-api-credentials"
name = "Contabo API Credentials"
service = "contabo"
severity = "critical"
keywords = ["CONTABO_CLIENT_ID", "CONTABO_CLIENT_SECRET", "CONTABO_API_USER", "CONTABO_API_PASSWORD", "contabo"]

[[detector.patterns]]
regex = "(?:CONTABO_CLIENT_ID|contabo_client_id)[=:\\s\"'']+([a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12})"
description = "Contabo OAuth2 client ID (UUID format) with context anchor"
group = 1

[[detector.patterns]]
regex = "(?:CONTABO_CLIENT_SECRET|contabo_client_secret)[=:\\s\"'']+([a-zA-Z0-9_-]{40,128})"
description = "Contabo OAuth2 client secret with context anchor"
group = 1

[detector.verify]
method = "GET"
url = "https://api.contabo.com/v1/me"

[detector.verify.auth]
type = "header"
name = "Authorization"
template = "Bearer {{match}}"

[detector.verify.success]
status = 200
