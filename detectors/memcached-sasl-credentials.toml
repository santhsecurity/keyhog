# Docs: https://docs.memcached.org/protocols/binarysasl/
# Format: Username and password via SASL PLAIN authentication
# Verify: no public verification endpoint
# Prefix: none (requires context anchoring)

[detector]
id = "memcached-sasl-credentials"
name = "Memcached SASL Credentials"
service = "memcached"
severity = "high"
keywords = ["MEMCACHE_USERNAME", "MEMCACHE_PASSWORD", "memcached", "sasl"]

[[detector.patterns]]
regex = "MEMCACHE_USERNAME\\s*=\\s*[\"'']?([^\"'\"\\s]{3,})[\"'']?"
description = "Memcached SASL username in environment variable"
group = 1

[[detector.patterns]]
regex = "MEMCACHE_PASSWORD\\s*=\\s*[\"'']?([^\"'\"\\s]{8,})[\"'']?"
description = "Memcached SASL password in environment variable"
group = 1

[[detector.patterns]]
regex = "memcached.*username\\s*=\\s*([^;\\s]{3,})"
description = "Memcached username in URI query parameter"
group = 1

[[detector.patterns]]
regex = "memcached.*password\\s*=\\s*([^;\\s]{8,})"
description = "Memcached password in URI query parameter"
group = 1

[detector.companion]
regex = "MEMCACHE_USERNAME|memcached.*username"
within_lines = 3
name = "memcached_sasl_username"

[detector.verify]
method = "GET"
url = "https://api.memcached.org/v1/me"

[detector.verify.auth]
type = "header"
name = "Authorization"
template = "Bearer {{match}}"

[detector.verify.success]
status = 200
