# Docs: https://docs.near.org/
# Format: Near Protocol RPC endpoints use API keys in URL or header
# Verify: no public verification endpoint
# Prefix: none (requires context anchoring)

[detector]
id = "near-api-credentials"
name = "Near Protocol API Credentials"
service = "near"
severity = "high"
keywords = ["near", "NEAR", "near.org", "nearprotocol", "near-api"]

[[detector.patterns]]
regex = '(?:near|NEAR)[._-]?(?:rpc|RPC)[._-]?(?:url|URL|endpoint)[=:"	\s]+(https?://[a-zA-Z0-9._-]+\.near\.[a-z]+/[a-zA-Z0-9_-]+)'
description = "Near Protocol RPC URL with embedded access token"
group = 1

[[detector.patterns]]
regex = '(?:near|NEAR)[._-]?(?:rpc|RPC)[._-]?(?:url|URL|endpoint)[=:"	\s]+(https?://rpc\.[a-z]+\.near\.[a-z]+/[a-zA-Z0-9_-]+)'
description = "Near Protocol RPC endpoint with access token"
group = 1

[[detector.patterns]]
regex = '(?:near|NEAR)[._-]?(?:api|API)[._-]?key[=:"	\s]+([a-f0-9]{32,})'
description = "Near Protocol API key (32+ hex characters)"
group = 1

[[detector.patterns]]
regex = '(?:near|NEAR)[._-]?(?:account|ACCOUNT)[._-]?(?:id|ID)[=:"	\s]+([a-z0-9_-]+\.(?:testnet|near))'
description = "Near Protocol account ID (testnet or mainnet)"
group = 1

[detector.verify]
method = "GET"
url = "https://api.near.org/v1/me"

[detector.verify.auth]
type = "header"
name = "Authorization"
template = "Bearer {{match}}"

[detector.verify.success]
status = 200
