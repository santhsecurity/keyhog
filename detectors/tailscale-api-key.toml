# Docs: https://tailscale.com/docs/reference/key-prefixes
# Format: tskey-api- prefix followed by alphanumeric characters (e.g., tskey-api-kAbCdEfGhIjKlMnOpQrStUvWxYz)
# Verify: GET /api/v2/tailnet/-/devices with Bearer token returns 200 if valid
# Prefix: tskey-api-

[detector]
id = "tailscale-api-key"
name = "Tailscale API Key"
service = "tailscale"
severity = "critical"
keywords = ["tskey-api-"]

[[detector.patterns]]
regex = 'tskey-api-[a-zA-Z0-9]+-[a-zA-Z0-9]+'
description = "Tailscale API access token (tskey-api- prefix)"

[detector.verify]
method = "GET"
url = "https://api.tailscale.com/api/v2/tailnet/-/devices"

[detector.verify.auth]
type = "bearer"
field = "match"

[detector.verify.success]
status = 200
