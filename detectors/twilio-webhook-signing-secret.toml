# Docs: https://www.twilio.com/docs/usage/webhooks/webhooks-security
# Format: 32-40 character alphanumeric string used for HMAC-SHA256 signature verification
# Verify: no public verification endpoint (local signature verification using X-Twilio-Signature header)
# Prefix: none (requires context anchoring)

[detector]
id = "twilio-webhook-signing-secret"
name = "Twilio Webhook Signing Secret"
service = "twilio"
severity = "high"
keywords = ["TWILIO_WEBHOOK_SECRET", "twilio_webhook_secret", "auth_token", "X-Twilio-Signature"]

[[detector.patterns]]
regex = "(?:TWILIO|twilio)[._-]?(?:WEBHOOK|webhook)[._-]?(?:SECRET|secret|AUTH|auth)[=:\\s\"'']+([a-zA-Z0-9]{32,40})"
description = "Twilio webhook signing secret with context anchor"
group = 1

[[detector.patterns]]
regex = "(?:TWILIO|twilio)[._-]?(?:AUTH|auth)[._-]?(?:TOKEN|token)[=:\\s\"'']+([a-zA-Z0-9]{32,40})"
description = "Twilio Auth Token used for webhook validation"
group = 1

[detector.verify]
method = "GET"
url = "https://api.twilio.com/v1/me"

[detector.verify.auth]
type = "header"
name = "Authorization"
template = "Bearer {{match}}"

[detector.verify.success]
status = 200
