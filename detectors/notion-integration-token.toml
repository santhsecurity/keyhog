# Docs: https://developers.notion.com/reference/authentication
# Format: Internal integration tokens - legacy 'secret_' prefix or current 'ntn_' prefix followed by 43-50 alphanumeric characters
# Verify: Bearer token sent to api.notion.com/v1/search endpoint, returns 200 on success
# Prefix: secret_, ntn_

[detector]
id = "notion-integration-token"
name = "Notion Integration Token"
service = "notion"
severity = "high"
keywords = ["secret_", "ntn_"]

[[detector.patterns]]
regex = 'secret_[a-zA-Z0-9]{43,50}'
description = "Notion internal integration token (secret_ prefix - legacy format)"

[[detector.patterns]]
regex = 'ntn_[a-zA-Z0-9]{43,50}'
description = "Notion internal integration token (ntn_ prefix - current format)"

[detector.verify]
method = "POST"
url = "https://api.notion.com/v1/search"

[detector.verify.auth]
type = "bearer"
field = "match"

[detector.verify.success]
status = 200

[[detector.verify.metadata]]
name = "results"
json_path = "results"
