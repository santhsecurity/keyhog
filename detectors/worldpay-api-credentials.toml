# Docs: https://developer.fiserv.com/product/CommerceHub/docs/?path=docs/Resources/Guides/Credentials.md
# Format: Service ID and API key (varies by integration type)
# Verify: POST to Worldpay/FISERV API with proper headers
# Prefix: none (requires context anchoring)

[detector]
id = "worldpay-api-credentials"
name = "Worldpay API Credentials"
service = "worldpay"
severity = "critical"
keywords = ["WORLDPAY", "worldpay", "SERVICE_ID", "API_KEY", "fiserv", "FISERV", "merchant_id"]

[[detector.patterns]]
regex = "(?:WORLDPAY|worldpay)[._-]?(?:SERVICE|service)?[._-]?(?:ID|id)?[=:\\s\"'']+([a-zA-Z0-9_-]{10,30})"
description = "Worldpay Service ID with context anchor"
group = 1

[[detector.patterns]]
regex = "(?:WORLDPAY|worldpay)[._-]?(?:API|api)?[._-]?(?:KEY|key)?[=:\\s\"'']+([a-zA-Z0-9]{32,64})"
description = "Worldpay API Key with context anchor"
group = 1

[[detector.patterns]]
regex = "(?:WORLDPAY|worldpay)[._-]?(?:MERCHANT|merchant)?[._-]?(?:ID|id)?[=:\\s\"'']+([a-zA-Z0-9]{8,20})"
description = "Worldpay Merchant ID with context anchor"
group = 1

[[detector.patterns]]
regex = "(?:FISERV|fiserv)[._-]?(?:API|api)?[._-]?(?:KEY|key)?[=:\\s\"'']+([a-zA-Z0-9]{32,64})"
description = "FISERV API Key with context anchor"
group = 1

[detector.companion]
regex = "(?:WORLDPAY|worldpay|FISERV|fiserv)"
within_lines = 5
name = "worldpay_companion"

[detector.verify]
method = "GET"
url = "https://developer.fiserv.com/v1/me"

[detector.verify.auth]
type = "header"
name = "Authorization"
template = "Bearer {{match}}"

[detector.verify.success]
status = 200
