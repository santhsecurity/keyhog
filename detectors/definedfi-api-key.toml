# Docs: https://docs.defined.fi/
# Format: 64 character hexadecimal string
# Verify: no public verification endpoint
# Prefix: none (64 char hex, requires context anchoring)

[detector]
id = "definedfi-api-key"
name = "Defined.fi API Key"
service = "definedfi"
severity = "medium"
keywords = ["defined", "DEFINED", "definedfi", "api_key"]

[[detector.patterns]]
regex = "(?:DEFINED|defined)[_=:\\s\"'']+(?:api[_-]?)?key[=:\\s\"'']+([a-f0-9]{64})"
description = "Defined.fi API key (64 char hex) with context anchor"
group = 1

[detector.verify]
method = "GET"
url = "https://api.defined.fi/v1/me"

[detector.verify.auth]
type = "header"
name = "Authorization"
template = "Bearer {{match}}"

[detector.verify.success]
status = 200
