# Docs: https://docs.nats.io/using-nats/developer/connecting/creds
# Format: NATS credentials file with JWT and seed key, or password/token in URL
# Verify: none (requires NATS connection, no standard HTTP API)
# Prefix: -----BEGIN NATS USER JWT----- or NKEY seed starting with SU

[detector]
id = "nats-credentials"
name = "NATS Credentials"
service = "nats"
severity = "high"
keywords = ["-----BEGIN NATS USER JWT-----", "-----BEGIN NATS USER NKEY SEED-----", "SU", "nats://", "NATS_"]

[[detector.patterns]]
regex = "-----BEGIN NATS USER JWT-----\\s*\n([A-Za-z0-9_-]+={0,2})\\s*\n-----END NATS USER JWT-----"
description = "NATS user JWT token"
group = 1

[[detector.patterns]]
regex = "-----BEGIN NATS USER NKEY SEED-----\\s*\n(SU[A-Za-z0-9]{58})\\s*\n-----END NATS USER NKEY SEED-----"
description = "NATS user NKEY seed (starts with SU)"
group = 1

[[detector.patterns]]
regex = "nats://[^@\\s\"']+@"
description = "NATS URL with embedded token/password"

[[detector.patterns]]
regex = "(?:NATS|nats)_(?:PASSWORD|PASS|TOKEN)[=:\\s\"']+([^\"'\\s]{8,})"
description = "NATS password/token from environment variable"
group = 1

[[detector.patterns]]
regex = "(?:NATS|nats)_CREDENTIALS[=:\\s\"']+([/a-zA-Z0-9._-]+\\.creds)"
description = "NATS credentials file path"
group = 1

[detector.verify]
method = "GET"
url = "https://api.nats.io/v1/me"

[detector.verify.auth]
type = "header"
name = "Authorization"
template = "Bearer {{match}}"

[detector.verify.success]
status = 200
