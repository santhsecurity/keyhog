# Kubernetes Secret manifest — base64 values in data fields are likely secrets.
# Only matches Secret kind, not ConfigMap.
# Verify: https://kubernetes.io/docs/reference/kubernetes-api/authentication-resources/token-review-v1/

[detector]
id = "kubernetes-secret"
name = "Kubernetes Secret Value"
service = "kubernetes"
severity = "high"
keywords = ["kind: Secret", "apiVersion", "data:", "stringData:"]

[[detector.patterns]]
regex = "(?:data|stringData):[\\s]*[\\n]\\s+[\\w.-]+:\\s+([a-zA-Z0-9+/=]{16,})"
description = "Base64-encoded value in Kubernetes Secret manifest"
group = 1

[detector.verify]
method = "POST"
url = "https://kubernetes.default.svc/api/v1/namespaces/default/secrets"

[detector.verify.auth]
type = "bearer"
field = "match"

[detector.verify.success]
status = 200
