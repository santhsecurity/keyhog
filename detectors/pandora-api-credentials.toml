# Docs: https://developer.pandora.com/docs/reference/
# Format: Partner OAuth credentials (client_id and client_secret)
# Verify: POST /v1/oauth/token with Basic auth returns 200 if valid
# Prefix: none (requires context anchoring)

[detector]
id = "pandora-api-credentials"
name = "Pandora API Credentials"
service = "pandora"
severity = "high"
keywords = ["PANDORA", "pandora", "PANDORA_CLIENT_ID", "PANDORA_CLIENT_SECRET"]

[[detector.patterns]]
regex = "(?:PANDORA|pandora)[\\\\s_-]?(?:CLIENT|client)[\\\\s_-]?(?:ID|id)[=:\\s\"'']+([a-zA-Z0-9]{16,32})"
description = "Pandora client ID with context anchor"
group = 1

[[detector.patterns]]
regex = "(?:PANDORA|pandora)[\\\\s_-]?(?:CLIENT|client)[\\\\s_-]?(?:SECRET|secret)[=:\\s\"'']+([a-zA-Z0-9]{16,48})"
description = "Pandora client secret with context anchor"
group = 1

[[detector.companions]]
name = "pandora_credential_pair"
regex = "(?:PANDORA|pandora)[\\\\s_-]?(?:CLIENT|client)[\\\\s_-]?(?:ID|id|SECRET|secret)[=:\\s\"'']+[a-zA-Z0-9]{16,48}"
within_lines = 5
