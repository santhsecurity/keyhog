# Docs: https://uploadcare.com/docs/keys/
# Format: 32 hexadecimal characters (hex string, no dashes)
# Verify: none (requires public key pair for verification)
# Prefix: none (generic hex, requires context anchoring)

[detector]
id = "uploadcare-secret-key"
name = "Uploadcare Secret Key"
service = "uploadcare"
severity = "critical"
keywords = ["UPLOADCARE_SECRET", "UPLOADCARE_SECRET_KEY", "secret_key", "demosecretkey"]

[[detector.patterns]]
regex = "(?:UPLOADCARE|uploadcare)[._-]?(?:SECRET)[=:\\s\"']+([a-f0-9]{32})"
description = "Uploadcare secret key (32 hex chars) with context anchor"
group = 1

# Companion: Public key (required for REST API authentication). Public/secret
# pairs live next to each other in env config; within_lines=5 is the
# natural anchor and satisfies the pure-character-class validator rule.
[[detector.companions]]
name = "public_key"
regex = "[a-f0-9]{32}"
within_lines = 5
