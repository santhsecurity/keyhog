# Docs: https://thalesdocs.com/ctp/cm/concept/partitions-and-credentials.html
# Format: CipherTrust uses username/password or API tokens for CM REST API
# Verify: GET /api/v1/auth/tokens with credentials returns 200
# Prefix: none (requires context anchoring)

[detector]
id = "thales-ciphertrust-credentials"
name = "Thales CipherTrust Credential"
service = "thales-ciphertrust"
severity = "critical"
keywords = ["CIPHERTRUST", "ciphertrust", "THALES", "thales", "CM_REST", "cm_rest"]

[[detector.patterns]]
regex = '''(?:CIPHERTRUST|ciphertrust|CM_REST|cm_rest)[._](?:USERNAME|username|PASSWORD|password|API_TOKEN|api_token)[=:\s"']+([a-zA-Z0-9!@#$%^&*._-]+)'''
description = "Thales CipherTrust Manager credential with context anchor"
group = 1

[[detector.patterns]]
regex = 'cm[a-z0-9-]*\.[a-z0-9-]+\.thalesciphertrust\.io'
description = "Thales CipherTrust Manager domain endpoint"

# NOTE: live verification disabled. `{{domain}}` was undefined.
