# Docs: https://developers.schoology.com/api-documentation/authentication
# Format: OAuth 1.0a credentials - consumer key (alphanumeric) + consumer secret
# Verify: OAuth 1.0a signed request to /users/me returns 200 if valid
# Prefix: none (requires context anchoring)

[detector]
id = "schoology-api-credentials"
name = "Schoology API Credentials"
service = "schoology"
severity = "high"
keywords = ["schoology", "SCHOOLOGY", "schoology_api", "schoology_key"]

[[detector.patterns]]
regex = "(?:schoology)[_\\s.-]*(?:consumer[_\\s.-]*)?(?:key|oauth[_\\s.-]*key)[=:\\s\"'']+([a-zA-Z0-9]{20,40})"
description = "Schoology OAuth consumer key with context anchor"
group = 1

[[detector.patterns]]
regex = "(?:schoology)[_\\s.-]*(?:consumer[_\\s.-]*)?(?:secret|oauth[_\\s.-]*secret)[=:\\s\"'']+([a-f0-9]{32,64})"
description = "Schoology OAuth consumer secret with context anchor"
group = 1
