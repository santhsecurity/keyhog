# Docs: https://payloadcms.com/docs/authentication/config
# Format: API key enabled via useAPIKey: true, UUID format like "77c9b8b0-1b81-46a1-ab62-86f76f427eed"
# Verify: GET /api/users/me with Authorization: {collection} API-Key {key} header
# Prefix: none (UUID format, requires context anchoring)

[detector]
id = "payload-cms-api-key"
name = "Payload CMS API Key"
service = "payload"
severity = "high"
keywords = ["PAYLOAD_SECRET", "payloadcms", "API-Key", "PAYLOAD_API_KEY"]

[[detector.patterns]]
regex = "(?:PAYLOAD|payload)[_\\s]?(?:API[_\\s]?KEY|SECRET)[=:\\s\"'']+([a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12})"
description = "Payload CMS API key (UUID format) with context anchor"
group = 1

[[detector.patterns]]
regex = "API-Key\\s+([a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12})"
description = "Payload CMS API key in Authorization header"
group = 1

[detector.verify]
method = "GET"
url = "https://payloadcms.com/v1/me"

[detector.verify.auth]
type = "bearer"
field = "match"

[detector.verify.success]
status = 200
