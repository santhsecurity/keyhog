# Docs: https://cloud.docs.scylladb.com/stable/api-docs/
# Format: ScyllaDB Cloud uses personal access tokens (alphanumeric) for API authentication
# Verify: GET /api/v1/clusters with Authorization header returns 200 if valid
# Prefix: none (requires context anchoring)

[detector]
id = "scylladb-credentials"
name = "ScyllaDB Credentials"
service = "scylladb"
severity = "high"
keywords = ["SCYLLADB", "SCYLLA_TOKEN", "SCYLLA_CLOUD", "SCYLLADB_API"]

[[detector.patterns]]
regex = "(?:SCYLLA(?:DB)?[_-](?:TOKEN|API[_-]?TOKEN|CLOUD[_-]?TOKEN))[=:\\s\"'']+([a-zA-Z0-9_-]{20,})"
description = "ScyllaDB Cloud API token with context anchor"
group = 1

[[detector.patterns]]
regex = "(?:SCYLLA(?:DB)?[_-]USERNAME)[=:\\s\"'']+([a-zA-Z0-9_-]+)"
description = "ScyllaDB username with context anchor"
group = 1

[[detector.companions]]
name = "ScyllaDB Password"
regex = "(?:SCYLLA(?:DB)?[_-]PASSWORD)[=:\\s\"'']+[a-zA-Z0-9_-]+"
within_lines = 5
