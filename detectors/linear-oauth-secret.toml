# Docs: https://linear.app/developers/oauth-2.0-authentication
# Format: OAuth client secret - 32-64 alphanumeric characters (no unique prefix)
# Verify: POST to api.linear.app/oauth/token with client_id and client_secret
# Prefix: none (requires context anchoring)

[detector]
id = "linear-oauth-secret"
name = "Linear OAuth Client Secret"
service = "linear"
severity = "high"
keywords = ["LINEAR_CLIENT_SECRET", "linear_client_secret", "LINEAR_OAUTH"]

[[detector.patterns]]
regex = "(?:LINEAR|linear)[_.]?(?:CLIENT|client|OAUTH|oauth)[_.]?(?:SECRET|secret)[=:\\s\"'']+([a-zA-Z0-9]{32,64})"
description = "Linear OAuth client secret with context anchor"
group = 1

[[detector.companions]]
name = "client_id"
regex = "(?:LINEAR|linear)[_.]?(?:CLIENT|client)[_.]?(?:ID|id)[=:\\s\"'']+([A-Za-z0-9_\\-]{8,64})"
within_lines = 5
[detector.verify]
method = "POST"
url = "https://api.linear.app/oauth/token"
body = "{\"grant_type\":\"authorization_code\",\"code\":\"keyhog-invalid-code\",\"redirect_uri\":\"https://example.com\"}"

[detector.verify.auth]
type = "basic"
username = "companion.client_id"
password = "match"

[[detector.verify.headers]]
name = "Content-Type"
value = "application/json"

[detector.verify.success]
status = 400
body_contains = "invalid_grant"
