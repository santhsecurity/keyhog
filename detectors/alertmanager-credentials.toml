# Docs: https://prometheus.io/docs/alerting/latest/configuration/
# Format: Basic auth credentials for Alertmanager web UI/API
# Verify: GET /-/healthy with Basic auth
# Prefix: none (requires context anchoring)

[detector]
id = "alertmanager-credentials"
name = "AlertManager Credentials"
service = "alertmanager"
severity = "high"
keywords = ["ALERTMANAGER_USER", "ALERTMANAGER_PASSWORD", "alertmanager"]

[[detector.patterns]]
regex = "(?:ALERTMANAGER|alertmanager)[_\\s]*(USER|USERNAME)[=:\\s\"\\']+([a-zA-Z0-9_-]+)"
description = "AlertManager username with context anchor"
group = 2

[detector.companion]
regex = "(?:ALERTMANAGER|alertmanager)[_\\s]*PASS(?:WORD)?[=:\\s\"\\']+([a-zA-Z0-9!@#$%^&*._-]+)"
within_lines = 5
name = "alertmanager_password"


type = "basic"
username = "match"
password = "companion"

[detector.verify]
method = "GET"
url = "https://api.alertmanager.com/v1/me"

[detector.verify.auth]
type = "bearer"
field = "match"

[detector.verify.success]
status = 200
