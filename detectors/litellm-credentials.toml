# Docs: https://docs.litellm.ai/docs/proxy/config_settings
# Format: LITELLM_MASTER_KEY uses sk- prefix or custom key format
# Verify: no public verification endpoint (self-hosted)
# Prefix: sk- (LITELLM_MASTER_KEY)

[detector]
id = "litellm-credentials"
name = "LiteLLM Credentials"
service = "litellm"
severity = "critical"
keywords = ["LITELLM_MASTER_KEY", "LITELLM_API_KEY", "litellm"]

[[detector.patterns]]
regex = "(?:LITELLM_MASTER_KEY|LITELLM_API_KEY)[=:\\s\"'']+(sk-[a-zA-Z0-9]{20,})"
description = "LiteLLM master API key with context"
group = 1

[[detector.patterns]]
regex = "(?:LITELLM_SALT_KEY)[=:\\s\"'']+([a-zA-Z0-9+/]{20,})"
description = "LiteLLM salt key for encryption"
group = 1
