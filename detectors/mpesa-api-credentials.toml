# Docs: https://developer.safaricom.co.ke/
# Format: Consumer Key and Consumer Secret pair for OAuth2 authentication
# Verify: no public verification endpoint
# Prefix: none (requires context anchoring)

[detector]
id = "mpesa-api-credentials"
name = "M-Pesa API Credentials"
service = "mpesa"
severity = "critical"
keywords = ["MPESA", "mpesa", "MPESA_CONSUMER_KEY", "MPESA_CONSUMER_SECRET", "Safaricom"]

[[detector.patterns]]
regex = "(?:MPESA|mpesa|M-Pesa)[_.]?(?:CONSUMER_KEY|consumer_key|CONSUMERKEY|consumerkey|API_KEY|api_key)[=:\\s\"']+([a-zA-Z0-9]{24,})"
description = "M-Pesa Consumer Key with context anchor"
group = 1

[[detector.patterns]]
regex = "(?:MPESA|mpesa|M-Pesa)[_.]?(?:CONSUMER_SECRET|consumer_secret|CONSUMERSECRET|consumersecret|API_SECRET|api_secret)[=:\\s\"']+([a-zA-Z0-9]{24,})"
description = "M-Pesa Consumer Secret with context anchor"
group = 1

[detector.companion]
regex = "(?:MPESA|mpesa)[_.]?(?:CONSUMER_KEY|consumer_key)[=:\\s\"']+[a-zA-Z0-9]{24,}"
within_lines = 5
name = "M-Pesa consumer key"

[detector.verify]
method = "GET"
url = "https://developer.safaricom.co.ke/v1/me"

[detector.verify.auth]
type = "header"
name = "Authorization"
template = "Bearer {{match}}"

[detector.verify.success]
status = 200
