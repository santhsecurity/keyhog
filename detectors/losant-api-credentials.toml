# Docs: https://docs.losant.com/
# Format: Application Access Key and Secret pair (24+ char alphanumeric)
# Verify: POST to auth endpoint with LosantAccessKey and LosantAccessSecret
# Prefix: none (requires context anchoring)

[detector]
id = "losant-api-credentials"
name = "Losant API Credentials"
service = "losant"
severity = "high"
keywords = ["losant", "access_key", "access_secret", "losant.com"]

[[detector.patterns]]
regex = "(?:losant|LOSANT)[._-]?(?:ACCESS[_-]?KEY|access[_-]?key)[=:\\s\"'']+([a-zA-Z0-9_-]{20,})"
description = "Losant application access key"
group = 1

[[detector.patterns]]
regex = "(?:losant|LOSANT)[._-]?(?:ACCESS[_-]?SECRET|access[_-]?secret)[=:\\s\"'']+([a-zA-Z0-9_-]{20,})"
description = "Losant application access secret"
group = 1

[detector.verify]
method = "GET"
url = "https://api.losant.com/v1/me"

[detector.verify.auth]
type = "header"
name = "Authorization"
template = "Bearer {{match}}"

[detector.verify.success]
status = 200
