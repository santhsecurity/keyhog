# Docs: https://developer.okta.com/docs/guides/implement-grant-type/authcode/main/
# Format: Client ID (20 alphanumeric with 00 prefix) and Client Secret (48-64 characters)
# Verify: POST /token with client_credentials grant type
# Prefix: 00 (for client ID)

[detector]
id = "okta-oidc-client-secret"
name = "Okta OIDC Client Secret"
service = "okta"
severity = "critical"
keywords = ["OKTA", "okta", "OIDC", "oidc", "client_secret"]

[[detector.patterns]]
regex = "(?:OKTA|okta)[_\\s]*CLIENT[_\\s]*SECRET[=:\\s\"'']+([a-zA-Z0-9_-]{48,64})"
description = "Okta OIDC client secret with context anchor"
group = 1

[[detector.patterns]]
regex = "(?:OKTA|okta)[_\\s]*CLIENT[_\\s]*ID[=:\\s\"'']+(00[a-zA-Z0-9_-]{18,20})"
description = "Okta OIDC client ID with context anchor"
group = 1

[[detector.patterns]]
regex = "(?:OKTA|okta)[_\\s]*(?:ISSUER|DOMAIN|ORG)[=:\\s\"'']+(https?://[^\\s\"'']+)"
description = "Okta issuer/domain with context anchor"
group = 1

[[detector.companions]]
name = "okta_client_id"
# Companion match value is the entire match — strip the contextual prefix
# so substitutions yield just the 00... id.
regex = "00[a-zA-Z0-9_-]{18,20}"
within_lines = 5

# Issuer companion: needed to template the verify URL host. Match a full
# Okta issuer URL anchored to *.okta.com / *.oktapreview.com.
[[detector.companions]]
name = "okta_issuer"
regex = 'https?://[a-zA-Z0-9-]+\.(?:okta\.com|oktapreview\.com)(?:/[A-Za-z0-9_/-]*)?'
within_lines = 5

[detector.verify]
method = "POST"
# Earlier this used single-brace `{issuer}` which interpolate.rs ignored,
# so the URL went out as a literal `{issuer}/v1/token` and 4xx'd. The
# `okta_issuer` companion is now substituted via `{{...}}` and the
# allowlist (inherited from the `okta` service) keeps the request scoped
# to genuine Okta tenants.
url = "{{companion.okta_issuer}}/v1/token"
allowed_domains = ["okta.com", "oktapreview.com"]

[detector.verify.auth]
type = "basic"
# `username = "companion"` resolved to the literal string "companion" via
# the resolve_field fallthrough; basic_auth would have used "companion"
# as the OAuth client_id and Okta would have rejected it. Reference the
# captured client ID companion by name.
username = "companion.okta_client_id"
password = "match"

[detector.verify.success]
status = 200
