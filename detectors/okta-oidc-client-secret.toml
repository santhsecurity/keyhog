# Docs: https://developer.okta.com/docs/guides/implement-grant-type/authcode/main/
# Format: Client ID (20 alphanumeric with 00 prefix) and Client Secret (48-64 characters)
# Verify: POST /token with client_credentials grant type
# Prefix: 00 (for client ID)

[detector]
id = "okta-oidc-client-secret"
name = "Okta OIDC Client Secret"
service = "okta"
severity = "critical"
keywords = ["OKTA", "okta", "OIDC", "oidc", "client_secret"]

[[detector.patterns]]
regex = "(?:OKTA|okta)[_\\s]*CLIENT[_\\s]*SECRET[=:\\s\"'']+([a-zA-Z0-9_-]{48,64})"
description = "Okta OIDC client secret with context anchor"
group = 1

[[detector.patterns]]
regex = "(?:OKTA|okta)[_\\s]*CLIENT[_\\s]*ID[=:\\s\"'']+(00[a-zA-Z0-9_-]{18,20})"
description = "Okta OIDC client ID with context anchor"
group = 1

[[detector.patterns]]
regex = "(?:OKTA|okta)[_\\s]*(?:ISSUER|DOMAIN|ORG)[=:\\s\"'']+(https?://[^\\s\"'']+)"
description = "Okta issuer/domain with context anchor"
group = 1

[[detector.companions]]
name = "okta_client_id"
regex = "(?:OKTA|okta)[_\\s]*CLIENT[_\\s]*ID[=:\\s\"'']+00[a-zA-Z0-9_-]{18,20}"
within_lines = 5
[detector.verify]
method = "POST"
url = "{issuer}/v1/token"

[detector.verify.auth]
type = "basic"
username = "companion"
password = "match"

[detector.verify.success]
status = 200
