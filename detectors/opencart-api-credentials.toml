# Docs: https://docs.opencart.com/en-gb/system/users/api/
# Format: API key (128+ character string) with associated username
# Verify: POST to /index.php?route=api/login with api_id and key
# Prefix: none (requires context anchoring)

[detector]
id = "opencart-api-credentials"
name = "OpenCart API Credentials"
service = "opencart"
severity = "high"
keywords = ["opencart", "OPENCART", "api_key", "api_id", "opencart_api"]

[[detector.patterns]]
regex = "(?:opencart|OPENCART)[_=:\\s\"'']+(?:api[_-]?key|key)[=:\\s\"'']+([a-zA-Z0-9]{128,})"
description = "OpenCart API key with context anchor"
group = 1

[[detector.patterns]]
regex = "(?:opencart|OPENCART)[_=:\\s\"'']+(?:api[_-]?username|username)[=:\\s\"'']+([a-zA-Z0-9_-]+)"
description = "OpenCart API username with context anchor"
group = 1

[detector.verify]
method = "GET"
url = "https://api.opencart.com/v1/me"

[detector.verify.auth]
type = "header"
name = "Authorization"
template = "Bearer {{match}}"

[detector.verify.success]
status = 200
