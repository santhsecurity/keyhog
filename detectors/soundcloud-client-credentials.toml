# Docs: https://developers.soundcloud.com/docs/api/guide
# Format: OAuth 2.1 client_id and client_secret (alphanumeric strings)
# Verify: POST /oauth/token with Basic auth returns 200 if valid
# Prefix: none (requires context anchoring)

[detector]
id = "soundcloud-client-credentials"
name = "SoundCloud Client Credentials"
service = "soundcloud"
severity = "high"
keywords = ["SOUNDCLOUD_CLIENT_ID", "SOUNDCLOUD_CLIENT_SECRET", "soundcloud_client_id", "soundcloud_client_secret"]

[[detector.patterns]]
regex = "(?:SOUNDCLOUD|soundcloud)[\\\\s_-]?(?:CLIENT|client)[\\\\s_-]?(?:ID|id)[=:\\s\"'']+([a-zA-Z0-9]{20,32})"
description = "SoundCloud client ID with context anchor"
group = 1

[[detector.patterns]]
regex = "(?:SOUNDCLOUD|soundcloud)[\\\\s_-]?(?:CLIENT|client)[\\\\s_-]?(?:SECRET|secret)[=:\\s\"'']+([a-zA-Z0-9]{20,32})"
description = "SoundCloud client secret with context anchor"
group = 1

[detector.companion]
regex = "(?:SOUNDCLOUD|soundcloud)[\\\\s_-]?(?:CLIENT|client)[\\\\s_-]?(?:ID|id|SECRET|secret)[=:\\s\"'']+[a-zA-Z0-9]{20,32}"
within_lines = 5
name = "soundcloud_credential_pair"

[detector.verify]
method = "GET"
url = "https://api.soundcloud.com/v1/me"

[detector.verify.auth]
type = "header"
name = "Authorization"
template = "Bearer {{match}}"

[detector.verify.success]
status = 200
