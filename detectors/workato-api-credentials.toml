# Docs: https://docs.workato.com/workato-api.html
# Format: Bearer token for API client authentication
# Verify: GET /api/users/me with Bearer token
# Prefix: none (requires context anchoring)

[detector]
id = "workato-api-credentials"
name = "Workato API Credentials"
service = "workato"
severity = "critical"
keywords = ["WORKATO", "workato", "x-user-token", "x-user-email"]

[[detector.patterns]]
regex = "(?:WORKATO[_\\.]?API[_\\.]?TOKEN|workato[_\\.]?api[_\\.]?token)[=:\\s\"'']+([a-zA-Z0-9_-]{40,})"
description = "Workato API token with context anchor"
group = 1

[[detector.patterns]]
regex = "x-user-token[=:\\s\"'']+([a-f0-9]{32,})"
description = "Workato legacy API key header"
group = 1

[detector.verify]
method = "GET"
url = "https://www.workato.com/api/users/me"

[detector.verify.auth]
type = "bearer"
field = "match"

[detector.verify.success]
status = 200
