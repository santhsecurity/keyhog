# Docs: https://www.runatlantis.io/docs/
# Format: GitHub/GitLab/Bitbucket token + webhook secret (random string > 24 chars)
# Verify: no public verification endpoint (self-hosted Atlantis)
# Prefix: glpat- (GitLab), ghp_ (GitHub), or none

[detector]
id = "atlantis-credentials"
name = "Atlantis Webhook and VCS Credentials"
service = "atlantis"
severity = "critical"
keywords = ["ATLANTIS_GH_TOKEN", "ATLANTIS_GL_TOKEN", "ATLANTIS_WEBHOOK_SECRET", "ATLANTIS_SECRET", "atlantis"]

[[detector.patterns]]
regex = "(?:ATLANTIS_GH_TOKEN|ATLANTIS_GITHUB_TOKEN)[=:\\s\"'']+(ghp_[a-zA-Z0-9]{36,})"
description = "Atlantis GitHub Personal Access Token"
group = 1

[[detector.patterns]]
regex = "(?:ATLANTIS_GL_TOKEN|ATLANTIS_GITLAB_TOKEN)[=:\\s\"'']+(glpat-[a-zA-Z0-9\\-_]{20,})"
description = "Atlantis GitLab Personal Access Token"
group = 1

[[detector.patterns]]
regex = "(?:ATLANTIS_SECRET|ATLANTIS_WEBHOOK_SECRET)[=:\\s\"'']+([a-zA-Z0-9]{24,})"
description = "Atlantis webhook secret"
group = 1

[[detector.patterns]]
regex = "-gh-webhook-secret[=:\\s\"'']+([a-zA-Z0-9]{24,})"
description = "Atlantis GitHub webhook secret in CLI"
group = 1

[[detector.patterns]]
regex = "-gitlab-webhook-secret[=:\\s\"'']+([a-zA-Z0-9]{24,})"
description = "Atlantis GitLab webhook secret in CLI"
group = 1

[detector.verify]
method = "GET"
url = "https://api.runatlantis.io/v1/me"

[detector.verify.auth]
type = "header"
name = "Authorization"
template = "Bearer {{match}}"

[detector.verify.success]
status = 200
