# Docs: https://developers.google.com/blogger/docs/3.0/using
# Format: Google API Key - typically starts with AIza and is 39 characters total
# Verify: GET to blogger.googleapis.com with key query parameter
# Prefix: AIza

[detector]
id = "blogger-api-key"
name = "Blogger (Google) API Key"
service = "blogger"
severity = "medium"
keywords = ["AIza", "blogger", "BLOGGER", "google_api_key"]

[[detector.patterns]]
regex = 'AIza[0-9A-Za-z_-]{35}'
description = "Google/Blogger API key (AIza prefix)"

[detector.verify]
method = "GET"
url = "https://blogger.googleapis.com/v3/users/self/blogs?key={{match}}"

[detector.verify.auth]
type = "none"

[detector.verify.success]
status = 200
