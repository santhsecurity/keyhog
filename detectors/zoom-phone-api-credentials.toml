# Docs: https://developers.zoom.us/docs/api/rest/authentication/
# Format: Zoom Server-to-Server OAuth uses Client ID and Client Secret
# Verify: POST /oauth/token with account_credentials grant
# Prefix: none (requires context anchoring)

[detector]
id = "zoom-phone-api-credentials"
name = "Zoom Phone API Credentials"
service = "zoom"
severity = "critical"
keywords = ["zoom", "ZOOM", "zoom_phone", "ZOOM_PHONE", "zoomPhone"]

[[detector.patterns]]
regex = "(?i)(?:zoom)[_\\-\\s]?(?:phone)?[_\\-\\s]?(?:client[_\\-\\s]?id|clientid|account[_\\-\\s]?id)[=:\\s\"'']+([a-zA-Z0-9_-]{20,40})"
description = "Zoom Phone/Account Client ID with context anchor"
group = 1

[[detector.patterns]]
regex = "(?i)(?:zoom)[_\\-\\s]?(?:phone)?[_\\-\\s]?(?:client[_\\-\\s]?secret|clientsecret)[=:\\s\"'']+([a-zA-Z0-9_-]{20,50})"
description = "Zoom Phone/Account Client Secret with context anchor"
group = 1

[[detector.companions]]
name = "zoom_client_pair"
regex = "(?i)(?:zoom)[_\\-\\s]?(?:phone)?[_\\-\\s]?(?:client[_\\-\\s]?(?:id|secret)|account[_\\-\\s]?id)[=:\\s\"'']+[a-zA-Z0-9_-]{20,50}"
within_lines = 5
