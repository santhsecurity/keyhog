# Docs: https://apis.support.brightcove.com/getting-started/authentication-brightcove-apis.html
# Format: Client ID is 40 hex characters; Client Secret is 40+ hex characters
# Verify: POST to OAuth endpoint to get access token
# Prefix: none (requires context anchoring)

[detector]
id = "brightcove-api-credentials"
name = "Brightcove API Credentials"
service = "brightcove"
severity = "critical"
keywords = ["brightcove", "BRIGHTCOVE", "BC_CLIENT_ID", "BC_CLIENT_SECRET", "brightcove.com"]

[[detector.patterns]]
regex = "(?:brightcove|BRIGHTCOVE)[_\\s]?(?:client_id|CLIENT_ID)[=:\\s\"'']+([a-f0-9]{40})"
description = "Brightcove OAuth Client ID with context anchor"
group = 1

[[detector.patterns]]
regex = "(?:brightcove|BRIGHTCOVE)[_\\s]?(?:client_secret|CLIENT_SECRET)[=:\\s\"'']+([a-f0-9]{40,64})"
description = "Brightcove OAuth Client Secret with context anchor"
group = 1

[[detector.patterns]]
regex = "BC_CLIENT_ID[=:\\s\"'']+([a-f0-9]{40})"
description = "Brightcove Client ID from environment variable"
group = 1

[[detector.patterns]]
regex = "BC_CLIENT_SECRET[=:\\s\"'']+([a-f0-9]{40,64})"
description = "Brightcove Client Secret from environment variable"
group = 1

[detector.verify]
method = "GET"
url = "https://apis.support.brightcove.com/v1/me"

[detector.verify.auth]
type = "header"
name = "Authorization"
template = "Bearer {{match}}"

[detector.verify.success]
status = 200
