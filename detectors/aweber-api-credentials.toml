# Docs: https://api.aweber.com/
# Format: OAuth 2.0 client ID and client secret for app authentication
# Verify: POST https://auth.aweber.com/oauth2/token with client credentials
# Prefix: none (requires context anchoring)

[detector]
id = "aweber-api-credentials"
name = "AWeber API Credentials"
service = "aweber"
severity = "critical"
keywords = ["aweber", "AWEBER", "client_id", "client_secret", "access_token"]

[[detector.patterns]]
regex = '(?:AWEBER|aweber)[_]*(?:CLIENT|client)?[_]*(?:ID|id)[=: ]+([a-zA-Z0-9_-]{20,})'
description = "AWeber OAuth Client ID"
group = 1

[[detector.patterns]]
regex = '(?:AWEBER|aweber)[_]*(?:CLIENT|client)?[_]*(?:SECRET|secret)[=: ]+([a-zA-Z0-9_-]{20,})'
description = "AWeber OAuth Client Secret"
group = 1

[[detector.patterns]]
regex = '(?:AWEBER|aweber)[_]*(?:ACCESS|access)?[_]*(?:TOKEN|token)[=: ]+([a-zA-Z0-9_-]{20,})'
description = "AWeber Access Token"
group = 1

[[detector.patterns]]
regex = '(?:AWEBER|aweber)[_]*(?:CONSUMER|consumer)?[_]*(?:KEY|key)[=: ]+([a-zA-Z0-9]{20,})'
description = "AWeber Legacy Consumer Key"
group = 1

[detector.verify]
method = "GET"
url = "https://api.aweber.com/v1/me"

[detector.verify.auth]
type = "header"
name = "Authorization"
template = "Bearer {{match}}"

[detector.verify.success]
status = 200
