# Docs: https://docs.ntfy.sh/publish/#access-tokens
# Format: tk_ prefix followed by alphanumeric characters (self-hosted may vary)
# Verify: GET with Authorization header returns 200 if valid
# Prefix: tk_

[detector]
id = "ntfy-credentials"
name = "Ntfy Credentials"
service = "ntfy"
severity = "medium"
keywords = ["tk_", "ntfy", "NTFY"]

[[detector.patterns]]
regex = 'tk_[a-zA-Z0-9]{20,}'
description = "Ntfy access token (tk_ prefix)"
