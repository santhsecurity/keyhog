# Docs: https://api.slack.com/authentication/oauth-v2
# Format: OAuth client secret - 32-64 alphanumeric characters (no unique prefix)
# Verify: POST to slack.com/api/oauth.v2.access with client_id and client_secret
# Prefix: none (requires context anchoring)

[detector]
id = "slack-oauth-secret"
name = "Slack OAuth Client Secret"
service = "slack"
severity = "high"
keywords = ["SLACK_CLIENT_SECRET", "slack_client_secret", "SLACK_OAUTH"]

[[detector.patterns]]
regex = "(?:SLACK|slack)[_.]?(?:CLIENT|client|OAUTH|oauth)[_.]?(?:SECRET|secret)[=:\\s\"'']+([a-f0-9]{32,64})"
description = "Slack OAuth client secret with context anchor"
group = 1

[detector.companion]
regex = "(?:SLACK|slack)[_.]?(?:CLIENT|client)[_.]?(?:ID|id)[=:\\s\"'']+([0-9]{5,}\\.[0-9]{5,})"
within_lines = 5
name = "client_id"
