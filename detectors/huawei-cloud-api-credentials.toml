# Docs: https://support.huaweicloud.com/intl/en-us/devg-apisign/api-sign-provide-aksk.html
# Format: AK (Access Key ID) and SK (Secret Key) - 32 character hex-like strings
# Verify: No public verification endpoint
# Prefix: none (requires context anchoring)

[detector]
id = "huawei-cloud-api-credentials"
name = "Huawei Cloud API Credentials"
service = "huawei-cloud"
severity = "critical"
keywords = ["HUAWEI_CLOUD", "HUAWEICLOUD", "HW_ACCESS_KEY", "HW_SECRET_KEY"]

[[detector.patterns]]
regex = "(?:HUAWEI[_-]?CLOUD|HUAWEICLOUD|HW)[_\\s]*(?:ACCESS[_-]?KEY|AK)[=:\\s\"'']+([A-Z0-9]{20,30})"
description = "Huawei Cloud Access Key (AK) with context anchor"
group = 1

[[detector.patterns]]
regex = "(?:HUAWEI[_-]?CLOUD|HUAWEICLOUD|HW)[_\\s]*(?:SECRET[_-]?KEY|SK)[=:\\s\"'']+([a-zA-Z0-9]{30,50})"
description = "Huawei Cloud Secret Key (SK) with context anchor"
group = 1

[[detector.patterns]]
regex = "(?:HUAWEI[_-]?CLOUD|HUAWEICLOUD|HW)[_\\s]*(?:PROJECT[_-]?ID)[=:\\s\"'']+([a-f0-9]{32})"
description = "Huawei Cloud Project ID"
group = 1

[detector.companion]
regex = "[a-zA-Z0-9]{30,50}"
within_lines = 3
name = "secret_key"

[detector.verify]
method = "GET"
url = "https://support.huaweicloud.com/v1/me"

[detector.verify.auth]
type = "header"
name = "Authorization"
template = "Bearer {{match}}"

[detector.verify.success]
status = 200
