# Docs: https://developer.avalara.com/avatax/authentication-in-rest/
# Format: Account ID (numeric) + License Key (alphanumeric). No unique prefix for license key.
# Verify: Basic auth to AvaTax API with account_id:license_key
# Prefix: none (requires context anchoring)

[detector]
id = "avalara-api-credentials"
name = "Avalara API Credentials"
service = "avalara"
severity = "critical"
keywords = ["AVALARA", "avatax", "license_key", "account_id"]


[[detector.companions]]
name = "account_id"
regex = "(?:AVALARA|AVATAX|avalara)[._]?(?:ACCOUNT|account)[._]?(?:ID|id)[=:\\s\"'']+(\\d{6,})"
within_lines = 5
required = true

[[detector.patterns]]
regex = "(?:AVALARA|AVATAX|avalara)[._]?(?:LICENSE|license)[._]?KEY[=:\\s\"'']+([a-zA-Z0-9]{16,})"
description = "Avalara license key with context anchor"
group = 1

[[detector.patterns]]
regex = "(?:AVALARA|AVATAX|avalara)[._]?(?:ACCOUNT|account)[._]?(?:ID|id)[=:\\s\"'']+(\\d{6,})"
description = "Avalara account ID with context anchor"
group = 1

[detector.verify]
method = "GET"
url = "https://rest.avatax.com/api/v2/utilities/ping"
[detector.verify.success]
status = 200

[detector.verify.auth]
type = "basic"
username = "companion.account_id"
password = "match"
