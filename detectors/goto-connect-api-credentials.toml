# Docs: https://developer.goto.com/guides/Get%20Started/02_HOW_createClient/
# Format: OAuth2 Client ID and Client Secret for GoTo Connect
# Verify: POST /oauth/v2/token with client credentials
# Prefix: none (requires context anchoring)

[detector]
id = "goto-connect-api-credentials"
name = "GoTo Connect API Credentials"
service = "goto-connect"
severity = "critical"
keywords = ["goto", "GOTO", "goto_connect", "GOTO_CONNECT", "GoToConnect", "logmein"]

[[detector.patterns]]
regex = "(?i)(?:goto[_\\-\\s]?connect|gotoconnect)[_\\-\\s]?(?:client[_\\-\\s]?id|clientid)[=:\\s\"'']+([a-zA-Z0-9_-]{20,50})"
description = "GoTo Connect Client ID with context anchor"
group = 1

[[detector.patterns]]
regex = "(?i)(?:goto[_\\-\\s]?connect|gotoconnect)[_\\-\\s]?(?:client[_\\-\\s]?secret|clientsecret)[=:\\s\"'']+([a-zA-Z0-9_-]{20,60})"
description = "GoTo Connect Client Secret with context anchor"
group = 1

[[detector.patterns]]
regex = "(?i)(?:goto[_\\-\\s]?connect|gotoconnect)[_\\-\\s]?(?:account[_\\-\\s]?key|accountkey)[=:\\s\"'']+([a-zA-Z0-9_-]{10,40})"
description = "GoTo Connect Account Key"
group = 1

[detector.companion]
regex = "(?i)(?:goto[_\\-\\s]?connect|gotoconnect)[_\\-\\s]?(?:client[_\\-\\s]?(?:id|secret)|account[_\\-\\s]?key)[=:\\s\"'']+[a-zA-Z0-9_-]{10,60}"
within_lines = 5
name = "goto_connect_pair"

[detector.verify]
method = "GET"
url = "https://developer.goto.com/v1/me"

[detector.verify.auth]
type = "header"
name = "Authorization"
template = "Bearer {{match}}"

[detector.verify.success]
status = 200
