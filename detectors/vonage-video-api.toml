# Docs: https://api.support.vonage.com/hc/en-us/articles/10670829386396-How-to-find-my-Video-API-Authentication-Credentials
# Format: API Key is an 8-character alphanumeric string, API Secret is a 16-character alphanumeric string
# Verify: https://api.support.vonage.com/hc/en-us/articles/10670829386396
# Prefix: none (requires context anchoring)

[detector]
id = "vonage-video-api"
name = "Vonage Video API Key"
service = "vonage"
severity = "critical"
keywords = ["VONAGE_API_KEY", "VONAGE_API_SECRET", "vonage", "api_key", "api_secret", "video"]

[[detector.patterns]]
regex = "(?:VONAGE_API_KEY|vonage_api_key|api_key)[\"\\'\\s]*[=:]\\s*[\"\\']?([a-f0-9]{8})[\"\\']?"
description = "Vonage Video API Key (8 hex characters) with context anchor"
group = 1

[[detector.patterns]]
regex = "(?:VONAGE_API_SECRET|vonage_api_secret|api_secret)[\"\\'\\s]*[=:]\\s*[\"\\']?([a-f0-9]{16})[\"\\']?"
description = "Vonage Video API Secret (16 hex characters) with context anchor"
group = 1

[detector.companion]
regex = "[a-f0-9]{16}"
within_lines = 5
name = "vonage_api_secret"

[detector.verify]
method = "GET"
url = "https://api.opentok.com/v2/project/{match}/archive"

[detector.verify.auth]
type = "basic"
username = "match"
password = "companion.vonage_api_secret"

[detector.verify.success]
status = 200
