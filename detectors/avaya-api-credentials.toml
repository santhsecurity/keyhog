# Docs: https://developers.avayacloud.com/documentation
# Format: Avaya Experience Platform uses OAuth2 client credentials
# Verify: no public verification endpoint
# Prefix: none (requires context anchoring)

[detector]
id = "avaya-api-credentials"
name = "Avaya API Credentials"
service = "avaya"
severity = "critical"
keywords = ["avaya", "AVAYA", "Avaya", "avaya_cloud", "avayacloud"]

[[detector.patterns]]
regex = "(?i)(?:avaya|AVAYA)[_\\-\\s]?(?:cloud)?[_\\-\\s]?(?:client[_\\-\\s]?id|clientid)[=:\\s\"'']+([a-zA-Z0-9_-]{20,50})"
description = "Avaya Client ID with context anchor"
group = 1

[[detector.patterns]]
regex = "(?i)(?:avaya|AVAYA)[_\\-\\s]?(?:cloud)?[_\\-\\s]?(?:client[_\\-\\s]?secret|clientsecret)[=:\\s\"'']+([a-zA-Z0-9_-]{20,60})"
description = "Avaya Client Secret with context anchor"
group = 1

[[detector.patterns]]
regex = "(?i)(?:avaya|AVAYA)[_\\-\\s]?(?:api[_\\-\\s]?key|apikey)[=:\\s\"'']+([a-zA-Z0-9_-]{20,60})"
description = "Avaya API Key with context anchor"
group = 1

[detector.companion]
regex = "(?i)(?:avaya|AVAYA)[_\\-\\s]?(?:client[_\\-\\s]?(?:id|secret)|api[_\\-\\s]?key)[=:\\s\"'']+[a-zA-Z0-9_-]{20,60}"
within_lines = 5
name = "avaya_credential_pair"

[detector.verify]
method = "GET"
url = "https://api.avayacloud.com/v1/me"

[detector.verify.auth]
type = "header"
name = "X-Api-Key"
template = "{{match}}"

[detector.verify.success]
status = 200
