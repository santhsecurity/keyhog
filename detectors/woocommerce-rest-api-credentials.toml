# Docs: https://woocommerce.github.io/woocommerce-rest-api-docs/#authentication
# Format: Consumer Key (ck_ + 40 hex chars) and Consumer Secret (cs_ + 40 hex chars)
# Verify: none (requires store URL for verification)
# Prefix: ck_

[detector]
id = "woocommerce-rest-api-credentials"
name = "WooCommerce REST API Credentials"
service = "woocommerce"
severity = "high"
keywords = ["ck_", "cs_", "woocommerce", "consumer_key", "consumer_secret"]

[[detector.patterns]]
regex = 'ck_[a-f0-9]{40}'
description = "WooCommerce REST API consumer key (ck_ prefix)"

[[detector.patterns]]
regex = 'cs_[a-f0-9]{40}'
description = "WooCommerce REST API consumer secret (cs_ prefix)"

[detector.companion]
regex = 'cs_[a-f0-9]{40}'
within_lines = 10
name = "woocommerce_consumer_secret"

[detector.verify]
method = "GET"
url = "https://woocommerce.github.io/v1/me"

[detector.verify.auth]
type = "header"
name = "Authorization"
template = "Bearer {{match}}"

[detector.verify.success]
status = 200
