# Docs: https://docs.sendgrid.com/for-developers/tracking-events/getting-started-event-webhook-security-features
# Format: 32-48 character hexadecimal string used for HMAC-SHA256 signature verification
# Verify: no public verification endpoint (local signature verification only)
# Prefix: none (requires context anchoring)

[detector]
id = "sendgrid-webhook-signing-secret"
name = "SendGrid Webhook Signing Secret"
service = "sendgrid"
severity = "high"
keywords = ["SENDGRID_WEBHOOK_SECRET", "sendgrid_webhook_secret", "webhook_secret", "X-Twilio-Email-Event-Webhook-Signature"]

[[detector.patterns]]
regex = "(?:SENDGRID|sendgrid)[._-]?(?:WEBHOOK|webhook)[._-]?(?:SECRET|secret|SIGNING|signing)[=:\\s\"'']+([a-f0-9]{32,48})"
description = "SendGrid webhook signing secret with context anchor"
group = 1

[[detector.patterns]]
regex = "(?:SENDGRID|sendgrid)[._-]?(?:PUBLIC|public)[._-]?(?:KEY|key)[=:\\s\"'']+([a-f0-9]{32,48})"
description = "SendGrid webhook public key for signature verification"
group = 1
