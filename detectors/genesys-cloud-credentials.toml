# Docs: https://developer.genesys.cloud/authorization/platform-api/creating-oauth-client
# Format: Client ID and Client Secret pair (UUID format)
# Verify: POST /oauth/token with client credentials
# Prefix: none (requires context anchoring)

[detector]
id = "genesys-cloud-credentials"
name = "Genesys Cloud Client Credentials"
service = "genesys"
severity = "critical"
keywords = ["GENESYS", "genesys_cloud", "genesyscloud", "purecloud"]

[[detector.patterns]]
regex = "(?i)(?:GENESYS|GENESYS_CLOUD|PURECLOUD|genesys|purecloud)[_\\s]?(?:CLIENT[_\\s]?ID|CLIENT[_\\s]?KEY)[=:\\s\"'']+([a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12})"
description = "Genesys Cloud Client ID with context anchor"
group = 1

[[detector.patterns]]
regex = "(?i)(?:GENESYS|GENESYS_CLOUD|PURECLOUD|genesys|purecloud)[_\\s]?(?:CLIENT[_\\s]?SECRET|CLIENT[_\\s]?KEY)[=:\\s\"'']+([a-f0-9]{32,})"
description = "Genesys Cloud Client Secret with context anchor"
group = 1

[[detector.companions]]
name = "genesys_client_pair"
regex = "(?i)(?:GENESYS|GENESYS_CLOUD|PURECLOUD|genesys|purecloud)[_\\s]?(?:CLIENT[_\\s]?(?:ID|SECRET)|client[_\\s]?(?:id|secret))[=:\\s\"'']+[a-f0-9-]{32,}"
within_lines = 5
