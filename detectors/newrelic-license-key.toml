# Docs: https://docs.newrelic.com/docs/apis/intro-apis/new-relic-api-keys/
# Format: 40 hex characters for license key, 64 for user key
# Verify: none (license keys are for ingestion, not API access)
# Prefix: none (40/64 hex, requires keyword context)

[detector]
id = "newrelic-license-key"
name = "New Relic License Key"
service = "newrelic"
severity = "critical"
keywords = ["NEW_RELIC_LICENSE_KEY", "license_key", "NEWRELIC_LICENSE", "NR_LICENSE"]

[[detector.patterns]]
regex = "(?:NEW_RELIC|new_relic|NEWRELIC|newrelic|NR|nr|license)[_\\s]*(?:LICENSE|license)?[_\\s]*(?:KEY|key)?[=:\\s\"']+([a-f0-9]{40})"
description = "New Relic license key (40 hex) with context anchor"
group = 1

[[detector.patterns]]
regex = "(?:NEW_RELIC|new_relic|NEWRELIC|newrelic)[_\\s]*(?:USER|user)?[_\\s]*(?:KEY|key|API|api)?[=:\\s\"']+([a-f0-9]{64})"
description = "New Relic user API key (64 hex) with context anchor"
group = 1

[detector.verify]
method = "POST"
url = "https://log-api.newrelic.com/log/v1"
body = "[{\"message\":\"keyhog verification\"}]"

[detector.verify.auth]
type = "header"
name = "X-License-Key"
template = "{{match}}"

[[detector.verify.headers]]
name = "Content-Type"
value = "application/json"

[detector.verify.success]
status = 202
