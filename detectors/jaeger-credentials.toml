# Docs: https://www.jaegertracing.io/docs/1.50/client-libraries/#configuring-the-client
# Format: username and password pair for collector authentication
# Verify: no public verification endpoint
# Prefix: none (requires context anchoring)

[detector]
id = "jaeger-credentials"
name = "Jaeger Credentials"
service = "jaeger"
severity = "medium"
keywords = ["jaeger", "JAEGER", "collectorEndpoint"]

[[detector.patterns]]
regex = "(?:jaeger[._-]?username|JAEGER_USERNAME)[=:\\s\"'']+([^\\s\"'']+)"
description = "Jaeger username for collector authentication"
group = 1

[detector.companion]
regex = "(?:jaeger[._-]?password|JAEGER_PASSWORD)[=:\\s\"'']+([^\\s\"'']+)"
within_lines = 5
name = "jaeger_password"

[detector.verify]
method = "GET"
url = "https://api.jaegertracing.io/v1/me"

[detector.verify.auth]
type = "header"
name = "Authorization"
template = "Bearer {{match}}"

[detector.verify.success]
status = 200
