# Docs: https://libcloud.readthedocs.io/en/stable/compute/drivers/kamatera.html
# Format: Client ID and Secret are alphanumeric strings (no fixed format)
# Verify: API requires Client ID + Secret combination - no simple verification
# Prefix: none (requires context anchoring)

[detector]
id = "kamatera-api-credentials"
name = "Kamatera API Credentials"
service = "kamatera"
severity = "critical"
keywords = ["KAMATERA_API_CLIENT_ID", "KAMATERA_API_SECRET", "kamatera"]

[[detector.patterns]]
regex = "(?:KAMATERA_API_CLIENT_ID|kamatera_api_client_id)[=:\\s\"'']+([a-zA-Z0-9_-]{8,64})"
description = "Kamatera API client ID with context anchor"
group = 1

[[detector.patterns]]
regex = "(?:KAMATERA_API_SECRET|kamatera_api_secret)[=:\\s\"'']+([a-zA-Z0-9_-]{16,128})"
description = "Kamatera API secret with context anchor"
group = 1

[detector.verify]
method = "GET"
url = "https://libcloud.readtheapi.io/v1/me"

[detector.verify.auth]
type = "header"
name = "Authorization"
template = "Bearer {{match}}"

[detector.verify.success]
status = 200
