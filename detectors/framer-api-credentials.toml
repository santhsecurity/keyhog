# Docs: https://www.framer.com/developers/server-api-quick-start
# Format: API key bound to a specific project, found in Site Settings
# Verify: no public verification endpoint
# Prefix: none (requires context anchoring)

[detector]
id = "framer-api-credentials"
name = "Framer API Credentials"
service = "framer"
severity = "high"
keywords = ["FRAMER", "framer", "FRAMER_API_KEY"]

[[detector.patterns]]
regex = "(?:FRAMER|framer)[_=:\\s\"'']+(?:api[_-]?)?(?:key|token)[=:\\s\"'']+([a-zA-Z0-9_-]{20,60})"
description = "Framer Server API key with context anchor"
group = 1

[[detector.patterns]]
regex = "framer[_-]?api[_-]?key[=:\\s\"'']+([a-zA-Z0-9_-]{20,60})"
description = "Framer API key in environment variable format"
group = 1

[detector.verify]
method = "GET"
url = "https://api.framer.com/v1/me"

[detector.verify.auth]
type = "header"
name = "Authorization"
template = "Bearer {{match}}"

[detector.verify.success]
status = 200
