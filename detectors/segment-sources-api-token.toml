# Docs: https://docs.segmentapis.com/tag/Authentication/
# Format: API token for Segment Public API, alphanumeric string with no unique prefix
# Verify: GET /v1/workspaces with Bearer token returns 200 if valid
# Prefix: none (requires context anchoring)

[detector]
id = "segment-sources-api-token"
name = "Segment Sources API Token"
service = "segment"
severity = "high"
keywords = ["SEGMENT_API_TOKEN", "segment_api_token", "segment_token", "segment-api-token"]

[[detector.patterns]]
regex = "(?:SEGMENT)[_.]?(?:API[._-]?)?TOKEN[=:\\s\"'']+([a-zA-Z0-9]{32,})"
description = "Segment API token with context anchor"
group = 1

[[detector.patterns]]
regex = "(?:segment)[_.]?(?:api[._-]?)?token[=:\\s\"'']+([a-zA-Z0-9]{32,})"
description = "Segment API token lowercase context anchor"
group = 1

[detector.verify]
method = "GET"
url = "https://api.segmentapis.com/v1/workspaces"

[detector.verify.auth]
type = "bearer"
field = "match"

[detector.verify.success]
status = 200
