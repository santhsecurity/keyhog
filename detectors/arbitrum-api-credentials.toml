# Docs: https://docs.arbitrum.io/
# Format: Arbitrum RPC endpoints use API keys in URL path or Authorization header
# Verify: no public verification endpoint
# Prefix: none (requires context anchoring)

[detector]
id = "arbitrum-api-credentials"
name = "Arbitrum API Credentials"
service = "arbitrum"
severity = "high"
keywords = ["arbitrum", "ARBITRUM", "arb", "ARB", "arbiscan", "arbitrum.io"]

[[detector.patterns]]
regex = '(?:arbitrum|ARBITRUM|arb|ARB)[._-]?(?:rpc|RPC)[._-]?(?:url|URL|endpoint)[=:"	\s]+(https?://[a-zA-Z0-9._-]+\.g\.alchemy\.com/v2/[a-zA-Z0-9_-]+)'
description = "Arbitrum RPC URL with Alchemy API key"
group = 1

[[detector.patterns]]
regex = '(?:arbitrum|ARBITRUM|arb|ARB)[._-]?(?:rpc|RPC)[._-]?(?:url|URL|endpoint)[=:"	\s]+(https?://[a-zA-Z0-9._-]+/arbitrum/[a-zA-Z0-9_-]+)'
description = "Arbitrum RPC URL with embedded access token"
group = 1

[[detector.patterns]]
regex = '(?:arbitrum|ARBITRUM|arb|ARB)[._-]?(?:rpc|RPC)[._-]?(?:url|URL|endpoint)[=:"	\s]+(https?://[a-zA-Z0-9._-]+/v2/[a-zA-Z0-9_-]+)'
description = "Arbitrum RPC URL with API version and key"
group = 1

[[detector.patterns]]
regex = '(?:arbitrum|ARBITRUM|arb|ARB)[._-]?(?:api|API)[._-]?key[=:"	\s]+([a-f0-9]{32})'
description = "Arbitrum API key (32 hex characters)"
group = 1
