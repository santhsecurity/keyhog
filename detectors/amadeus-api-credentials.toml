# Docs: https://developers.amadeus.com/self-service/apis-docs/guides/developer-guides/API-Keys/authorization
# Format: API Key (client_id) and API Secret (client_secret) for OAuth2
# Verify: POST to /v1/security/oauth2/token returns access token
# Prefix: none (requires context anchoring)

[detector]
id = "amadeus-api-credentials"
name = "Amadeus API Credentials"
service = "amadeus"
severity = "high"
keywords = ["AMADEUS", "amadeus", "AMADEUS_API_KEY", "AMADEUS_CLIENT_ID", "client_id", "client_secret"]

[[detector.patterns]]
regex = "(?:AMADEUS|amadeus)[_\\s]?(?:CLIENT_ID|client_id|API_KEY|api_key)[=:\\s\"'']+([A-Za-z0-9]{32})"
description = "Amadeus API Key/Client ID"
group = 1

[[detector.patterns]]
regex = "(?:AMADEUS|amadeus)[_\\s]?(?:CLIENT_SECRET|client_secret|API_SECRET|api_secret)[=:\\s\"'']+([A-Za-z0-9]{32})"
description = "Amadeus API Secret/Client Secret"
group = 1

[detector.verify]
method = "POST"
url = "https://test.api.amadeus.com/v1/security/oauth2/token"

[detector.verify.auth]
type = "basic"
username = "match"
password = ""

[detector.verify.success]
status = 200
