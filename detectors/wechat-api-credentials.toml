# Docs: https://developers.weixin.qq.com/miniprogram/dev/OpenApiDoc/
# Format: AppID starts with 'wx' followed by 16 alphanumeric; AppSecret is 32-char hex
# Verify: https://developers.weixin.qq.com/miniprogram/dev/OpenApiDoc/getAccessToken/
# Prefix: wx (for AppID only)

[detector]
id = "wechat-api-credentials"
name = "WeChat API Credentials"
service = "wechat"
severity = "critical"
keywords = ["wechat", "WECHAT", "we_chat", "wx", "appid", "appsecret"]

[[detector.patterns]]
regex = "wx[a-f0-9]{16}"
description = "WeChat AppID (starts with wx)"

[[detector.patterns]]
regex = "(?:wechat|WECHAT|we_chat)[_\\-\\s]*(?:app[_\\-\\s]*secret|APP[_\\-\\s]*SECRET)[=: \\s\"'']+([a-f0-9]{32})"
description = "WeChat AppSecret with context anchor"
group = 1

[[detector.companions]]
name = "appid"
# Anchored to a `WECHAT_APPID=` / `appid:` declaration so a stray `wx`-
# prefixed 16-hex string in unrelated code doesn't qualify (the 2-char
# literal prefix isn't strong enough on its own; validator flagged it).
# Auto-detected capture group resolves `{{companion.appid}}` to just the
# `wx...` value embedded into the verify URL query string.
regex = "(?:wechat|WECHAT|we_chat|app[_-]?id|APP[_-]?ID|appid|appId)[\\s\"'_=:-]+(wx[a-f0-9]{16})"
within_lines = 5
[detector.verify]
method = "GET"
# Earlier template used single-brace `{companion.appid}` and `{match}` —
# interpolate.rs only honors `{{...}}` so the URL went out with the
# literal placeholder text. The host is fixed (api.weixin.qq.com), so the
# `wechat` builtin allowlist suffices.
url = "https://api.weixin.qq.com/cgi-bin/token?grant_type=client_credential&appid={{companion.appid}}&secret={{match}}"

[detector.verify.auth]
type = "none"

[detector.verify.success]
status = 200
json_path = "access_token"
