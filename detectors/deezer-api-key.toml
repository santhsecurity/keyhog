# Docs: https://developers.deezer.com/api
# Format: Alphanumeric API key for Deezer API access
# Verify: no public verification endpoint
# Prefix: none (requires context anchoring)

[detector]
id = "deezer-api-key"
name = "Deezer API Key"
service = "deezer"
severity = "medium"
keywords = ["DEEZER", "deezer", "DEEZER_API_KEY", "deezer_api_key"]

[[detector.patterns]]
regex = "(?:DEEZER|deezer)[\\\\s_-]?(?:API|api)?[\\\\s_-]?(?:KEY|key)?[=:\\s\"'']+([a-f0-9]{32})"
description = "Deezer API key with context anchor"
group = 1

[detector.verify]
method = "GET"
url = "https://api.deezer.com/v1/me"

[detector.verify.auth]
type = "header"
name = "Authorization"
template = "Bearer {{match}}"

[detector.verify.success]
status = 200
