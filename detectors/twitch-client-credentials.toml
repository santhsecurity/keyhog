# Docs: https://dev.twitch.tv/docs/authentication/register-app
# Format: Client ID is 30 lowercase alphanumeric characters (no unique prefix)
# Verify: POST /oauth2/token with client credentials returns 200 if valid
# Prefix: none (30 char lowercase alphanumeric, requires keyword context)

[detector]
id = "twitch-client-id"
name = "Twitch Client ID"
service = "twitch"
severity = "high"
keywords = ["twitch", "TWITCH", "client_id", "CLIENT_ID"]

[[detector.patterns]]
regex = "(?:twitch|TWITCH)[_\\-\\s]*(?:client[_\\-\\s]*id|CLIENT[_\\-\\s]*ID)[=:\\s\\\"']+([a-z0-9]{30})"
description = "Twitch Client ID with context anchor"
group = 1

[[detector.companions]]
name = "twitch_client_secret"
regex = "[a-z0-9]{30}"
within_lines = 5
