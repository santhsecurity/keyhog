# Docs: https://www.ibm.com/cloud/financial-services
# Format: IBM Cloud Government uses same API key format as commercial
# Verify: GET /v1/identity/token with API key returns token if valid
# Prefix: none (requires context anchoring)

[detector]
id = "ibm-cloud-government-credentials"
name = "IBM Cloud Government Credentials"
service = "ibm-cloud-government"
severity = "critical"
keywords = ["IBM_CLOUD_GOV", "IBMCLOUD_GOV", "financial-services", "gov.ibm"]

[[detector.patterns]]
regex = "(?:IBM[_-]?CLOUD[_-]?GOV|IBMCLOUD[_-]?GOV)[_\\s]*(?:API[_-]?KEY)[=:\\s\"'']+([a-zA-Z0-9_-]{44})"
description = "IBM Cloud Government API key with context anchor"
group = 1

[[detector.patterns]]
regex = "(?:IBM[_-]?CLOUD[_-]?GOV|IBMCLOUD[_-]?GOV)[_\\s]*(?:REGION)[=:\\s\"'']+(us-south|us-east|eu-gb|eu-de|jp-tok|au-syd)"
description = "IBM Cloud Government region"
group = 1
