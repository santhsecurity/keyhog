# Docs: https://clickhouse.com/docs/en/interfaces/http
# Format: Native protocol or HTTP interface with username/password
# Verify: no public verification endpoint
# Prefix: none (requires context anchoring)

[detector]
id = "clickhouse-credentials"
name = "ClickHouse Credentials"
service = "clickhouse"
severity = "critical"
keywords = ["CLICKHOUSE", "clickhouse", "CLICKHOUSE_DB"]

[[detector.patterns]]
regex = "(?:CLICKHOUSE)[_\\s]*(?:URL|HOST)[=:\\s\"'']+(?:https?://|clickhouse://)?(?:[^:@]+):([^@]+)@"
description = "ClickHouse connection string with password"
group = 1

[detector.companion]
regex = "(?:CLICKHOUSE)[_\\s]*(?:USER|USERNAME)[=:\\s\"'']+([^\"'']+)"
within_lines = 5
name = "clickhouse_username"

[[detector.patterns]]
regex = "(?:CLICKHOUSE)[_\\s]*(?:PASSWORD|PASS)[=:\\s\"'']+([a-zA-Z0-9_!@#$%^&*+=-]{16,})"
description = "ClickHouse password with context anchor"
group = 1

[detector.verify]
method = "GET"
url = "https://clickhouse.com/v1/me"

[detector.verify.auth]
type = "header"
name = "Authorization"
template = "Bearer {{match}}"

[detector.verify.success]
status = 200
