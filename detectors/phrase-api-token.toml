# Docs: https://developers.phrase.com/en/api/strings/authentication
# Format: Access token (40 hex characters) or JWT token
# Verify: GET /v2/projects with Authorization header
# Prefix: none (requires context anchoring)

[detector]
id = "phrase-api-token"
name = "Phrase API Token"
service = "phrase"
severity = "high"
keywords = ["PHRASE", "PHRASE_API_KEY", "PHRASE_ACCESS_TOKEN", "PHRASE_TOKEN", "phrase.com", "phraseapp"]

[[detector.patterns]]
regex = "(?:PHRASE|PHRASE_API|PHRASEAPP|PHRASE_ACCESS)[_\\s]?(?:API[_\\s]?(?:KEY|TOKEN)|ACCESS[_\\s]?TOKEN|TOKEN)?[=:\\s\"'']+([a-f0-9]{40,64})"
description = "Phrase API token with context anchor"
group = 1

[[detector.patterns]]
regex = "phrase\\.com.*[=:\\s\"'']+([a-f0-9]{40,64})"
description = "Phrase API token with domain context"
group = 1

[[detector.patterns]]
regex = "PHRASE_ACCESS_TOKEN[=:\\s\"'']+([a-f0-9]{40,64})"
description = "Phrase access token (environment variable format)"
group = 1

[detector.verify]
method = "GET"
url = "https://api.phrase.com/v2/projects"

[detector.verify.auth]
type = "header"
name = "Authorization"
template = "token {{match}}"

[detector.verify.success]
status = 200
