# Docs: https://firebase.google.com/docs/storage/web/start
# Format: Bucket name with gs:// prefix or Firebase config with storageBucket field
# Verify: no public verification endpoint
# Prefix: gs:// (Firebase Storage bucket)

[detector]
id = "firebase-storage-credentials"
name = "Firebase Storage Credentials"
service = "firebase"
severity = "high"
keywords = ["storageBucket", "firebaseapp.com", "appspot.com", "gs://"]

[[detector.patterns]]
regex = "gs://([a-z0-9-]+\\.appspot\\.com)"
description = "Firebase Storage bucket gs:// URL"
group = 1

[[detector.patterns]]
regex = "\"storageBucket\"[=:\\s\"'']+([a-z0-9-]+\\.appspot\\.com)"
description = "Firebase config storageBucket field"
group = 1

[[detector.patterns]]
regex = "\"storageBucket\"[=:\\s\"'']+([a-z0-9-]+\\.firebaseapp\\.com)"
description = "Firebase config storageBucket field (firebaseapp domain)"
group = 1

[[detector.patterns]]
regex = "firebasestorage\\.googleapis\\.com/v0/b/([a-z0-9-]+)"
description = "Firebase Storage REST API bucket reference"
group = 1

[detector.verify]
method = "GET"
url = "https://firebase.google.com/v1/me"

[detector.verify.auth]
type = "header"
name = "Authorization"
template = "Bearer {{match}}"

[detector.verify.success]
status = 200
