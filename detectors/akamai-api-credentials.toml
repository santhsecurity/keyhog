# Docs: https://techdocs.akamai.com/developer/docs/set-up-authentication-credentials
# Format: EdgeGrid credentials with client_token (akab-), access_token (akab-), client_secret (base64)
# Verify: EdgeGrid authentication with multiple tokens required - no simple verification
# Prefix: akab- for client_token and access_token

[detector]
id = "akamai-api-credentials"
name = "Akamai EdgeGrid API Credentials"
service = "akamai"
severity = "critical"
keywords = ["akab-", "AKAB-", "client_token", "access_token", "client_secret", "luna.akamaiapis.net"]

[[detector.patterns]]
regex = "client_token[=:\\s\"']+(akab-[a-zA-Z0-9_-]{32,50})"
description = "Akamai EdgeGrid client token"
group = 1

[[detector.patterns]]
regex = "access_token[=:\\s\"']+(akab-[a-zA-Z0-9_-]{32,50})"
description = "Akamai EdgeGrid access token"
group = 1

[[detector.patterns]]
regex = "client_secret[=:\\s\"']+([a-zA-Z0-9+/=]{30,50})"
description = "Akamai EdgeGrid client secret"
group = 1

[detector.companion]
regex = "akab-[a-zA-Z0-9_-]{32,50}"
within_lines = 10
name = "akamai_credential_companion"
