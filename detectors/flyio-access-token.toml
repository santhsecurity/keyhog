# Docs: https://fly.io/docs/security/tokens/
# Format: fm2_ prefix followed by 43 base64url characters
# Verify: HTTP GET to /v1/apps with Bearer token authentication
# Prefix: fm2_

[detector]
id = "flyio-access-token"
name = "Fly.io Access Token"
service = "flyio"
severity = "critical"
keywords = ["fm2_", "fly.io"]

[[detector.patterns]]
regex = 'fm2_[a-zA-Z0-9_-]{43}'
description = "Fly.io access token (fm2_ prefix followed by base64url characters)"

[detector.verify]
method = "GET"
url = "https://api.machines.dev/v1/apps"

[detector.verify.auth]
type = "bearer"
field = "match"

[detector.verify.success]
status = 200
