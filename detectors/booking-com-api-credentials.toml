# Docs: https://developers.booking.com/connectivity/docs/basic-authentication
# Format: Username and password for Basic Auth (Base64 encoded)
# Verify: POST to OTA or B.XML endpoints with Basic Auth header
# Prefix: none (requires context anchoring)

[detector]
id = "booking-com-api-credentials"
name = "Booking.com API Credentials"
service = "booking-com"
severity = "high"
keywords = ["BOOKING_COM", "booking.com", "booking_com", "BXML", "OTA"]

[[detector.patterns]]
regex = "(?:BOOKING_COM|booking[_-]com|booking_com)[_\\s]?(?:USER(?:NAME)?|user(?:name)?)[=:\\s\"'']+([A-Za-z0-9_-]+)"
description = "Booking.com API username"
group = 1

[[detector.patterns]]
regex = "(?:BOOKING_COM|booking[_-]com|booking_com)[_\\s]?(?:PASS(?:WORD)?|pass(?:word)?)[=:\\s\"'']+([A-Za-z0-9_-]+)"
description = "Booking.com API password"
group = 1

[[detector.companions]]
name = "booking-password"
regex = "(?:BOOKING_COM|booking[_-]com|booking_com)[_\\s]?(?:PASS(?:WORD)?|pass(?:word)?)[=:\\s\"'']+[A-Za-z0-9_-]+"
within_lines = 5
