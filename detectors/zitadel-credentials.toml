# Docs: https://zitadel.com/docs/guides/integrate/service-accounts/client-credentials
# Format: Client ID and Client Secret pair or JWT profile key
# Verify: POST to /oauth/v2/token endpoint
# Prefix: none (requires context anchoring)

[detector]
id = "zitadel-credentials"
name = "Zitadel Credentials"
service = "zitadel"
severity = "critical"
keywords = ["ZITADEL_CLIENT_ID", "ZITADEL_CLIENT_SECRET", "zitadel"]

[[detector.patterns]]
regex = "(?:ZITADEL[_-]?CLIENT[_-]?ID)[=:\\s\"'']+([0-9]+@[a-zA-Z0-9_-]+)"
description = "Zitadel client ID (numeric ID with domain suffix)"
group = 1

[[detector.patterns]]
regex = "(?:ZITADEL[_-]?CLIENT[_-]?SECRET)[=:\\s\"'']+([a-zA-Z0-9_-]{40,})"
description = "Zitadel client secret with context anchor"
group = 1

[[detector.patterns]]
regex = "(?:ZITADEL[_-]?PAT|ZITADEL[_-]?TOKEN)[=:\\s\"'']+([a-zA-Z0-9_-]{20,})"
description = "Zitadel Personal Access Token with context anchor"
group = 1
