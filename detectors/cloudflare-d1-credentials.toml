# Docs: https://developers.cloudflare.com/d1/
# Format: Cloudflare D1 uses API tokens (40-char alphanumeric) and database IDs (UUID format)
# Verify: GET /client/v4/user/tokens/verify with Bearer token
# Prefix: none (requires context anchoring)

[detector]
id = "cloudflare-d1-credentials"
name = "Cloudflare D1 Credentials"
service = "cloudflare"
severity = "high"
keywords = ["CF_D1_API_TOKEN", "CLOUDFLARE_D1", "D1_DATABASE_ID", "D1_TOKEN"]

[[detector.patterns]]
regex = "(?:CF_D1_API_TOKEN|CLOUDFLARE_D1[_-]TOKEN|D1[_-]TOKEN)[=:\\s\"'']+([a-zA-Z0-9_-]{40,})"
description = "Cloudflare D1 API token with context anchor"
group = 1

[[detector.patterns]]
regex = "(?:D1_DATABASE_ID)[=:\\s\"'']+([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})"
description = "Cloudflare D1 database ID (UUID format)"
group = 1

[detector.verify]
method = "GET"
url = "https://api.cloudflare.com/client/v4/user/tokens/verify"

[detector.verify.auth]
type = "bearer"
field = "match"

[detector.verify.success]
status = 200
