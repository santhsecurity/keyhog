# Docs: https://www.linode.com/docs/api/get-started/#get-an-access-token
# Format: 64 hexadecimal characters
# Verify: GET /v4/account with Bearer token returns 200
# Prefix: none (64 hex chars, requires keyword context)

[detector]
id = "linode-pat"
name = "Linode Personal Access Token"
service = "linode"
severity = "critical"
keywords = ["LINODE", "linode", "LINODE_API", "linode_api", "LINODE_TOKEN"]

[[detector.patterns]]
regex = "(?:LINODE|linode)[_\\s]*(?:API|api|TOKEN|token)?[_\\s]*(?:KEY|key|TOKEN|token)?[=:\\s\"']+([0-9a-f]{64})"
description = "Linode personal access token with context anchor"
group = 1

[[detector.patterns]]
regex = "Authorization:\\s*[Bb]earer\\s+([0-9a-f]{64})"
description = "Linode personal access token in Authorization header"
group = 1

[detector.verify]
method = "GET"
url = "https://api.linode.com/v4/account"

[detector.verify.auth]
type = "bearer"
field = "match"

[detector.verify.success]
status = 200

[[detector.verify.metadata]]
name = "company"
json_path = "company"

[[detector.verify.metadata]]
name = "email"
json_path = "email"
