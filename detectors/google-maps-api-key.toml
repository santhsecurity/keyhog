# Docs: https://developers.google.com/maps/documentation/javascript/get-api-key
# Format: AIza + 35 alphanumeric characters (Base64-like)
# Verify: GET request to Maps Geocoding API with key parameter
# Prefix: AIza

[detector]
id = "google-maps-api-key"
name = "Google Maps API Key"
service = "google-maps"
severity = "critical"
keywords = ["AIza"]

[[detector.patterns]]
regex = 'AIza[0-9A-Za-z_-]{35}'
description = "Google Maps API key"

[detector.verify]
method = "GET"
url = "https://maps.googleapis.com/maps/api/geocode/json?address=test&key={{match}}"

[detector.verify.auth]
type = "none"

[detector.verify.success]
status = 200
json_path = "status"
not_equals = "REQUEST_DENIED"
