# Docs: https://docs.yugabyte.com/stable/develop/build-apps/
# Format: PostgreSQL-compatible connection strings with yugabyte.cloud or ybdb.io hostnames
# Verify: no public verification endpoint (requires database connection)
# Prefix: none (requires context anchoring)

[detector]
id = "yugabytedb-credentials"
name = "YugabyteDB Credentials"
service = "yugabytedb"
severity = "high"
keywords = ["yugabyte", "yugabyte.cloud", "ybdb.io", "YUGABYTE"]

[[detector.patterns]]
regex = "postgres(?:ql)?://[^\\s:@]+:([^\\s@]+)@[a-z0-9-]+\\.(?:yugabyte\\.cloud|ybdb\\.io)(:\\d+)?/[^\\s\"'']*"
description = "YugabyteDB Aeon PostgreSQL connection string with password"
group = 1

[[detector.patterns]]
regex = "(?:YUGABYTE[_-](?:URL|DATABASE|HOST|PASSWORD))[=:\\s\"'']+([^\\s\"'']+)"
description = "YugabyteDB credential with context anchor"
group = 1
