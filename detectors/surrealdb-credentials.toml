# Docs: https://surrealdb.com/docs/surrealdb/integration/sdks
# Format: SurrealDB uses connection strings (ws://, wss://, http://, https://) with username/password or JWT tokens
# Verify: POST /signin with credentials returns 200 if valid
# Prefix: none (requires context anchoring)

[detector]
id = "surrealdb-credentials"
name = "SurrealDB Credentials"
service = "surrealdb"
severity = "high"
keywords = ["SURREAL", "surrealdb", "SURREALDB_URL", "SURREAL_TOKEN"]

[[detector.patterns]]
regex = "(?:SURREAL(?:DB)?[_-](?:URL|ENDPOINT|CONNECTION))[=:\\s\"'']+(wss?://[^\\s\"'']+)"
description = "SurrealDB WebSocket connection URL with context"
group = 1

[[detector.patterns]]
regex = "(?:SURREAL(?:DB)?[_-](?:URL|ENDPOINT|CONNECTION))[=:\\s\"'']+(https?://[^\\s\"'']+)"
description = "SurrealDB HTTP connection URL with context"
group = 1

[[detector.patterns]]
regex = "(?:SURREAL(?:DB)?[_-]TOKEN|NS_TOKEN|DB_TOKEN)[=:\\s\"'']+(eyJ[a-zA-Z0-9_-]*\\.[a-zA-Z0-9_-]*\\.?[a-zA-Z0-9_-]*)"
description = "SurrealDB JWT token with context anchor"
group = 1
