# Docs: https://developers.belvo.com/
# Format: Secret ID is a UUID format, Secret Password is alphanumeric string
# Verify: GET /api/institutions with HTTP Basic Auth returns 200 if valid
# Prefix: none (UUID format for Secret ID)

[detector]
id = "belvo-api-credentials"
name = "Belvo API Credentials"
service = "belvo"
severity = "critical"
keywords = ["BELVO_SECRET_ID", "BELVO_SECRET_PASSWORD", "secretId", "secretPassword"]

[[detector.patterns]]
regex = "(?:BELVO|belvo)[._-]?(?:SECRET|secret)?[._-]?(?:ID|id)[=:\\s\"'']+([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})"
description = "Belvo Secret ID (UUID format)"
group = 1

[[detector.patterns]]
regex = "(?:BELVO|belvo)[._-]?(?:SECRET|secret)?[._-]?(?:PASSWORD|password)[=:\\s\"'']+([a-zA-Z0-9_-]{20,60})"
description = "Belvo Secret Password (alphanumeric string)"
group = 1

[[detector.companions]]
name = "secret_password"
regex = "(?:BELVO|belvo)[._-]?(?:SECRET|secret)?[._-]?(?:PASSWORD|password)[=:\\s\"'']+([a-zA-Z0-9_-]{20,60})"
within_lines = 5
