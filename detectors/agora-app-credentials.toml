# Docs: https://docs.agora.io/en/agora-analytics/reference/agora-console-rest-api
# Format: App ID is a 32-character hex string, App Certificate is a 32-character hex string
# Verify: GET /dev/v1/projects with Basic auth (Customer ID + Customer Secret) returns 200 if valid
# Prefix: none (requires context anchoring)

[detector]
id = "agora-app-credentials"
name = "Agora App ID and Certificate"
service = "agora"
severity = "high"
keywords = ["AGORA_APP_ID", "AGORA_APP_CERTIFICATE", "agora", "app_id", "app_certificate"]

[[detector.patterns]]
regex = "(?:AGORA_APP_ID|agora_app_id|app_id)[\"\\'\\s]*[=:]\\s*[\"\\']?([a-f0-9]{32})[\"\\']?"
description = "Agora App ID (32 hex characters) with context anchor"
group = 1

[[detector.patterns]]
regex = "(?:AGORA_APP_CERTIFICATE|agora_app_certificate|app_certificate)[\"\\'\\s]*[=:]\\s*[\"\\']?([a-f0-9]{32})[\"\\']?"
description = "Agora App Certificate (32 hex characters) with context anchor"
group = 1

# App Certificate is a companion to App ID
[[detector.companions]]
name = "agora_app_certificate"
regex = "(?:AGORA_APP_CERTIFICATE|agora_app_certificate|app_certificate|cert)[=:\\s\"'']+([a-f0-9]{32})"
within_lines = 5
[detector.verify]
method = "GET"
url = "https://api.agora.io/dev/v1/projects"

[detector.verify.auth]
type = "basic"
# `password = "companion"` (no `.<name>`) silently resolved to the literal
# string "companion" via the resolve_field fallthrough. Reference the
# companion by name so basic_auth gets the App Certificate.
username = "match"
password = "companion.agora_app_certificate"

[detector.verify.success]
status = 200
