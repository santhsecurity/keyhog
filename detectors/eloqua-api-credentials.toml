# Docs: https://docs.oracle.com/en/cloud/saas/marketing/eloqua-develop/pdf/OracleEloqua_DeveloperGuide.pdf
# Format: Site name, username, and password used in Basic Auth (siteName\\username:password)
# Verify: GET /api/REST/2.0/system/cloud with Basic Auth returns 200
# Prefix: none (requires context anchoring)

[detector]
id = "eloqua-api-credentials"
name = "Oracle Eloqua API Credentials"
service = "eloqua"
severity = "critical"
keywords = ["eloqua", "ELOQUA", "site_name", "company_name"]

[[detector.patterns]]
regex = '(?:ELOQUA|eloqua)[_]*(?:SITE|site)?[_]*(?:NAME|name)?[=: ]+([a-zA-Z0-9_-]+)'
description = "Eloqua Site/Company Name"
group = 1

[[detector.patterns]]
regex = '(?:ELOQUA|eloqua)[_]*(?:USERNAME|user[_]*name|USER|user)[=: ]+([a-zA-Z0-9._-]+@[a-zA-Z0-9._-]+)'
description = "Eloqua username/email"
group = 1

[[detector.patterns]]
regex = '(?:ELOQUA|eloqua)[_]*(?:PASS(?:WORD)?|pass(?:word)?)[=: ]+([^ ]{8,})'
description = "Eloqua password"
group = 1

[[detector.patterns]]
regex = '(?:ELOQUA|eloqua)[_]*(?:CLIENT[_]*ID|client[_]*id)[=: ]+([a-zA-Z0-9_-]{10,})'
description = "Eloqua OAuth Client ID"
group = 1

[[detector.patterns]]
regex = '(?:ELOQUA|eloqua)[_]*(?:CLIENT[_]*SECRET|client[_]*secret)[=: ]+([a-zA-Z0-9_-]{10,})'
description = "Eloqua OAuth Client Secret"
group = 1

[detector.verify]
method = "GET"
url = "https://api.oracle.com/v1/me"

[detector.verify.auth]
type = "header"
name = "Authorization"
template = "Bearer {{match}}"

[detector.verify.success]
status = 200
