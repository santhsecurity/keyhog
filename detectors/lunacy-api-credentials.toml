# Docs: https://lunacy.docs.icons8.com/
# Format: API token for Lunacy cloud services
# Verify: no public verification endpoint
# Prefix: none (requires context anchoring)

[detector]
id = "lunacy-api-credentials"
name = "Lunacy API Credentials"
service = "lunacy"
severity = "medium"
keywords = ["LUNACY", "lunacy", "icons8", "LUNACY_API_KEY"]

[[detector.patterns]]
regex = "(?:LUNACY|lunacy)[_=:\\s\"'']+(?:api[_-]?)?(?:key|token)[=:\\s\"'']+([a-zA-Z0-9_-]{20,50})"
description = "Lunacy API key with context anchor"
group = 1

[[detector.patterns]]
regex = "(?:icons8|ICONS8)[_=:\\s\"'']+(?:api[_-]?)?(?:key|token)[=:\\s\"'']+([a-zA-Z0-9_-]{20,50})"
description = "Icons8/Lunacy API token"
group = 1
