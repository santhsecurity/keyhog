# Docs: https://confluence.atlassian.com/sourcetreekb
# Format: Sourcetree stores Bitbucket/GitHub credentials, uses standard OAuth tokens
# Verify: no public verification endpoint
# Prefix: none (requires context anchoring)

[detector]
id = "sourcetree-credentials"
name = "Sourcetree Credentials"
service = "sourcetree"
severity = "medium"
keywords = ["sourcetree", "SOURCETREE", "source_tree"]

[[detector.patterns]]
regex = "(?:sourcetree|SOURCETREE)[_-]?(?:password|PASSWORD|token|TOKEN|credential|CREDENTIAL)[=:\\s\"'']+([a-zA-Z0-9!@#$%^&*+=/-]{16,})"
description = "Sourcetree stored credentials with context anchor"
group = 1

[detector.verify]
method = "GET"
url = "https://confluence.atlassian.com/v1/me"

[detector.verify.auth]
type = "header"
name = "Authorization"
template = "Bearer {{match}}"

[detector.verify.success]
status = 200
