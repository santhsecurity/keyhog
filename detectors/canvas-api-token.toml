# Docs: https://canvas.instructure.com/doc/api/file.oauth.html
# Format: 64-71 character alphanumeric token prefixed with canvas-specific context
# Verify: GET /api/v1/users/self with Authorization header returns 200 if valid
# Prefix: none (requires context anchoring)

[detector]
id = "canvas-api-token"
name = "Canvas LMS API Token"
service = "canvas"
severity = "high"
keywords = ["canvas", "instructure", "CANVAS_API_TOKEN", "canvas_token"]

[[detector.patterns]]
regex = "(?:canvas|instructure)[_\\s.-]*(?:api[_\\s.-]*)?(?:token|key|secret)[=:\\s\"'']+([a-zA-Z0-9_-]{64,71})"
description = "Canvas LMS API token with context anchor"
group = 1

[[detector.patterns]]
regex = "(?:Bearer|Token)[=:\\s]+([a-zA-Z0-9_-]{64,71}).*canvas"
description = "Canvas token in Authorization header context"
group = 1

[[detector.companions]]
name = "canvas_domain"
# Tightened: only `*.instructure.com` is recognized. The previous
# `canvas[^\s"']*` alternative let an attacker substitute
# `canvas.evil.com` and ship the Bearer token there. kimi-wave3 §1.
regex = "https?://[a-zA-Z0-9_-]+\\.instructure\\.com"
within_lines = 5
[detector.verify]
method = "GET"
url = "https://{{companion.canvas_domain}}/api/v1/users/self"

[detector.verify.auth]
type = "header"
name = "Authorization"
template = "Bearer {{match}}"

[detector.verify.success]
status = 200
