# Docs: https://stytch.com/docs/api-reference/magic-links/send
# Format: public-token- prefix followed by 36 alphanumeric characters
# Verify: no public verification endpoint (client-side token)
# Prefix: public-token-

[detector]
id = "stytch-magic-link-credentials"
name = "Stytch Magic Link Public Token"
service = "stytch"
severity = "medium"
keywords = ["public-token-"]

[[detector.patterns]]
regex = 'public-token-[a-zA-Z0-9]{36}'
description = "Stytch public token for Magic Link (public-token- prefix)"
