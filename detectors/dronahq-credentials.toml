# Docs: https://docs.dronahq.com/rest-apis/api-authentication/
# Format: DRONAHQ_ prefixed environment variables or tokenkey for REST API
# Verify: no public verification endpoint
# Prefix: none (requires context anchoring)

[detector]
id = "dronahq-credentials"
name = "DronaHQ Credentials"
service = "dronahq"
severity = "critical"
keywords = ["DRONAHQ", "dronahq", "tokenkey"]

[[detector.patterns]]
regex = "DRONAHQ[_\\.\\s]*(?:API_KEY|api_key|TOKEN|token|SECRET|secret)[=:\\s\"'']+([a-zA-Z0-9_\\-]{24,})"
description = "DronaHQ API key or token"
group = 1

[[detector.patterns]]
regex = "tokenkey[=:\\s\"'']+([a-zA-Z0-9_\\-]{32,})"
description = "DronaHQ REST API token key"
group = 1

[[detector.patterns]]
regex = "(?:dronahq)[_\\.\\s]*(?:api[_\\.\\s]*key|password)[=:\\s\"'']+([a-zA-Z0-9_\\-]{16,})"
description = "DronaHQ credential with context anchor"
group = 1

[[detector.patterns]]
regex = "DRONAHQ[_\\.\\s]*(?:JWT|jwt)[_\\.\\s]*(?:SECRET|secret)[=:\\s\"'']+([a-zA-Z0-9_\\-\\/\\+]{20,}={0,2})"
description = "DronaHQ JWT secret"
group = 1
