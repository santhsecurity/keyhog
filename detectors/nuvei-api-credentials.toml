# Docs: https://developer.payone.com/en/integration/api-developer-guide/authentication
# Format: API Key and API Secret pair for HMAC-SHA256 authentication
# Verify: no public verification endpoint
# Prefix: none (requires context anchoring)

[detector]
id = "nuvei-api-credentials"
name = "Nuvei API Credentials"
service = "nuvei"
severity = "critical"
keywords = ["NUVEI", "nuvei", "NUVEI_API_KEY", "NUVEI_API_SECRET", "PAYONE"]

[[detector.patterns]]
regex = "(?:NUVEI|nuvei|PAYONE|payone)[_.]?(?:API_KEY|api_key|APIKEY|apikey)[=:\\s\"']+([a-f0-9]{16,})"
description = "Nuvei API Key with context anchor"
group = 1

[[detector.patterns]]
regex = "(?:NUVEI|nuvei|PAYONE|payone)[_.]?(?:API_SECRET|api_secret|APISECRET|apisecret|SECRET|secret)[=:\\s\"']+([a-f0-9]{32,})"
description = "Nuvei API Secret with context anchor"
group = 1

[[detector.companions]]
name = "Nuvei API key"
regex = "(?:NUVEI|nuvei)[_.]?(?:API_KEY|api_key)[=:\\s\"']+[a-f0-9]{16,}"
within_lines = 5
