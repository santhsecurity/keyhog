# Docs: https://docs.stripe.com/webhooks#secure-webhook
# Format: String starting with 'whsec_' followed by 32-64 alphanumeric characters
# Verify: no public verification endpoint (local signature verification using Stripe-Signature header)
# Prefix: whsec_

[detector]
id = "stripe-webhook-signing-secret"
name = "Stripe Webhook Signing Secret"
service = "stripe"
severity = "high"
keywords = ["whsec_", "STRIPE_WEBHOOK_SECRET", "stripe_webhook_secret", "webhook_secret"]

[[detector.patterns]]
regex = "whsec_[a-zA-Z0-9]{32,64}"
description = "Stripe webhook signing secret (whsec_ prefix)"

[[detector.patterns]]
regex = "(?:STRIPE|stripe)[._-]?(?:WEBHOOK|webhook)[._-]?(?:SECRET|secret|KEY|key)[=:\\s\"'']+(whsec_[a-zA-Z0-9]{32,64})"
description = "Stripe webhook signing secret with context anchor"
group = 1

[detector.verify]
method = "GET"
url = "https://api.stripe.com/v1/me"

[detector.verify.auth]
type = "header"
name = "Authorization"
template = "Bearer {{match}}"

[detector.verify.success]
status = 200
