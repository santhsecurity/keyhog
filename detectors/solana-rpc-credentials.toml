# Docs: https://docs.solana.com/developing/clients/jsonrpc-api
# Format: Solana RPC endpoints often use access tokens in URL or x-api-key header
# Verify: no public verification endpoint
# Prefix: none (requires context anchoring)

[detector]
id = "solana-rpc-credentials"
name = "Solana RPC Credentials"
service = "solana"
severity = "high"
keywords = ["solana", "SOLANA_RPC", "solana_rpc", "quicknode", "helius", "alchemy.com/solana"]

[[detector.patterns]]
regex = '(?:solana|SOLANA)[._-]?(?:rpc|RPC)[._-]?(?:url|URL|endpoint|key)[=:"	\s]+(https?://[a-zA-Z0-9._-]+/[a-zA-Z0-9_-]+)'
description = "Solana RPC URL with embedded access token"
group = 1

[[detector.patterns]]
regex = '(?:solana|SOLANA)[._-]?(?:api|API)[._-]?(?:key|token)[=:"	\s]+([a-zA-Z0-9_-]{32,})'
description = "Solana API key in environment variable or config"
group = 1

[detector.verify]
method = "GET"
url = "https://api.solana.com/v1/me"

[detector.verify.auth]
type = "header"
name = "X-Api-Key"
template = "{{match}}"

[detector.verify.success]
status = 200
