# Docs: https://www.smarty.com/docs/cloud/authentication
# Format: Auth ID is UUID format, Auth Token is 20 alphanumeric characters
# Verify: GET /street-address with auth-id and auth-token query params
# Prefix: none (requires context anchoring)

[detector]
id = "smartystreets-api-credentials"
name = "SmartyStreets API Credentials"
service = "smartystreets"
severity = "high"
keywords = ["SMARTY_AUTH_ID", "SMARTY_AUTH_TOKEN", "auth-id", "auth-token", "smarty.com"]

[[detector.patterns]]
regex = "(?:smarty|SMARTY)[._](?:AUTH|auth)[._](?:ID|id)[=:\\s\"'']+([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})"
description = "SmartyStreets Auth ID (UUID format)"
group = 1

[[detector.patterns]]
regex = "(?:smarty|SMARTY)[._](?:AUTH|auth)[._](?:TOKEN|token)[=:\\s\"'']+([a-zA-Z0-9_-]{20,})"
description = "SmartyStreets Auth Token"
group = 1

[[detector.patterns]]
regex = "auth-id[=:\\s\"'']+([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})"
description = "SmartyStreets auth-id parameter"
group = 1

[detector.companion]
regex = "auth-token[=:\\s\"'']+[a-zA-Z0-9_-]{20,}"
within_lines = 3
name = "SmartyStreets Auth Token"

[detector.verify]
method = "GET"
url = "https://api.smarty.com/v1/me"

[detector.verify.auth]
type = "header"
name = "Authorization"
template = "Bearer {{match}}"

[detector.verify.success]
status = 200
