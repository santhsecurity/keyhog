# Docs: https://developers.frontegg.com/ciam/api/overview
# Format: Client ID (UUID format) and API Key (Secret) pair
# Verify: POST /auth/vendor with clientId and secret returns JWT
# Prefix: none (requires context anchoring)

[detector]
id = "frontegg-api-credentials"
name = "Frontegg API Credentials"
service = "frontegg"
severity = "critical"
keywords = ["FRONTEGG_CLIENT_ID", "FRONTEGG_API_KEY", "FRONTEGG_CLIENT_SECRET", "frontegg"]

[[detector.patterns]]
regex = "(?:FRONTEGG_CLIENT_ID|frontegg[_-]?client[_-]?id)[\"\\']?\\s*[:=]\\s*[\"\\']([a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12})[\"\\']"
description = "Frontegg Client ID (UUID format)"
group = 1

[detector.companion]
regex = "(?:FRONTEGG_CLIENT_SECRET|FRONTEGG_API_KEY|frontegg[_-]?(?:client[_-]?secret|api[_-]?key))[\"\\']?\\s*[:=]\\s*[\"\\']([a-zA-Z0-9_-]{20,})[\"\\']"
within_lines = 5
name = "client_secret"

[detector.verify]
method = "GET"
url = "https://api.frontegg.com/v1/me"

[detector.verify.auth]
type = "header"
name = "Authorization"
template = "Bearer {{match}}"

[detector.verify.success]
status = 200
