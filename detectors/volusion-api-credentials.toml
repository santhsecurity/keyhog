# Docs: https://help.volusion.com/en/articles/1613498-api-overview
# Format: Encrypted password (32 hex chars) + Admin username + Store URL
# Verify: GET to /net/WebService.aspx with encrypted password
# Prefix: none (requires context anchoring)

[detector]
id = "volusion-api-credentials"
name = "Volusion API Credentials"
service = "volusion"
severity = "high"
keywords = ["volusion", "VOLUSION", "encrypted_password", "api_login", "WebService.aspx"]

[[detector.patterns]]
regex = "(?:volusion|VOLUSION)[_=:\\s\"'']+(?:encrypted[_-]?password|api[_-]?password)[=:\\s\"'']+([a-f0-9]{32})"
description = "Volusion API encrypted password with context anchor"
group = 1

[[detector.patterns]]
regex = "(?:volusion|VOLUSION)[_=:\\s\"'']+(?:api[_-]?login|username)[=:\\s\"'']+([a-zA-Z0-9._-]+)"
description = "Volusion API login username with context anchor"
group = 1

[detector.verify]
method = "GET"
url = "https://help.volusion.com/v1/me"

[detector.verify.auth]
type = "header"
name = "Authorization"
template = "Bearer {{match}}"

[detector.verify.success]
status = 200
