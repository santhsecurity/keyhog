# Docs: https://posthog.com/docs/api
# Format: phc_ prefix followed by 32 alphanumeric characters (project API key) or phx_ for personal API key
# Verify: GET /api/projects with Bearer token returns 200 if valid
# Prefix: phc_, phx_

[detector]
id = "posthog-api-key"
name = "PostHog API Key"
service = "posthog"
severity = "high"
keywords = ["phc_", "phx_", "POSTHOG_API_KEY"]

[[detector.patterns]]
regex = "phc_[a-zA-Z0-9]{32}"
description = "PostHog project API key (phc_ prefix)"

[[detector.patterns]]
regex = "phx_[a-zA-Z0-9]{32,48}"
description = "PostHog personal API key (phx_ prefix)"

[detector.verify]
method = "GET"
url = "https://app.posthog.com/api/projects"

[detector.verify.auth]
type = "bearer"
field = "match"

[detector.verify.success]
status = 200
