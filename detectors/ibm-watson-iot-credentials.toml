# Docs: https://docs.ibm.com/en/watson-iot-platform
# Format: org ID, API key, and authentication token
# Verify: no public verification endpoint
# Prefix: none (requires context anchoring)

[detector]
id = "ibm-watson-iot-credentials"
name = "IBM Watson IoT Platform Credentials"
service = "ibm-watson-iot"
severity = "critical"
keywords = ["WATSON_IOT", "WATSON-IoT", "internetofthings", "WIoTP"]

[[detector.patterns]]
regex = "(?:WATSON[_-]?IOT|watson[_-]?iot)[._-]?ORG[=:\\s\"'']+([a-z]{6})"
description = "IBM Watson IoT 6-character organization ID"
group = 1

[[detector.patterns]]
regex = "(?:WATSON[_-]?IOT|watson[_-]?iot)[._-]?API[_-]?KEY[=:\\s\"'']+(a-[a-z0-9]{6}-[a-z0-9]{10,})"
description = "IBM Watson IoT API key"
group = 1

[[detector.patterns]]
regex = "(?:WATSON[_-]?IOT|watson[_-]?iot)[._-]?AUTH[_-]?TOKEN[=:\\s\"'']+([a-zA-Z0-9_-]{18,})"
description = "IBM Watson IoT authentication token"
group = 1

[[detector.patterns]]
regex = "(?:internetofthings|INTERNETOFTHINGS)\\.ibmcloud\\.com"
description = "IBM Watson IoT platform endpoint URL"

[detector.verify]
method = "GET"
url = "https://api.ibm.com/v1/me"

[detector.verify.auth]
type = "header"
name = "Authorization"
template = "Bearer {{match}}"

[detector.verify.success]
status = 200
