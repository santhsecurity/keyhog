# Docs: https://docs.aws.amazon.com/secretsmanager/latest/userguide/auth-and-access.html
# Format: Secret ARNs follow arn:aws:secretsmanager:... pattern, Secret values are arbitrary
# Verify: GetSecretValue API call with AWS credentials
# Prefix: arn:aws:secretsmanager:

[detector]
id = "aws-secrets-manager-credentials"
name = "AWS Secrets Manager Secret"
service = "aws-secrets-manager"
severity = "critical"
keywords = ["arn:aws:secretsmanager", "secretsmanager"]

[[detector.patterns]]
regex = 'arn:aws:secretsmanager:[a-z0-9-]+:\d+:secret:[a-zA-Z0-9/_+=,.@:-]+'
description = "AWS Secrets Manager secret ARN"

# Companion: AWS credentials often accompany secret ARNs
[detector.companion]
regex = '(?:AKIA|ASIA)[A-Z0-9]{16}'
within_lines = 10
name = "AWS Access Key ID"

[detector.verify]
method = "GET"
url = "https://api.aws.amazon.com/v1/me"

[detector.verify.auth]
type = "header"
name = "Authorization"
template = "Bearer {{match}}"

[detector.verify.success]
status = 200
