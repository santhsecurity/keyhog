# Docs: https://razorpay.com/docs/api/
# Format: 20-40 alphanumeric characters (no distinctive prefix - REQUIRES context)
# Verify: Basic auth with Key ID and Key Secret to GET /v1/orders
# Prefix: none (requires companion Key ID or context anchor)

[detector]
id = "razorpay-key-secret"
name = "Razorpay Key Secret"
service = "razorpay"
severity = "critical"
keywords = ["RAZORPAY_KEY_SECRET", "razorpay_key_secret", "RAZORPAY_SECRET", "razorpay_secret"]

[[detector.patterns]]
regex = "(?:RAZORPAY|razorpay).{0,20}(?:SECRET|secret).{0,5}[=:\\s\"']+([a-zA-Z0-9]{20,40})"
description = "Razorpay Key Secret with context anchor (companion to Key ID)"
group = 1

[detector.verify]
method = "GET"
url = "https://api.razorpay.com/v1/orders"

[detector.verify.auth]
type = "basic"
username = "companion"
password = "match"

[detector.verify.success]
status = 200
