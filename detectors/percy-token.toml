# Docs: https://www.browserstack.com/docs/percy/api-reference/authentication
# Format: percy_ prefix followed by alphanumeric characters (read-only, write-only, or full-access tokens)
# Verify: GET /api/v1/projects with Token auth returns 200 if valid
# Prefix: percy_

[detector]
id = "percy-token"
name = "Percy Token"
service = "percy"
severity = "critical"
keywords = ["percy_", "PERCY_TOKEN", "percy-token"]

[[detector.patterns]]
regex = "percy_[a-zA-Z0-9_-]{30,}"
description = "Percy API token (percy_ prefix)"

[[detector.patterns]]
regex = "(?:PERCY_TOKEN|percy[_-]?token)[=:\\s\"']+(percy_[a-zA-Z0-9_-]+)"
description = "Percy token with context anchor"
group = 1

[detector.verify]
method = "GET"
url = "https://percy.io/api/v1/projects"

[detector.verify.auth]
type = "header"
name = "Authorization"
template = "Token {{match}}"

[detector.verify.success]
status = 200
