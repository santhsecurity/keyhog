# Docs: https://www.last.fm/api
# Format: 32 character hex string API key
# Verify: GET /2.0/?method=auth.getToken with api_key param returns 200
# Prefix: none (requires context anchoring)

[detector]
id = "lastfm-api-key"
name = "Last.fm API Key"
service = "lastfm"
severity = "medium"
keywords = ["LASTFM", "lastfm", "LAST_FM", "last_fm", "LASTFM_API_KEY"]

[[detector.patterns]]
regex = "(?:LAST[_\\\\s-]?FM|last[_\\\\s-]?fm)[\\\\s_-]?(?:API|api)?[\\\\s_-]?(?:KEY|key|SECRET|secret)?[=:\\s\"'']+([a-f0-9]{32})"
description = "Last.fm API key with context anchor"
group = 1

[[detector.patterns]]
regex = "(?:LAST[_\\\\s-]?FM|last[_\\\\s-]?fm)[\\\\s_-]?(?:SHARED|shared)?[\\\\s_-]?(?:SECRET|secret)[=:\\s\"'']+([a-f0-9]{32})"
description = "Last.fm shared secret with context anchor"
group = 1

[detector.verify]
method = "GET"
url = "https://api.last.fm/v1/me"

[detector.verify.auth]
type = "header"
name = "Authorization"
template = "Bearer {{match}}"

[detector.verify.success]
status = 200
