# Docs: https://goteleport.com/docs/reference/join-methods/
# Format: Join tokens are random strings or UUID-like, often in tctl commands or config files
# Verify: no public verification endpoint (Teleport is self-hosted)
# Prefix: none (requires context anchoring)

[detector]
id = "teleport-credentials"
name = "Teleport Credentials"
service = "teleport"
severity = "critical"
keywords = ["TELEPORT", "tctl", "teleport_token", "proxy_token", "auth_token"]

[[detector.patterns]]
regex = "(?:TELEPORT_AUTH_TOKEN|teleport_token|proxy_token|auth_token)[=:\\s\"'']+([a-zA-Z0-9_-]{20,})"
description = "Teleport authentication token in environment variable"
group = 1

[[detector.patterns]]
regex = "tctl\\s+(?:tokens\\s+add|auth\\s+sign).{0,100}?(--token|token[=:\\s\"'']+)([a-zA-Z0-9_-]{20,})"
description = "Teleport token in tctl command"
group = 2

[[detector.patterns]]
regex = "auth_token:\\s*[\"'']?([a-zA-Z0-9_-]{20,})[\"'']?"
description = "Teleport auth token in YAML configuration"
group = 1

[detector.verify]
method = "GET"
url = "https://goteleport.com/v1/me"

[detector.verify.auth]
type = "header"
name = "Authorization"
template = "Bearer {{match}}"

[detector.verify.success]
status = 200
