# Docs: https://developer.twitter.com/en/docs/twitter-ads-api/authentication
# Format: OAuth 1.0a credentials with API key, API secret, access token, and access token secret
# Verify: OAuth 1.0a signed request to https://ads-api.twitter.com/12/accounts
# Prefix: none (requires context anchoring)

[detector]
id = "twitter-ads-api-credentials"
name = "Twitter Ads API Credentials"
service = "twitter-ads"
severity = "critical"
keywords = ["twitter_ads", "TWITTER_ADS", "ads-api.twitter.com"]

[[detector.patterns]]
regex = "(?:twitter_ads|TWITTER_ADS|ads-api\\.twitter\\.com).{0,50}(?:api_key|API_KEY|consumer_key|CONSUMER_KEY)[=:\\s\"'']+([a-zA-Z0-9]{25,})"
description = "Twitter Ads API key with context anchor"
group = 1

[detector.companion]
regex = "(?:api_secret|API_SECRET|consumer_secret|CONSUMER_SECRET)[=:\\s\"'']+([a-zA-Z0-9]{40,})"
within_lines = 5
name = "api_secret"

[detector.verify]
method = "GET"
url = "https://developer.twitter.com/v1/me"

[detector.verify.auth]
type = "header"
name = "Authorization"
template = "Bearer {{match}}"

[detector.verify.success]
status = 200
