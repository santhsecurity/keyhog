# Docs: https://developer.8x8.com/connect/docs/authentication
# Format: API Key is a Bearer token (long alphanumeric string)
# Verify: GET /stats with Authorization: Bearer header
# Prefix: none (requires context anchoring)

[detector]
id = "8x8-api-credentials"
name = "8x8 API Credentials"
service = "8x8"
severity = "critical"
keywords = ["8x8", "8X8", "eightxeight", "8x8_api", "x-api-key"]

[[detector.patterns]]
regex = "(?i)(?:8x8|8X8)[_\\-\\s]?(?:api[_\\-\\s]?key|apikey)[=:\\s\"'']+([a-zA-Z0-9_-]{30,100})"
description = "8x8 API Key with context anchor"
group = 1

[[detector.patterns]]
regex = "(?i)x[_\\-\\s]?api[_\\-\\s]?key[=:\\s\"'']+([a-zA-Z0-9_-]{30,100})"
description = "8x8 API Key using x-api-key header format"
group = 1

[[detector.patterns]]
regex = "(?i)(?:8x8|8X8)[_\\-\\s]?(?:subaccount[_\\-\\s]?id|subaccount)[=:\\s\"'']+([a-zA-Z0-9_-]{10,50})"
description = "8x8 Subaccount ID"
group = 1

[detector.verify]
method = "GET"
url = "https://api.8x8.com/stats"

[detector.verify.auth]
type = "bearer"
field = "match"

[detector.verify.success]
status = 200
