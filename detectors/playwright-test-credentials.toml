# Docs: https://docs.testomat.io/reference/reporter/playwright.html
# Format: Environment variables for test execution with Testomat.io or similar
# Verify: no public verification endpoint
# Prefix: none (requires context anchoring)

[detector]
id = "playwright-test-credentials"
name = "Playwright Test Credentials"
service = "playwright"
severity = "medium"
keywords = ["TESTOMATIO", "PLAYWRIGHT_TEST", "testomat.io"]

[[detector.patterns]]
regex = "(?:TESTOMATIO|TESTOMATIO_API_KEY)[=:\\s\"'']+([a-zA-Z0-9_-]{20,})"
description = "Testomat.io API key for Playwright test reporting"
group = 1

[[detector.patterns]]
regex = "(?:TESTOMATIO_PROJECT|testomatio_project)[=:\\s\"'']+([a-zA-Z0-9_-]+)"
description = "Testomat.io project identifier"
group = 1

[detector.verify]
method = "GET"
url = "https://api.testomat.io/v1/me"

[detector.verify.auth]
type = "header"
name = "Authorization"
template = "Bearer {{match}}"

[detector.verify.success]
status = 200
