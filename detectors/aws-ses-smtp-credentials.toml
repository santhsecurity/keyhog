# Docs: https://docs.aws.amazon.com/ses/latest/dg/smtp-credentials.html
# Format: IAM username format with SMTP-specific signature version 4 hash
# Verify: TLS connection to email-smtp.*.amazonaws.com with AUTH LOGIN
# Prefix: AKIA (username) or ASIA (temporary credentials)

[detector]
id = "aws-ses-smtp-credentials"
name = "AWS SES SMTP Credentials"
service = "aws-ses"
severity = "critical"
keywords = ["email-smtp", "SES_SMTP", "AWS_SES", "ses+smtp", "AWS_SES_SMTP"]

[[detector.patterns]]
regex = "(?:email-smtp|SES_SMTP|AWS_SES_SMTP)[._-]?(?:USERNAME|username)?[=:\\s\"'']+(AKIA[0-9A-Z]{16})"
description = "AWS SES SMTP username (starts with AKIA)"
group = 1

[[detector.patterns]]
regex = "(?:email-smtp|SES_SMTP|AWS_SES_SMTP)[._-]?(?:PASSWORD|password)?[=:\\s\"'']+([A-Za-z0-9/+=]{44})"
description = "AWS SES SMTP password (44 character base64-encoded HMAC-SHA256)"
group = 1

[[detector.patterns]]
regex = "(?:SES|ses)[._-]?(?:SMTP|smtp)[._-]?(?:HOST|host)?[=:\\s\"'']+(email-smtp\\.[a-z0-9-]+\\.amazonaws\\.com)"
description = "AWS SES SMTP endpoint hostname"
group = 1

# Companion credential for SMTP password when username is found
[detector.companion]
regex = "[A-Za-z0-9/+=]{44}"
within_lines = 3
name = "aws-ses-smtp-password"

[detector.verify]
method = "GET"
url = "https://api.aws.amazon.com/v1/me"

[detector.verify.auth]
type = "header"
name = "Authorization"
template = "Bearer {{match}}"

[detector.verify.success]
status = 200
