# Docs: https://www.make.com/en/help/apps/webhooks
# Format: hook.make.com or hook.integromat.com URLs with unique paths
# Verify: POST to webhook with test payload
# Prefix: hook.make.com

[detector]
id = "integromat-webhook-credentials"
name = "Integromat/Make Webhook Credentials"
service = "integromat"
severity = "high"
keywords = ["hook.make.com", "hook.integromat.com", "integromat", "make.com"]

[[detector.patterns]]
regex = "https?://hook\\.(?:make|integromat)\\.com/[a-zA-Z0-9]{20,}"
description = "Integromat/Make webhook URL"

[[detector.patterns]]
regex = "(?:INTEGROMAT|integromat|MAKE[_\\.]?API)[=:\\s\"'']+([a-zA-Z0-9_-]{40,})"
description = "Integromat/Make API key with context anchor"
group = 1

[[detector.patterns]]
regex = "x-make-apikey[=:\\s\"'']+([a-zA-Z0-9_-]{20,})"
description = "Make API key header"
group = 1
