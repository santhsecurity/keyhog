# Docs: https://casdoor.org/docs/basic/public-api
# Format: Client ID and Client Secret pair (hex strings) or Access Key/Secret
# Verify: POST to /api/login/oauth/access_token or direct API call
# Prefix: none (requires context anchoring)

[detector]
id = "casdoor-credentials"
name = "Casdoor Credentials"
service = "casdoor"
severity = "critical"
keywords = ["CASDOOR_CLIENT_ID", "CASDOOR_CLIENT_SECRET", "casdoor"]

[[detector.patterns]]
regex = "(?:CASDOOR[_-]?CLIENT[_-]?ID)[=:\\s\"'']+([a-f0-9]{20})"
description = "Casdoor client ID (20 hex characters)"
group = 1

[[detector.patterns]]
regex = "(?:CASDOOR[_-]?CLIENT[_-]?SECRET)[=:\\s\"'']+([a-f0-9]{32,40})"
description = "Casdoor client secret (32-40 hex characters)"
group = 1

[[detector.patterns]]
regex = "(?:CASDOOR[_-]?ACCESS[_-]?KEY)[=:\\s\"'']+([a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12})"
description = "Casdoor user access key (UUID format)"
group = 1

[detector.verify]
method = "GET"
url = "https://casdoor.org/v1/me"

[detector.verify.auth]
type = "header"
name = "Authorization"
template = "Bearer {{match}}"

[detector.verify.success]
status = 200
