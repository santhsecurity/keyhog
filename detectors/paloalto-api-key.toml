# Docs: https://docs.paloaltonetworks.com/pan-os/9-1/pan-os-panorama-api/get-started-with-the-pan-os-xml-api/get-your-api-key
# Format: API key - alphanumeric string, typically 32-64 characters
# Verify: GET /api/?type=op&cmd=<show><system><info></info></system></show> with key param
# Prefix: none (requires context anchoring)

[detector]
id = "paloalto-api-key"
name = "Palo Alto Networks API Key"
service = "paloalto"
severity = "critical"
keywords = ["PALOALTO", "paloalto", "PAN_OS", "panos", "PANORAMA"]

[[detector.patterns]]
regex = "(?:PALO[_\\s]*ALTO|palo[_\\s]*alto|PAN[_\\s]*OS|panos|PANORAMA)[_\\s]*(?:API[_\\s]*)?(?:KEY|TOKEN)[=:\\s\"'']+([A-Za-z0-9+/]{32,64})"
description = "Palo Alto Networks API key with context anchor"
group = 1

[[detector.patterns]]
regex = "(?:PALO[_\\s]*ALTO|palo[_\\s]*alto|PAN[_\\s]*OS|panos)[_\\s]*HOST(?:NAME)?[=:\\s\"'']+(https?://[^\\s\"'']+)"
description = "Palo Alto Networks hostname with context anchor"
group = 1

# NOTE: live verification disabled. Single-brace `{hostname}` was invalid.
