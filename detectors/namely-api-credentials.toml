# Docs: https://developers.getknit.dev/docs/namely-usecases
# Format: API key (alphanumeric string) used in Authorization header
# Verify: GET /api/v1/profiles with Authorization header returns 200
# Prefix: none (requires context anchoring)

[detector]
id = "namely-api-credentials"
name = "Namely API Credentials"
service = "namely"
severity = "critical"
keywords = ["NAMELY_API_KEY", "namely", "Authorization"]

[[detector.patterns]]
regex = "(?:NAMELY_API_KEY|namely_api_key)[=:\\s\"'']+([a-zA-Z0-9_-]{20,})"
description = "Namely API key with context anchor"
group = 1

[[detector.patterns]]
regex = "(?:namely\\.com/api/v1)[^\"'']*Authorization[^\"'']*([a-zA-Z0-9_-]{20,})"
description = "Namely API key in URL or config with Authorization"
group = 1

[detector.verify]
method = "GET"
url = "https://api.namely.com/api/v1/profiles"

[detector.verify.auth]
type = "header"
name = "Authorization"
template = "{{match}}"

[detector.verify.success]
status = 200
