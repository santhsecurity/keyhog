# Docs: https://xata.io/docs/rest-api/authentication
# Format: Workspace API key with xau_ prefix followed by 40+ alphanumeric characters
# Verify: GET /db with Authorization header returns 200 if valid
# Prefix: xau_

[detector]
id = "xata-workspace-api-key"
name = "Xata Workspace API Key"
service = "xata"
severity = "high"
keywords = ["xau_", "XATA_API_KEY", "xata.io", "XATA_WORKSPACE"]

[[detector.patterns]]
regex = "xau_[a-zA-Z0-9_-]{40,}"
description = "Xata workspace API key (xau_ prefix)"

[[detector.patterns]]
regex = "(?:XATA|xata)[_\\s]?WORKSPACE[_\\s]?(?:API[_\\s]?)?KEY[=:\\s\"'']+(xau_[a-zA-Z0-9_-]{40,})"
description = "Xata workspace API key with context anchor"
group = 1

[detector.verify]
method = "GET"
url = "https://api.xata.io/workspaces"

[detector.verify.auth]
type = "bearer"
field = "match"

[detector.verify.success]
status = 200
