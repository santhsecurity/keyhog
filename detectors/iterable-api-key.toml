# Docs: https://api.iterable.com/api/docs
# Format: 32-character hex string or UUID-like format
# Verify: GET /api/users/me with Api-Key header returns 200 if valid
# Prefix: none (requires context anchoring)

[detector]
id = "iterable-api-key"
name = "Iterable API Key"
service = "iterable"
severity = "critical"
keywords = ["ITERABLE", "iterable", "ITERABLE_API_KEY"]

[[detector.patterns]]
regex = "(?:ITERABLE|iterable)[._-]?(?:API|api)?[._-]?(?:KEY|key)?[=:\\s\"'']+([a-f0-9]{32})"
description = "Iterable API key (32 hex characters)"
group = 1

[[detector.patterns]]
regex = "(?:Api-Key|api-key)[\"'']?\\s*[=:]\\s*[\"'']?([a-f0-9]{32})"
description = "Iterable API key in header format"
group = 1

[detector.verify]
method = "GET"
url = "https://api.iterable.com/api/users/me"

[detector.verify.auth]
type = "header"
name = "Api-Key"
template = "{{match}}"

[detector.verify.success]
status = 200
