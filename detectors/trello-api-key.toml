# Docs: https://developer.atlassian.com/cloud/trello/guides/rest-api/api-introduction/
# Format: 32-character hexadecimal string (API key) + token pair
# Verify: GET /1/tokens/{token} with key returns 200 if valid
# Prefix: none (requires context anchoring)

[detector]
id = "trello-api-key"
name = "Trello API Key"
service = "trello"
severity = "high"
keywords = ["TRELLO_API_KEY", "TRELLO_KEY"]

[[detector.patterns]]
regex = "(?:TRELLO_API_KEY|TRELLO_KEY)[=:\\s\"'']+([a-f0-9]{32})"
description = "Trello API key with context anchor"
group = 1

[detector.verify]
method = "GET"
url = "https://api.trello.com/1/members/me?key={{match}}&token=dummy"

[detector.verify.auth]
type = "none"

[detector.verify.success]
status = 401
