# cargo-audit configuration for keyhog.
#
# Each advisory in the ignore list has a corresponding rationale
# block in SECURITY.md under "RustSec Advisory Assessment" — touching
# this list without updating that document will silently weaken our
# security posture. The matching `--ignore` flags on the
# `cargo audit` invocation in `.github/workflows/ci.yml` need to
# stay in sync.
#
# As of v0.5.3, `cargo audit` exits zero with these four ignores:
# the two gix-* CVEs that the v0.5.2 audit flagged were addressed
# by bumping gix to 0.77 (commit history under "security: bump
# gix").

[advisories]
ignore = [
    # Marvin attack on PKCS#1 v1.5 RSA. keyhog uses OAEP only.
    "RUSTSEC-2023-0071",
    # `paste` is a proc-macro, no runtime presence.
    "RUSTSEC-2024-0436",
    # `lru::LruCache::iter_mut()` Stacked Borrows violation. Not called
    # by keyhog.
    "RUSTSEC-2026-0002",
    # `rand::rng()` data race with custom logger. keyhog never replaces
    # the global rng.
    "RUSTSEC-2026-0097",
]
