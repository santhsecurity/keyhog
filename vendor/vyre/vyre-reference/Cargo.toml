[package]
name = "vyre-reference"
version = "0.6.0"
edition.workspace = true
rust-version.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
description = "Pure-Rust CPU reference interpreter for vyre IR — byte-identical oracle for backend conformance and small-data fallback"
readme = "README.md"
keywords = ["gpu", "ir", "reference", "interpreter", "vyre"]
categories = ["algorithms", "api-bindings"]
documentation = "https://docs.rs/vyre-reference"

[dependencies]
rayon = "1.10.0"
vyre-foundation.workspace = true
vyre-primitives.workspace = true

vyre-spec.workspace = true
blake3.workspace = true
bytemuck.workspace = true
rustc-hash.workspace = true
smallvec.workspace = true
libm.workspace = true

[dev-dependencies]
proptest.workspace = true
criterion.workspace = true
regex-automata.workspace = true
hex.workspace = true
fnv = "1.0.7"
vyre.workspace = true
vyre-driver-wgpu = { workspace = true, features = ["parity-testing"] }

[[bench]]
name = "eval_throughput"
harness = false

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]

[features]
default = []
subgroup-ops = []

[lints]
workspace = true

[[test]]
name = "test_fnv1a32_zero"
path = "../tests/adversarial/test_fnv1a32_zero.rs"
