<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 560" font-family="system-ui,-apple-system,sans-serif" font-size="13">
  <style>
    .frontend { fill: #e0e7ff; stroke: #4338ca; stroke-width: 1.5; }
    .core { fill: #dbeafe; stroke: #1d4ed8; stroke-width: 1.5; }
    .std { fill: #fde68a; stroke: #b45309; stroke-width: 1.5; }
    .backend { fill: #dcfce7; stroke: #166534; stroke-width: 1.5; }
    .conform { fill: #fce7f3; stroke: #a21caf; stroke-width: 1.5; }
    .verdict { fill: #fef2f2; stroke: #b91c1c; stroke-width: 1.5; }
    .label { font-weight: 600; fill: #111827; }
    .sub { fill: #4b5563; font-size: 11px; }
    .edge { fill: none; stroke: #374151; stroke-width: 1.5; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#374151"/>
    </marker>
  </defs>

  <rect x="320" y="20" width="280" height="60" rx="8" class="frontend"/>
  <text x="460" y="45" text-anchor="middle" class="label">Frontend</text>
  <text x="460" y="65" text-anchor="middle" class="sub">rulefire · compilers · ML kernels · scanners</text>

  <path class="edge" d="M 460 80 L 460 105"/>
  <text x="475" y="100" class="sub">vyre::Program</text>

  <rect x="140" y="110" width="640" height="260" rx="8" class="core"/>
  <text x="460" y="135" text-anchor="middle" class="label">vyre (core) — the IR, reference interpreter, lowering</text>

  <rect x="170" y="160" width="160" height="50" rx="6" fill="#fff" stroke="#1d4ed8"/>
  <text x="250" y="182" text-anchor="middle" class="label">ir::validate</text>
  <text x="250" y="198" text-anchor="middle" class="sub">V001–V013</text>

  <rect x="370" y="160" width="180" height="50" rx="6" fill="#fff" stroke="#1d4ed8"/>
  <text x="460" y="182" text-anchor="middle" class="label">lower::wgsl::lower</text>
  <text x="460" y="198" text-anchor="middle" class="sub">IR → WGSL shader</text>

  <rect x="590" y="160" width="170" height="50" rx="6" fill="#fff" stroke="#1d4ed8"/>
  <text x="675" y="182" text-anchor="middle" class="label">conform gate</text>
  <text x="675" y="198" text-anchor="middle" class="sub">verify_certificate</text>

  <path class="edge" d="M 330 185 L 370 185"/>
  <path class="edge" d="M 550 185 L 590 185"/>

  <rect x="170" y="230" width="590" height="60" rx="6" fill="#fff" stroke="#1d4ed8"/>
  <text x="465" y="253" text-anchor="middle" class="label">reference::run (CPU parity oracle)</text>
  <text x="465" y="273" text-anchor="middle" class="sub">exact ground truth the conform gate diffs every witness against</text>

  <rect x="170" y="310" width="590" height="50" rx="6" fill="#fff" stroke="#1d4ed8"/>
  <text x="465" y="332" text-anchor="middle" class="label">Layer 1 primitives: bitwise · arith · workgroup coord (stack/queue/hashmap/...) · compiler primitives</text>

  <path class="edge" d="M 460 370 L 460 395"/>

  <rect x="140" y="400" width="300" height="70" rx="8" class="backend"/>
  <text x="290" y="425" text-anchor="middle" class="label">Backend (WGSL / Metal / SPIR-V / CPU ref)</text>
  <text x="290" y="445" text-anchor="middle" class="sub">impl VyreBackend::dispatch — one file add</text>
  <text x="290" y="461" text-anchor="middle" class="sub">swapping target is a one-file change</text>

  <rect x="470" y="400" width="300" height="70" rx="8" class="conform"/>
  <text x="620" y="425" text-anchor="middle" class="label">DialectRegistry + KAT parity</text>
  <text x="620" y="445" text-anchor="middle" class="sub">gates · oracles · archetypes · mutations · witnesses</text>
  <text x="620" y="461" text-anchor="middle" class="sub">binary verdict — no severity, no "mostly"</text>

  <path class="edge" d="M 440 435 L 470 435"/>

  <rect x="320" y="495" width="280" height="50" rx="8" class="verdict"/>
  <text x="460" y="518" text-anchor="middle" class="label">Certificate  OR  Violation { Fix: … }</text>
  <text x="460" y="536" text-anchor="middle" class="sub">durable JSON+HTML proof document</text>

  <path class="edge" d="M 620 470 L 620 485 L 460 485 L 460 495"/>

  <rect x="800" y="160" width="110" height="190" rx="8" class="std"/>
  <text x="855" y="185" text-anchor="middle" class="label">vyre-std</text>
  <text x="855" y="205" text-anchor="middle" class="sub">Layer 2</text>
  <text x="855" y="230" text-anchor="middle" class="sub">regex_to_nfa</text>
  <text x="855" y="248" text-anchor="middle" class="sub">nfa_to_dfa</text>
  <text x="855" y="266" text-anchor="middle" class="sub">dfa_minimize</text>
  <text x="855" y="284" text-anchor="middle" class="sub">dfa_pack</text>
  <text x="855" y="302" text-anchor="middle" class="sub">dfa_assemble</text>
  <text x="855" y="320" text-anchor="middle" class="sub">cache ·</text>
  <text x="855" y="338" text-anchor="middle" class="sub">arith helpers</text>
  <path class="edge" d="M 800 250 L 760 250"/>
</svg>
