[package]
name = "vyre-intrinsics"
version = "0.6.0"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
homepage.workspace = true
description = "Cat-C hardware intrinsics for vyre — ops that require a dedicated Naga emitter arm and dedicated vyre-reference eval arm. Pure fn(...) -> Program builders over vyre::ir::* live in vyre-libs or user crates, not here."
readme = "README.md"
keywords = ["gpu", "intrinsic", "ir", "vyre", "wgsl"]
categories = ["algorithms", "compilers", "hardware-support"]
documentation = "https://docs.rs/vyre-intrinsics"

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]

[dependencies]
vyre-foundation = { version = "0.6.0", path = "../vyre-foundation" }
vyre-driver = { version = "0.6.0", path = "../vyre-driver" }
vyre-spec.workspace = true
vyre-macros.workspace = true
serde.workspace = true
thiserror.workspace = true
tracing.workspace = true
rustc-hash.workspace = true
smallvec.workspace = true
inventory.workspace = true

[dev-dependencies]
criterion.workspace = true
vyre = { workspace = true }
vyre-reference = { version = "0.6.0", path = "../vyre-reference" }

[features]
default = ["all"]
all = ["hardware"]
hardware = []

# Opt-in Cat-C subgroup intrinsics (subgroup_ballot, subgroup_shuffle,
# subgroup_add). Off by default while the Naga 25+ lowering / wire
# format settle. See FINDING-PRIM-2 and docs/rfcs/0004-collective-ops.md.
subgroup-ops = ["vyre-reference/subgroup-ops"]

[lints]
workspace = true

[[bench]]
name = "intrinsic_perf"
harness = false
