name: 'KeyHog Secret Scanner'
description: 'Scan for secrets in your code with KeyHog'
branding:
  icon: 'shield'
  color: 'red'
inputs:
  path:
    description: 'Path to scan'
    default: '.'
  severity:
    description: 'Minimum severity to report (info, low, medium, high, critical)'
    default: 'high'
  format:
    description: 'Output format (text, json, sarif)'
    default: 'sarif'
  verify:
    description: 'Enable live credential verification'
    default: 'false'
runs:
  using: 'composite'
  steps:
    - name: Build KeyHog
      shell: bash
      run: |
        cargo build --release --manifest-path ${{ github.action_path }}/../../../Cargo.toml
    - name: Run scan
      shell: bash
      run: |
        ./target/release/keyhog scan \
          --path ${{ inputs.path }} \
          --severity ${{ inputs.severity }} \
          --format ${{ inputs.format }} \
          ${{ inputs.verify == 'true' && '--verify' || '' }} \
          --output keyhog-results.${{ inputs.format == 'sarif' && 'sarif' || 'json' }}
    - name: Upload SARIF
      if: inputs.format == 'sarif'
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: keyhog-results.sarif
